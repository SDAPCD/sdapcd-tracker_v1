function attachLogWorkFiles(input) {
  const files = Array.from(input.files);
  if (!ui.form.attachments) ui.form.attachments = [];
  const inst = db.instruments.find(x => String(x.id) === String(ui.form.instId));

  files.forEach(file => {
    const isPDF = file.type === 'application/pdf' || file.name.toLowerCase().endsWith('.pdf');
    const maxSize = isPDF ? 2 * 1024 * 1024 : 4 * 1024 * 1024; // 2MB PDF, 4MB image
    if (file.size > maxSize) {
      toast(`⚠ ${file.name} too large — max ${isPDF ? '2MB for PDFs' : '4MB for images'}`);
      return;
    }
    const reader = new FileReader();
    reader.onload = async e => {
      // Save current field values before any re-render
      const byEl    = document.getElementById('f-lw-by');
      const descEl  = document.getElementById('f-lw-desc');
      const dateEl  = document.getElementById('f-lw-date');
      const otherEl = document.getElementById('f-lw-other');
      if (byEl)    ui.form.by          = byEl.value;
      if (descEl)  ui.form.desc        = descEl.value;
      if (dateEl)  ui.form.date        = dateEl.value;
      if (otherEl) ui.form.otherReason = otherEl.value;

      // Add a placeholder while uploading
      const placeholderIdx = ui.form.attachments.length;
      ui.form.attachments.push({
        name: file.name,
        type: isPDF ? 'pdf' : 'image',
        uploading: true,
        data: e.target.result
      });
      render();

      // Compress images before upload
      let uploadData = e.target.result;
      if (!isPDF && file.type.startsWith('image/')) {
        try { uploadData = await compressImage(e.target.result, 1400, 0.85); }
        catch(ce) { uploadData = e.target.result; }
      }

      // Upload to Google Drive
      try {
        const result = await API.uploadFile(
          uploadData,
          file.name,
          isPDF ? 'application/pdf' : (file.type || 'image/jpeg'),
          inst ? inst.name   : '',
          inst ? inst.serial : '',
          ui.form.workType || 'Work'
        );
        // Replace placeholder with Drive link
        ui.form.attachments[placeholderIdx] = {
          name:      file.name,
          type:      isPDF ? 'pdf' : 'image',
          fileId:    result.fileId,
          fileUrl:   result.fileUrl,
          directUrl: result.directUrl,
          data:      e.target.result
        };
        toast('📎 ' + file.name + ' uploaded to Drive');
      } catch(err) {
        const msg = err && err.message ? err.message : String(err);
        console.warn('Drive upload failed:', err);
        ui.form.attachments[placeholderIdx] = {
          name: file.name,
          type: isPDF ? 'pdf' : 'image',
          data: e.target.result,
          localOnly: true
        };
        toast('⚠ Upload failed: ' + msg.slice(0, 60));
      }
      render();
    };
    reader.readAsDataURL(file);
  });
}

let _savingWO = false; // prevent double-submit
function saveWorkEntry(mode) {
  if (_savingWO) return; // block double click
  const type = document.getElementById('f-type') ? document.getElementById('f-type').value : '';
  const by   = getVal('f-by');
  const desc = getVal('f-desc');
  const priority = document.getElementById('f-priority') ? document.getElementById('f-priority').value : 'Medium';
  if (!by)   { ui.form={...ui.form, err:'Technician is required.', type, by, desc, priority}; render(); return; }
  if (!desc) { ui.form={...ui.form, err:'Description is required.', type, by, desc, priority}; render(); return; }
  const { instId } = ui.form;
  // Prevent duplicate open WO for same instrument + type
  const dupWO = db.workOrders.find(w => String(w.instrumentId) === String(instId) && w.type === type && w.status !== 'Closed');
  if (dupWO) { ui.form={...ui.form, err:'An open ' + type + ' work order (WO-' + dupWO.id + ') already exists for this instrument.', type, by, desc, priority}; render(); return; }
  const maxId = db.workOrders.reduce((m, w) => Math.max(m, parseInt(w.id)||0), 0);
  const woId = Math.max(maxId + 1, Date.now());
  db.woId = woId + 1;
  const newWO = { id:woId, instrumentId:instId, type, description:desc, technician:by, status:'Open', created:today(), priority };
  db.workOrders.push(newWO);
  // Auto-update instrument status to match the WO type and move to HQ/SHOP
  const woInst = db.instruments.find(i => String(i.id) === String(instId));
  if (woInst && !woInst.archived) {
    const statusMap = {
      'Maintenance': 'Maintenance',
      'Repair':      'Repair',
      'Calibration': 'Calibration',
      'Inspection':  'Maintenance',
      'Other':       'Maintenance'
    };
    const newStatus = statusMap[type] || type;
    const validStatuses = ['Maintenance','Repair','Calibration','Offline'];
    if (validStatuses.includes(newStatus) && woInst.status !== newStatus) {
      const prevStatus = woInst.status;
      woInst.status = newStatus;
      if (woInst.site !== 'HQ/SHOP' && woInst.site !== 'VENDOR') {
        woInst.site = 'HQ/SHOP';
        addHistory(instId, 'Site changed', `${prevStatus !== newStatus ? prevStatus + ' → ' + newStatus + ' · ' : ''}Moved to HQ/SHOP for WO-${woId}`);
      } else {
        addHistory(instId, 'Status changed', `${prevStatus} → ${newStatus} (WO-${woId} created)`);
      }
      syncInstrument(woInst);
    }
  }
  addHistory(instId, 'Work order created', `WO-${woId} · ${type} · Tech: ${by}${desc?' · '+desc.slice(0,80):''}`);
  // POST to GAS and update the WO's id with the server-assigned id
  _savingWO = true;
  closeModal();
  toast('✓ Work order created — saving to Sheets...');
  API.post('/work-orders', {
    instrument_id: instId, type, description: desc, tech_name: by, priority, status: 'Open'
  }).then(result => {
    if (result && result.id) {
      // Update the WO in db with server-assigned id
      const idx = db.workOrders.indexOf(newWO);
      if (idx !== -1) db.workOrders[idx].id = Number(result.id);
      newWO.id      = Number(result.id);
      newWO._synced = true;
      toast('✓ Work order WO-' + result.id + ' saved to Sheets');
    }
  }).catch(e => {
    console.warn('createWO failed', e);
    toast('⚠ WO created locally — Sheets sync failed');
  }).finally(() => { _savingWO = false; });
}

          };

          };
          db.attachments.push(tempAtt);

            }

  // Direct API call — explicit and complete, no syncWorkOrder abstraction
  API.put('/work-orders/' + wo.id, {

  // Instrument → Operational at HQ/SHOP

function generateUsername(fullName) {
  // Format: first initial + last name, lowercase, letters only
  const parts = fullName.trim().split(/\s+/);
  if (parts.length < 2) return fullName.trim().toLowerCase().replace(/[^a-z]/g, '');
  const first = parts[0].replace(/[^a-zA-Z]/g, '');
  const last  = parts[parts.length - 1].replace(/[^a-zA-Z]/g, '');
  return (first[0] + last).toLowerCase();
}

function exportCSV() {
  const rows = [['Serial Number','Type','Status','Site','Notes','Created']];
  db.instruments.forEach(i => rows.push([i.serial, i.name, i.status, i.site, i.notes||'', i.created]));
  const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = 'sdapcd_instruments_' + today() + '.csv';
  a.click();
  toast('CSV exported');
}

function exportWOCSV() {
  const rows = [['WO #','Instrument Type','Serial Number','WO Type','Status','Technician','Description','Created']];
  db.workOrders.forEach(wo => {
    const inst = db.instruments.find(i => String(i.id) === String(wo.instrumentId));

      inst ? inst.serial : '—',

  const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');

  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);

  a.click();
  toast('Work orders exported');
}

function openEditSite(siteCode) {
  const idx  = db.sites.indexOf(siteCode);
  if (idx === -1) return;
  const meta = (db.sitesMeta || {})[siteCode] || { type:'Field', address:'', lat:'', lng:'', siteName:'' };
  ui.modal = 'editsite';
  ui.form  = { idx, val:siteCode, siteName:meta.siteName||'', type:meta.type||'Field', address:meta.address||'', lat:meta.lat||'', lng:meta.lng||'', driveFolder:meta.driveFolder||'' };
  render();
}
function saveEditSite(idx) {
  const val      = getVal('f-val').toUpperCase().trim();
  const siteName = getVal('f-site-name').trim();
  const typeEl   = document.getElementById('f-site-type');
  const type     = typeEl ? typeEl.value : (ui.form.type||'Field');
  const address  = getVal('f-site-address').trim();
  const lat      = getVal('f-site-lat').trim();
  const lng      = getVal('f-site-lng').trim();
  const driveFolder = getVal('f-drive-folder').trim();
  if (!val) { ui.form={...ui.form,err:'Site code is required.'}; render(); return; }
  if (PROTECTED_SITES.includes(db.sites[idx])) { ui.form={...ui.form,err:'Protected site cannot be renamed.'}; render(); return; }
  if (db.sites.includes(val) && val !== db.sites[idx]) { ui.form={...ui.form,err:'Site already exists.'}; render(); return; }
  const old = db.sites[idx];
  if (old !== val) {
    db.sitesMeta[val] = db.sitesMeta[old] || {};
    delete db.sitesMeta[old];
    db.instruments.forEach(i => {
      if (i.site === old) {
        i.site = val;
        syncInstrument(i);
      }
    });
  }
  db.sites[idx] = val;
  const existing = db.sitesMeta[val] || {};
  db.sitesMeta[val] = { ...existing, siteName, type, address, lat, lng, driveFolder };
  if (ui.selectedSite === old) ui.selectedSite = val;
  API.post('/sites/update', {old_code: old, code: val, site_name: siteName, type, address, lat, lng, drive_folder: driveFolder}).catch(e => toast('⚠ Site update failed: ' + e.message, 'warn'));
  const changes = [];
  if (old !== val) changes.push(`code: ${old} → ${val}`);
  if (siteName !== (existing.siteName||'')) changes.push(`name: ${existing.siteName||'(none)'} → ${siteName||'(none)'}`);
  if (type !== (existing.type||'Field')) changes.push(`type: ${existing.type||'Field'} → ${type}`);
  if (address !== (existing.address||'')) changes.push('address updated');
  addSecurityLog('Site Updated', `Site "${val}" updated` + (changes.length ? ': ' + changes.join(', ') : ''));
  try{saveDB('site');}catch(e){console.warn('saveDB',e);} closeModal(); toast('✓ Site updated');
}

// Compress an image to reduce size before uploading to GAS (which has a ~6MB POST limit)
function compressImage(dataUrl, maxWidth, quality) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      let w = img.width, h = img.height;
      if (w > maxWidth) { h = Math.round(h * maxWidth / w); w = maxWidth; }
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL('image/jpeg', quality || 0.82));
    };
    img.onerror = reject;
    img.src = dataUrl;
  });
}

// ── SITE PHOTO LINK SYSTEM ─────────────────────────────────
// Convert any Google Drive share URL to a direct image URL for embedding
function driveDirectUrl(url) {
  // Extracts the file ID from any Drive URL and returns a thumbnail embed URL.
  // drive.google.com/thumbnail?id=FILE_ID is the current working embed format.
  // drive.google.com/uc?export=view is deprecated and blocked by Google.
  if (!url) return '';

  // Already a thumbnail URL — return as-is
  if (url.includes('drive.google.com/thumbnail')) return url;

  // Extract file ID from any Drive URL format
  let fileId = null;

  // format: /file/d/FILE_ID/
  const m1 = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
  if (m1) fileId = m1[1];

  // format: ?id=FILE_ID or &id=FILE_ID
  if (!fileId) {
    const m2 = url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
    if (m2) fileId = m2[1];
  }

  // Old uc?export=view format — extract id and convert
  if (!fileId && url.includes('uc?export=view')) {
    const m3 = url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
    if (m3) fileId = m3[1];
  }

  if (fileId) {
    // Use thumbnail URL — works for embedding, no auth required for shared files
    return 'https://drive.google.com/thumbnail?id=' + fileId + '&sz=w800';
  }

  return url;
}

// Returns the best view URL for opening in Drive (not for embedding)
function driveViewUrl(url) {
  if (!url) return '#';
  // Already a view URL
  if (url.includes('drive.google.com/file/') || url.includes('drive.google.com/open')) return url;
  // Extract file ID and build view URL
  const m = url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
  if (m) return 'https://drive.google.com/file/d/' + m[1] + '/view';
  const m2 = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
  if (m2) return url; // already in right format
  return url;
}

// ── DIRECT SITE PHOTO UPLOAD TO GOOGLE DRIVE ─────────────────────────
function uploadSitePhotos(input, siteCode) {
  const files = Array.from(input.files);
  if (!files.length) return;
  const maxSize = 4 * 1024 * 1024; // 4MB per image

  files.forEach(file => {
    if (file.size > maxSize) {
      toast('⚠ ' + file.name + ' too large — max 4MB');
      return;
    }
    if (!file.type.startsWith('image/')) {
      toast('⚠ ' + file.name + ' is not an image');
      return;
    }
    const reader = new FileReader();
    reader.onload = async e => {
      toast('📷 Uploading ' + file.name + '...');
      let uploadData = e.target.result;
      try { uploadData = await compressImage(e.target.result, 1400, 0.85); }
      catch(ce) { uploadData = e.target.result; }

      try {
        const result = await API.uploadFile(
          uploadData,
          file.name,
          file.type || 'image/jpeg',
          siteCode,
          siteCode,
          'Site Photo'
        );
        if (!result || !result.fileId) { toast('⚠ Upload failed for ' + file.name, 'error'); return; }
        const saved = await API.post('/attachments', {
          instrument_id: '',
          site_code:     siteCode,
          type:          'site_photo',
          file_name:     file.name,
          file_url:      result.fileUrl  || '',
          file_id:       result.fileId   || '',
          direct_url:    result.directUrl|| '',
          tech:          ui.currentUser  || '',
          date:          today(),
          work_type:     '',
          mime_type:     file.type || 'image/jpeg'
        });
        if (!db.attachments) db.attachments = [];
        db.attachments.push({
          id:        saved.id,
          type:      'site_photo',
          siteCode:  siteCode,
          fileName:  file.name,
          fileUrl:   result.fileUrl   || '',
          fileId:    result.fileId    || '',
          directUrl: result.directUrl || '',
          tech:      ui.currentUser   || '',
          date:      today(),
          mimeType:  file.type || 'image/jpeg'
        });
        toast('📷 ' + file.name + ' uploaded');
        render();
      } catch(err) {
        console.warn('Site photo upload failed:', err);
        toast('⚠ Upload failed: ' + (err.message || String(err)).slice(0, 60));
      }
    };
    reader.readAsDataURL(file);
  });
  input.value = '';
}

// ── SERVICE LOG ────────────────────────────────────────────
function renderServiceLog() {
  const WORK_TYPES = ['Maintenance','Calibration','Repair','Inspection','Other'];
  const q        = (ui.slSearch   || '').toLowerCase();
  const typeF    =  ui.slTypeF    || 'All Types';
  const techF    =  ui.slTechF    || 'All Techs';
  const dateFrom =  ui.slDateFrom || '';
  const dateTo   =  ui.slDateTo   || '';

  // Collect all log work entries from every instrument's history
  const entries = [];
  Object.entries(db.history || {}).forEach(([instId, hist]) => {
    const inst = db.instruments.find(i => String(i.id) === String(instId));
    if (!inst) return;
    (hist || []).forEach(h => {
      if (!(h.action || '').toLowerCase().includes('work performed')) return;
      // Parse work type from action string "Work performed — Calibration"
      const typePart = (h.action || '').split('—')[1]?.trim() || 'Work';
      const baseType = WORK_TYPES.find(t => typePart.toLowerCase().startsWith(t.toLowerCase())) || 'Other';
      // Parse tech from detail "Tech: jsmith · ..."
      const techMatch = (h.detail || '').match(/Tech:\s*([^·\n]+)/i);
      const tech = techMatch ? techMatch[1].trim() : '—';
      // Parse attachments count
      const attachMatch = (h.detail || '').match(/(\d+) attachment/i);
      const attachCount = attachMatch ? parseInt(attachMatch[1]) : 0;
      // Get actual attachment objects
      // Always pull from db.attachments — reliable single source of truth
      const attachments = (db.attachments||[]).filter(a =>
        String(a.instrumentId) === String(instId) &&
        a.type !== 'site_photo' &&
        a.date === (h.ts||'').slice(0,10) &&
        (tech === '—' || a.tech === tech)
      );
      entries.push({ instId, inst, h, typePart, baseType, tech, attachCount, attachments,
                     dateStr: (h.ts||'').slice(0,10) });
    });
  });

  // Sort newest first
  entries.sort((a, b) => (b.h.epoch||0) - (a.h.epoch||0));

  // Apply filters
  const filtered = entries.filter(e => {
    const matchQ = !q
      || e.inst.name.toLowerCase().includes(q)
      || e.inst.serial.toLowerCase().includes(q)
      || e.tech.toLowerCase().includes(q)
      || (e.h.detail||'').toLowerCase().includes(q)
      || e.typePart.toLowerCase().includes(q);
    const matchType = typeF === 'All Types' || e.baseType === typeF;
    const matchTech = techF === 'All Techs' || e.tech === techF;
    const matchFrom = !dateFrom || e.dateStr >= dateFrom;
    const matchTo   = !dateTo   || e.dateStr <= dateTo;
    return matchQ && matchType && matchTech && matchFrom && matchTo;
  });

  // All unique techs for filter dropdown
  const allTechs = [...new Set(entries.map(e => e.tech).filter(t => t && t !== '—'))].sort();

  // Type color map
  const typeColor = t => ({
    Maintenance: 'var(--blue)',   Calibration: 'var(--green)',
    Repair:      'var(--red)',    Inspection:  'var(--purple)',
    Other:       'var(--slate)'
  }[t] || 'var(--slate)');
  const typeBg = t => ({
    Maintenance: 'rgba(34,211,238,.09)',  Calibration: 'rgba(52,211,153,.09)',
    Repair:      'rgba(248,113,113,.09)', Inspection:  'rgba(167,139,250,.09)',
    Other:       'rgba(148,163,184,.09)'
  }[t] || 'rgba(148,163,184,.09)');
  const typeBorder = t => ({
    Maintenance: 'rgba(34,211,238,.25)',  Calibration: 'rgba(52,211,153,.25)',
    Repair:      'rgba(248,113,113,.25)', Inspection:  'rgba(167,139,250,.25)',
    Other:       'rgba(148,163,184,.25)'
  }[t] || 'rgba(148,163,184,.25)');

  const hasFilters = q || typeF !== 'All Types' || techF !== 'All Techs' || dateFrom || dateTo;

  const rows = filtered.length === 0
    ? `<tr class="empty-row"><td colspan="6" style="text-align:center;padding:28px;color:var(--subtle)">No service log entries match your filters</td></tr>`
    : filtered.map(e => {
        // Strip "Tech: X · " prefix from detail for cleaner display
        const detail = (e.h.detail || '').replace(/^Tech:[^·]+·\s*/i, '').replace(/·\s*\d+ attachments?/i,'').trim();
        const attachHtml = e.attachments.length > 0
          ? e.attachments.map(a => {
              const isPDF = (a.mimeType||'').includes('pdf') || a.type === 'pdf' || (a.fileName||'').endsWith('.pdf');
              const url   = a.fileUrl || a.directUrl || '';
              const icon  = isPDF ? '📄' : '🖼';
              const label = a.fileName || a.name || 'File';
              return url
                ? `<a href="${esc(url)}" target="_blank" style="display:inline-flex;align-items:center;gap:5px;padding:3px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);font-family:var(--font-mono);font-size:10px;color:var(--blue);text-decoration:none;margin-right:5px;margin-top:3px;font-weight:600">${icon} ${esc(label)} ↗</a>`
                : `<span style="font-family:var(--font-mono);font-size:10px;color:var(--subtle);margin-right:5px">${icon} ${esc(label)} (no link)</span>`;
            }).join('')
          : e.attachCount > 0
            ? `<span style="font-family:var(--font-mono);font-size:10px;color:var(--subtle)">${e.attachCount} file${e.attachCount>1?'s':''} — <span style="color:var(--blue);cursor:pointer" onclick="openAttachments(${e.instId})">view</span></span>`
            : '';
        return `<tr>
          <td style="font-family:var(--font-mono);font-size:11px;color:var(--subtle);white-space:nowrap">${esc(e.dateStr)}</td>
          <td>
            <div class="inst-name">${esc(e.inst.name)}</div>
            <div class="inst-sn">${esc(e.inst.serial)}</div>
          </td>

function toggleAdminSection(el) {
  const group = el.closest('.group');
  if (!group) return;
  if (!ui._openAdminSections) ui._openAdminSections = new Set();
  const key = group.dataset.sectionKey;
  if (group.classList.contains('group-collapsed')) {
    group.classList.remove('group-collapsed');
    if (key) ui._openAdminSections.add(key);
  } else {
    group.classList.add('group-collapsed');
    if (key) ui._openAdminSections.delete(key);
  }
}
function setupAdminSections() {
  document.querySelectorAll('#root .group').forEach((group, i) => {
    const hdr = group.querySelector('.group-hdr');
    if (!hdr) return;
    if (!group.querySelector('.group-body')) {
      const body = document.createElement('div');
      body.className = 'group-body';
      Array.from(group.children).forEach(child => { if (child !== hdr) body.appendChild(child); });
      group.appendChild(body);
    }
    const key = 'admin_section_' + i;
    group.dataset.sectionKey = key;
    if (ui._openAdminSections && ui._openAdminSections.has(key)) {
      group.classList.remove('group-collapsed');
    } else {
      group.classList.add('group-collapsed');
    }
  });
}

// ══════════════════════════════════════════════════════════════
//  SERVER-SYNC LAYER
//  Overrides saveDB so every mutation is persisted to SQLite
//  via the REST API.  The in-memory `db` object still drives
//  all rendering — this layer just makes it durable.
// ══════════════════════════════════════════════════════════════

// Debounce timer — batches rapid consecutive saves into one request
let _syncTimer = null;

// Re-define saveDB to do a targeted push of only dirty records
window.saveDB = function saveDB(type, id) {
  if (type === 'instrument' && id !== undefined) markDirty('instruments', id);
  else if (type === 'workorder' && id !== undefined) markDirty('workOrders', id);
  else if (type === 'site')    markDirty('sites');
  else if (type === 'tech')    markDirty('techs');
  else if (type === 'type')    markDirty('types');
  else if (type === 'status')  markDirty('statuses');
  clearTimeout(_syncTimer);
  _syncTimer = setTimeout(syncToServer, 120);
};

// ── DIRTY TRACKING ─────────────────────────────────────────
// Instead of fetching full DB to diff, track what changed locally
const _dirty = { instruments: new Set(), workOrders: new Set(), sites: false, techs: false, types: false, statuses: false };

function markDirty(type, id) {
  if (type === undefined) { ui.dirty = true; return; }
  if (id !== undefined) _dirty[type].add(String(id));
  else _dirty[type] = true;
}

async function syncToServer() {
  try {
    // ── INSTRUMENTS ─────────────────────────────────────────
    for (const instId of _dirty.instruments) {
      const inst = db.instruments.find(i => String(i.id) === instId);
      if (!inst) { await API.del('/instruments/' + instId).catch(()=>{}); continue; }
      // Only PUT existing synced instruments — new ones are POSTed directly in saveAdd
      if (inst._synced && inst.id) {
        await API.put('/instruments/' + inst.id, {
          name: inst.name, serial: inst.serial, status: inst.status,
          site: inst.site, notes: inst.notes||'',
          archived: inst.archived ? 1 : 0,
          last_cert_date: inst.lastCertDate || null,
          cert_interval_months: inst.certIntervalMonths || null
        }).catch(()=>{});
      }
    }
    _dirty.instruments.clear();

    // ── WORK ORDERS ─────────────────────────────────────────
    // All WO saves are handled directly via API.post / syncWorkOrder
    // Dirty sync for WOs is disabled to prevent duplicate rows
    _dirty.workOrders.clear();

    // ── SITES ───────────────────────────────────────────────
    if (_dirty.sites) {
      // Only post sites that don't have an id yet (new ones)
      // Existing sites are updated via API.put in addSite/updateSite directly
      _dirty.sites = false;
    }

    // ── INST TYPES ──────────────────────────────────────────
    if (_dirty.types) {
      // Only post types that don't have an id yet (new ones)
      _dirty.types = false;
    }

    // ── TECHS ───────────────────────────────────────────────
    if (_dirty.techs) {
      for (const t of db.techs) {
        if (t.id && t._synced) {
          // Existing tech — update
          await API.put('/technicians/' + t.id, {
            name: t.name, role: t.role||'', email: t.email||'',
            username: t.username||'', permission: t.permission||'Edit',
            password: t.password||'changeme', archived: t.archived||false
          }).catch(()=>{});
        } else if (!t._synced) {
          // New tech — create
          const created = await API.post('/technicians', {
            name: t.name, role: t.role||'', email: t.email||'',
            username: t.username||'', permission: t.permission||'Edit',
            password: t.password||'changeme'
          }).catch(()=>null);
          if (created) { t.id = created.id; t._synced = true; }
        }
      }
      _dirty.techs = false;
    }

    // ── CUSTOM STATUSES ─────────────────────────────────────
    if (_dirty.statuses) {
      for (const name of (db.customStatuses||[])) {
        await API.post('/custom-statuses', { name }).catch(()=>{});
      }
      _dirty.statuses = false;
    }

  } catch(e) {
    console.error('SDAPCD: sync to server failed', e);
    toast('⚠ Server sync failed — check that the server is running');
  }
}

// Mark instruments/WOs/techs as synced on load so they don't get re-posted
function markAllSynced() {
  (db.instruments||[]).forEach(i => { i._synced = true; });
  (db.workOrders||[]).forEach(w => { w._synced = true; });
  (db.techs||[]).forEach(t => { t._synced = true; });
  (db.archivedTechs||[]).forEach(t => { t._synced = true; });
}

// Admin password — now uses plain text from db (no hashing)
window.submitAdminPassword = function() {
  const pw = document.getElementById('admin-pw-input')?.value || '';
  if (!pw) { ui.form = {...ui.form, err: 'Please enter the password.'}; render(); return; }
  const stored = getStoredPassword('admin');
  if (pw !== stored) {

// ── FEATURE: AUTO-REFRESH (every 2 minutes) ──────────────────
// ══════════════════════════════════════════════════════════════
let _autoRefreshInterval = null;
let _lastDbHash = '';
function _dbFingerprint(d) {
  // Lightweight fingerprint: counts + most recent timestamps
  const ic = (d.instruments||[]).length;
  const wc = (d.workOrders||[]).length;
  const ac = (d.attachments||[]).length;
  const sc = (d.sites||[]).length;
  const lastInst = (d.instruments||[]).reduce((m,i) => Math.max(m, i.id||0), 0);
  const lastWO = (d.workOrders||[]).reduce((m,w) => Math.max(m, w.id||0), 0);
  return `${ic}:${wc}:${ac}:${sc}:${lastInst}:${lastWO}`;
}
function startAutoRefresh() {
  if (_autoRefreshInterval) clearInterval(_autoRefreshInterval);
  _autoRefreshInterval = setInterval(async () => {
    if (!ui.currentUser) return; // don't refresh if not logged in
    if (ui.modal) return; // don't refresh while a modal is open
    if (ui.dirty) return; // don't refresh while user has unsaved changes
    try {
      const d = await API.get('/db');
      // Check if data actually changed — skip render if identical
      const newHash = _dbFingerprint(d);
      if (newHash === _lastDbHash) return; // no changes, skip render
      _lastDbHash = newHash;
      // Preserve scroll position
      const mainEl = document.getElementById('main') || document.scrollingElement || document.documentElement;
      const scrollTop = mainEl.scrollTop;
      const scrollLeft = mainEl.scrollLeft;
      // Merge server data — preserve any local-only items not yet synced
      const localOnlyInst = db.instruments ? db.instruments.filter(i => !i._synced && i._local) : [];
      const localOnlyWO = db.workOrders ? db.workOrders.filter(w => !w._synced && w._local) : [];
      db = d;
      // Re-add local-only items that haven't synced yet
      if (localOnlyInst.length) localOnlyInst.forEach(i => { if (!db.instruments.find(x => String(x.id) === String(i.id))) db.instruments.push(i); });
      if (localOnlyWO.length) localOnlyWO.forEach(w => { if (!db.workOrders.find(x => String(x.id) === String(w.id))) db.workOrders.push(w); });
      if (!db.customStatuses) db.customStatuses = [];
      if (!db.sitesMeta) db.sitesMeta = {};
      if (!db.securityLog) db.securityLog = [];
      if (!db.deleteLog) db.deleteLog = [];
      if (!db.history) db.history = {};
      if (!db.attachments) db.attachments = [];
      if (db.instruments) {
        db.instruments.forEach(i => {
          if (i.cert_interval_months !== undefined && i.certIntervalMonths === undefined)
            i.certIntervalMonths = i.cert_interval_months !== undefined && i.cert_interval_months !== '' ? Number(i.cert_interval_months) : null;
          if (i.last_cert_date !== undefined && i.lastCertDate === undefined)
            i.lastCertDate = i.last_cert_date || null;
        });
      }
      if (db.attachments.length > 0) {
        db.instruments.forEach(inst => {
          const instAtt = db.attachments.filter(a => String(a.instrumentId) === String(inst.id) && a.type === 'work');
          if (instAtt.length > 0) inst.workAttachments = instAtt;
        });
        db.attachments.filter(a => a.type === 'site_photo' && a.siteCode).forEach(a => {
          if (!db.sitesMeta[a.siteCode]) db.sitesMeta[a.siteCode] = {};
          if (!db.sitesMeta[a.siteCode].photos) db.sitesMeta[a.siteCode].photos = [];
          db.sitesMeta[a.siteCode].photos.push({ url: a.directUrl || a.fileUrl, attachmentId: a.id, fileName: a.fileName });
        });
      }
      if (!db.adminPassword) db.adminPassword = 'changeme';
      markAllSynced();
      // Save to offline cache
      try { localStorage.setItem('sdapcd_db_cache', JSON.stringify(db)); } catch(e) {}
      // Update activity badge
      updateActivityBadge();
      render();
      // Restore scroll position after render
      requestAnimationFrame(() => {
        mainEl.scrollTop = scrollTop;
        mainEl.scrollLeft = scrollLeft;
      });
    } catch(e) { /* silent fail on background refresh */ }
  }, 120000); // 2 minutes
}

// ── FEATURE: OFFLINE MODE (localStorage cache) ──────────────
// ══════════════════════════════════════════════════════════════
function saveDBToCache() {
  try { localStorage.setItem('sdapcd_db_cache', JSON.stringify(db)); } catch(e) {}
}
function loadDBFromCache() {
  try {
    const cached = localStorage.getItem('sdapcd_db_cache');
    if (cached) {
      db = JSON.parse(cached);
      if (!db.customStatuses) db.customStatuses = [];
      if (!db.sitesMeta) db.sitesMeta = {};
      if (!db.securityLog) db.securityLog = [];
      if (!db.deleteLog) db.deleteLog = [];
      if (!db.history) db.history = {};
      if (!db.attachments) db.attachments = [];
      render();
      return true;
    }
  } catch(e) {}
  return false;
}

// Patch loadDBFromServer to save cache on success and fallback on failure
const _originalLoadDB = loadDBFromServer;
loadDBFromServer = async function() {
  try {
    await _originalLoadDB();
    saveDBToCache();
    startAutoRefresh();
    updateActivityBadge();
  } catch(e) {
    console.warn('Server load failed, trying offline cache...');
    if (loadDBFromCache()) {
      toast('📡 Offline mode — showing cached data');
    } else {
      toast('⚠ No connection and no cached data available');
    }
  }
};

// ══════════════════════════════════════════════════════════════
// ── FEATURE: OFFLINE RETRY QUEUE ─────────────────────────────
// ══════════════════════════════════════════════════════════════
const _offlineQueue = JSON.parse(localStorage.getItem('sdapcd_offline_queue') || '[]');
let _isOnline = navigator.onLine;
let _retryingQueue = false;

function _saveQueue() {
  try { localStorage.setItem('sdapcd_offline_queue', JSON.stringify(_offlineQueue)); } catch(e) {}
}

function queueOfflineRequest(method, path, body) {
  _offlineQueue.push({ method, path, body, ts: Date.now() });
  // Cap queue at 200 entries to prevent localStorage overflow
  if (_offlineQueue.length > 200) _offlineQueue.splice(0, _offlineQueue.length - 200);
  _saveQueue();
}

async function flushOfflineQueue() {
  if (_retryingQueue || _offlineQueue.length === 0) return;
  _retryingQueue = true;
  let successCount = 0;
  while (_offlineQueue.length > 0) {
    const req = _offlineQueue[0];
    try {
      if (req.method === 'post') await API.post(req.path, req.body);
      else if (req.method === 'put') await API.put(req.path, req.body);
      else if (req.method === 'del') await API.del(req.path);
      else if (req.method === 'patch') await API.patch(req.path, req.body);
      _offlineQueue.shift();
      _saveQueue();
      successCount++;
    } catch(e) {
      // Still failing — stop retrying, will try again on next online event
      break;
    }
  }
  _retryingQueue = false;
  if (successCount > 0) toast('✓ ' + successCount + ' queued change' + (successCount===1?'':'s') + ' synced to server');
  if (_offlineQueue.length > 0 && successCount > 0) toast('⚠ ' + _offlineQueue.length + ' change' + (_offlineQueue.length===1?'':'s') + ' still pending', 'warn');
}

// Listen for online/offline events
window.addEventListener('online', () => {
  _isOnline = true;
  toast('✓ Connection restored — syncing queued changes...');
  flushOfflineQueue();
});
window.addEventListener('offline', () => {
  _isOnline = false;
  toast('⚠ You are offline. Changes will be queued and synced when reconnected.', 'warn');
});

// Patch gasRequest to queue on network failure for mutations
const _originalGasRequest = gasRequest;
gasRequest = async function(path, action, params, body) {
  try {
    const result = await _originalGasRequest(path, action, params, body);
    // On success, try flushing any queued requests
    if (_offlineQueue.length > 0 && !_retryingQueue) flushOfflineQueue();
    return result;
  } catch(e) {
    // Only queue write operations (not reads)
    if (action !== 'get' && e.message && e.message.includes('Network error')) {
      const method = action === 'put' ? 'put' : action === 'delete' ? 'del' : action === 'patch' ? 'patch' : 'post';
      // Reconstruct the API-style path
      const apiPath = '/' + path + (params && params.id ? '/' + params.id : '') + (action && action !== 'post' && action !== 'put' && action !== 'delete' && action !== 'patch' ? '/' + action : '');
      queueOfflineRequest(method, apiPath, body || params || {});
      toast('⚠ Offline — change queued for sync', 'warn');
      return null; // Don't throw, let the UI continue
    }
    throw e; // Re-throw non-network errors
  }
};

// Try flushing queue on startup
if (_offlineQueue.length > 0 && _isOnline) setTimeout(flushOfflineQueue, 5000);

// ── FEATURE: ACTIVITY BADGE ──────────────────────────────────
// ══════════════════════════════════════════════════════════════
let _activityBadgeCount = 0;

function updateActivityBadge() {
  const lastSeen = sessionStorage.getItem('sdapcd_activity_last_seen') || '';
  if (!lastSeen) { _activityBadgeCount = 0; return; }
  let count = 0;
  // Count history entries newer than lastSeen
  Object.values(db.history || {}).forEach(arr => {
    arr.forEach(h => {
      if ((h.ts || '') > lastSeen) count++;
    });
  });
  // Count security log entries newer than lastSeen
  (db.securityLog || []).forEach(e => {
    if ((e.ts || '') > lastSeen) count++;
  });
  _activityBadgeCount = Math.min(count, 99);
}

function markActivitySeen() {
  sessionStorage.setItem('sdapcd_activity_last_seen', nowTs());
  _activityBadgeCount = 0;
}

// Patch navigateTo to clear badge when visiting activity page
const _origNavigateTo = navigateTo;
navigateTo = function(page) {
  if (page === 'activity') markActivitySeen();
  return _origNavigateTo(page);
};

// Inject badge into Activity nav button via render patch
const _origRender = render;
render = function() {
  _origRender();
  // Add badge to Activity nav button after render
  const navBtns = document.querySelectorAll('.btn-nav');
  navBtns.forEach(btn => {
    if (btn.textContent.includes('Activity') && _activityBadgeCount > 0) {
      const existing = btn.querySelector('.activity-badge');
      if (existing) existing.remove();
      const badge = document.createElement('span');
      badge.className = 'activity-badge';
      badge.style.cssText = 'background:var(--red);color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:8px;margin-left:6px;font-family:var(--font-mono);min-width:16px;text-align:center;display:inline-block';
      badge.textContent = _activityBadgeCount > 99 ? '99+' : _activityBadgeCount;
      btn.appendChild(badge);
    }
  });
};
