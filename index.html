// ── ACTIVITY FEED ──────────────────────────────────────────
function renderActivity() {
  // Flatten all history across all instruments into one sorted array
  const allEvents = [];
  Object.entries(db.history || {}).forEach(([instId, events]) => {
    const inst = db.instruments.find(i => i.id === Number(instId));
    (events || []).forEach(ev => allEvents.push({ ...ev, instId: Number(instId), inst }));
  });

  // Sort by timestamp descending (most recent first)
  // ts format: "Mar 14, 2026, 10:30 AM" — use localeCompare reversed
  allEvents.sort((a, b) => (b.epoch || 0) - (a.epoch || 0) || b.ts.localeCompare(a.ts));

  // Filter categories
  const FILTERS = ['All','Work Order','Status Change','Site Change','Certification','Instrument'];
  const filterMap = {
    'Work Order':   ev => ev.action.toLowerCase().includes('work') || ev.action.toLowerCase().includes('wo'),
    'Status Change':ev => ev.action.toLowerCase().includes('status'),
    'Site Change':  ev => ev.action.toLowerCase().includes('site'),
    'Certification':ev => ev.action.toLowerCase().includes('cert'),
    'Instrument':   ev => ev.action.toLowerCase().includes('instrument'),
  };

  const q = (ui.actSearch || '').toLowerCase();
  const filtered = allEvents.filter(ev => {
      const matchFilter = ui.actFilter === 'All' || (filterMap[ui.actFilter] && filterMap[ui.actFilter](ev));
    const matchDate = (() => {
      if (!ui.actDateFrom && !ui.actDateTo) return true;
      const ep = ev.epoch || 0;
      const from = ui.actDateFrom ? new Date(ui.actDateFrom).getTime() : 0;
      const to   = ui.actDateTo   ? new Date(ui.actDateTo).getTime() + 86399999 : Infinity;
      return ep >= from && ep <= to;
    })();
    const matchSearch = !q
      || ev.action.toLowerCase().includes(q)
      || (ev.detail||'').toLowerCase().includes(q)
      || (ev.inst ? ev.inst.serial.toLowerCase().includes(q) : false)
      || (ev.inst ? ev.inst.name.toLowerCase().includes(q) : false)
      || (ev.inst ? (ev.inst.site||'').toLowerCase().includes(q) : false);
    return matchFilter && matchDate && matchSearch;
  });

  const displayed = filtered.slice(0, 500); // show up to 500 events

  // Icon + color per action type
  function feedIcon(action) {
    const a = action.toLowerCase();
    if (a.includes('work') || a.includes('wo')) return { cls:'fi-wo',    icon:'▣' };
    if (a.includes('status'))                   return { cls:'fi-status', icon:'◈' };
    if (a.includes('site'))                     return { cls:'fi-site',   icon:'▶' };
    if (a.includes('cert'))                     return { cls:'fi-cert',   icon:'◎' };
    if (a.includes('instrument'))               return { cls:'fi-add',    icon:'⊞' };
    return                                             { cls:'fi-default', icon:'·' };
  }

  const feedItems = displayed.length === 0
    ? `<div class="feed-empty">No activity matches your filter</div>`
    : displayed.map(ev => {
        const { cls, icon } = feedIcon(ev.action);
        const instLabel = ev.inst
          ? `<span class="feed-inst" onclick="openHistory(${ev.instId})">${esc(ev.inst.name)} · ${esc(ev.inst.serial)}</span>`
          : '';
        return `
        <div class="feed-item">
          <div class="feed-icon ${cls}">${icon}</div>
          <div class="feed-body">
            <div class="feed-action">${esc(ev.action)}</div>
            ${ev.detail ? `<div class="feed-detail">${esc(ev.detail)}</div>` : ''}
            <div class="feed-meta">
              ${instLabel}
              <span class="feed-ts">${esc(ev.ts)}</span>
            </div>
          </div>
        </div>`;
      }).join('');

  // Sidebar stats
  const totalEvents  = allEvents.length;
  const instActive   = new Set(allEvents.slice(0, 100).map(e => e.instId)).size;
  const woEvents     = allEvents.filter(ev => ev.action.toLowerCase().includes('work') || ev.action.toLowerCase().includes('wo')).length;
  const certEvents   = allEvents.filter(ev => ev.action.toLowerCase().includes('cert')).length;

  // Most active instruments (top 5)
  const instEventCount = {};
  allEvents.forEach(ev => {
    if (ev.inst) instEventCount[ev.instId] = (instEventCount[ev.instId]||0) + 1;
  });
  const topInst = Object.entries(instEventCount)
    .sort((a,b) => b[1]-a[1])
    .slice(0,10)
    .map(([id,count]) => {
      const inst = db.instruments.find(i => i.id === Number(id));
      return inst ? { inst, count } : null;
    }).filter(Boolean);

  return `
  <div class="section-hdr">
    <div class="section-title">Activity Feed</div>
    <div style="font-family:var(--font-mono);font-size:10px;color:var(--subtle)">${totalEvents} total events across ${db.instruments.length} instruments</div>
  </div>

  <div class="activity-grid">

    <!-- MAIN FEED -->
    <div>
      <div class="activity-filter-bar">
        <div class="wo-tabs">${FILTERS.map(f => `<button class="wo-tab ${ui.actFilter===f?'active':''}" onclick="ui.actFilter='${f}';render()">${f.toUpperCase()}</button>`).join('')}</div>
        <div style="display:flex;align-items:center;gap:8px;margin-top:10px;flex-wrap:wrap">
          <label style="font-family:var(--font-mono);font-size:10px;font-weight:600;color:var(--subtle);letter-spacing:.06em">FROM</label>
          <input type="date" id="act-date-from" class="form-input" style="width:140px;padding:4px 8px;font-size:11px" value="${ui.actDateFrom||''}" onchange="ui.actDateFrom=this.value;render()"/>
          <label style="font-family:var(--font-mono);font-size:10px;font-weight:600;color:var(--subtle);letter-spacing:.06em">TO</label>
          <input type="date" id="act-date-to" class="form-input" style="width:140px;padding:4px 8px;font-size:11px" value="${ui.actDateTo||''}" onchange="ui.actDateTo=this.value;render()"/>
          ${(ui.actDateFrom||ui.actDateTo) ? `<button class="btn-clear-sm" onclick="ui.actDateFrom='';ui.actDateTo='';render()" style="font-size:10px;padding:3px 8px">✕ Clear dates</button>` : ''}
        </div>
        <div class="search-box" style="max-width:220px;margin-left:auto">
          <span class="search-icon">⌕</span>
          <input placeholder="Search events..." value="${esc(ui.actSearch||'')}" id="act-search" oninput="ui.actSearch=this.value;filterActivity(this.value)"/>
          ${ui.actSearch ? `<button onclick="ui.actSearch='';document.getElementById('act-search').value='';filterActivity('')" style="background:none;border:none;color:var(--subtle);cursor:pointer;padding:0 6px;font-size:13px" title="Clear">✕</button>` : ''}
        </div>
        <button class="btn-act" onclick="ui.actFilter='All';ui.actSearch='';ui.actDateFrom='';ui.actDateTo='';filterActivity('');render()" style="white-space:nowrap;font-size:10px">✕ Clear</button>
      </div>

      <div class="feed-card" id="act-feed">
        <div class="feed-hdr">
          <span style="font-family:var(--font-mono);font-size:10px;color:var(--subtle);letter-spacing:.06em;text-transform:uppercase">
            ${ui.actFilter === 'All' ? 'All Events' : ui.actFilter} · showing ${Math.min(displayed.length,500)} of ${filtered.length}
          </span>
          ${filtered.length > 500 ? `<span style="font-family:var(--font-mono);font-size:10px;color:var(--amber)">Showing latest 500 — use search to narrow</span>` : ''}
        </div>
        ${feedItems}
      </div>
    </div>

    <!-- SIDEBAR -->
    <div class="stat-sidebar">

      <div class="sidebar-card">
        <div class="sidebar-card-title">Fleet Summary</div>
        <div class="mini-stat-row">
          <span class="mini-stat-label">Total Events</span>
          <span class="mini-stat-val c-blue">${totalEvents}</span>
        </div>
        <div class="mini-stat-row">
          <span class="mini-stat-label">Work Order Events</span>
          <span class="mini-stat-val" style="color:var(--cyan)">${woEvents}</span>
        </div>
        <div class="mini-stat-row">
          <span class="mini-stat-label">Cert Events</span>
          <span class="mini-stat-val" style="color:var(--purple)">${certEvents}</span>
        </div>
        <div class="mini-stat-row">
          <span class="mini-stat-label">Instruments w/ History</span>
          <span class="mini-stat-val">${Object.keys(db.history||{}).length}</span>
        </div>
        <div class="mini-stat-row">
          <span class="mini-stat-label">Active Last 20 Events</span>
          <span class="mini-stat-val c-green">${instActive}</span>
        </div>
      </div>

      ${topInst.length > 0 ? `
      <div class="sidebar-card">
        <div class="sidebar-card-title">Most Active Instruments</div>
        ${topInst.map(({inst, count}) => `
        <div class="mini-stat-row" style="cursor:pointer" onclick="openHistory(${inst.id})">
          <span class="mini-stat-label">
            <div style="font-family:var(--font-mono);font-size:11px;color:var(--text)">${esc(inst.name)}</div>
            <div style="font-family:var(--font-mono);font-size:10px;color:var(--subtle)">${esc(inst.serial)}</div>
          </span>
          <span class="mini-stat-val c-blue">${count}</span>
        </div>`).join('')}
      </div>` : ''}

      <div class="sidebar-card">
        <div class="sidebar-card-title">Event Types</div>
        ${FILTERS.filter(f=>f!=='All').map(f => {
          const cnt = allEvents.filter(ev => filterMap[f] && filterMap[f](ev)).length;
          const pct = totalEvents > 0 ? Math.round((cnt/totalEvents)*100) : 0;
          return `
          <div class="mini-stat-row">
            <span class="mini-stat-label">${f}</span>
            <div style="display:flex;align-items:center;gap:6px">
              <div style="width:60px;height:4px;background:var(--surface3);border-radius:2px;overflow:hidden">
                <div style="width:${pct}%;height:100%;background:var(--blue);border-radius:2px"></div>
              </div>
              <span class="mini-stat-val" style="font-size:11px">${cnt}</span>
            </div>
          </div>`;
        }).join('')}
      </div>

    </div>
  </div>`;
}

// ── CERT TRACKER ───────────────────────────────────────────
function renderCertSection() {
  const openCount    = db.workOrders.filter(w => w.status !== 'Closed' && w.status !== 'Pending Closure').length;
  const closedCount  = db.workOrders.filter(w => w.status === 'Closed').length;
  const pendingCount = db.workOrders.filter(w => w.status === 'Pending Closure').length;
  const allCount     = db.workOrders.length;

  const q          = (ui.certSearch   || '').toLowerCase();
  const statusF    =  ui.certStatusF  || 'All Status';
  const dateFrom   =  ui.certDateFrom || '';
  const dateTo     =  ui.certDateTo   || '';

  // Apply filters to instruments
  function instMatches(i) {
    const matchSearch = !q
      || i.name.toLowerCase().includes(q)
      || i.serial.toLowerCase().includes(q)
      || (i.site||'').toLowerCase().includes(q);
    const st = certStatus(i);
    const matchStatus =
      statusF === 'All Status' ? true :
      statusF === 'Overdue'    ? st === 'overdue' :
      statusF === 'Due Soon'   ? st === 'due-soon' :
      statusF === 'OK'         ? st === 'ok' :
      statusF === 'Not Tracked'? !i.certIntervalMonths :
      statusF === 'No Date'    ? (i.certIntervalMonths && st === 'none') : true;
    const lcd = i.lastCertDate || '';
    const matchFrom = !dateFrom || lcd >= dateFrom;
    const matchTo   = !dateTo   || lcd <= dateTo;
    return matchSearch && matchStatus && matchFrom && matchTo;
  }

  // Summary counts across ALL tracked instruments (pre-filter)
  const tracked    = db.instruments.filter(i => !i.archived && i.certIntervalMonths);
  const overdueAll = tracked.filter(i => certStatus(i) === 'overdue').length;
  const dueSoonAll = tracked.filter(i => certStatus(i) === 'due-soon').length;
  const noCertAll  = tracked.filter(i => certStatus(i) === 'none').length;

  // Group by instrument type, applying filters per row
  const allTypes = [...new Set(db.instruments.filter(i => !i.archived).map(i => i.name))].sort();

  const groups = allTypes.map(type => {
    const instruments = db.instruments
      .filter(i => !i.archived && i.name === type && instMatches(i))
      .sort((a, b) => {
        const order = { overdue: 0, 'due-soon': 1, none: 2, ok: 3 };
        return (order[certStatus(a)] ?? 4) - (order[certStatus(b)] ?? 4);
      });

    if (instruments.length === 0) return '';

    const typeTracked = instruments.filter(i => i.certIntervalMonths);
    const typeOverdue = typeTracked.filter(i => certStatus(i) === 'overdue').length;
    const typeDueSoon = typeTracked.filter(i => certStatus(i) === 'due-soon').length;

    const statusDot = typeOverdue > 0
      ? `<span class="cert-overdue" style="padding:2px 7px">⚠ ${typeOverdue} OVERDUE</span>`
      : typeDueSoon > 0
        ? `<span class="cert-due-soon" style="padding:2px 7px">◉ ${typeDueSoon} DUE SOON</span>`
        : typeTracked.length > 0
          ? `<span class="cert-ok" style="padding:2px 7px">✓ ALL OK</span>`
          : `<span class="cert-none" style="padding:2px 7px">NOT CONFIGURED</span>`;

    const rows = instruments.map(i => {
      const due      = certDueDate(i.lastCertDate, i.certIntervalMonths);
      const intLabel = i.certIntervalMonths
        ? (i.certIntervalMonths % 12 === 0 ? `${i.certIntervalMonths/12} yr` : `${i.certIntervalMonths} mo`)
        : '—';
      return `<tr>
        <td>
          <div class="inst-name">${esc(i.name)}</div>
          <div class="inst-sn">${esc(i.serial)}</div>
        </td>
        <td style="font-family:var(--font-mono);font-size:11px;color:var(--muted)">
          ${i.lastCertDate ? esc(String(i.lastCertDate).slice(0,10)) : '<span style="color:var(--subtle)">—</span>'}
        </td>
        <td style="font-family:var(--font-mono);font-size:11px;color:var(--muted)">
          ${due ? esc(String(due).slice(0,10)) : '<span style="color:var(--subtle)">—</span>'}
        </td>
        <td style="font-family:var(--font-mono);font-size:11px;color:var(--subtle);text-align:center">${intLabel}</td>
        <td>${certBadge(i)}</td>
        <td>
          <div class="actions">
            <button class="btn-cert" onclick="openLogCert(${i.id})">◈ LOG CERT</button>
            <button class="btn-act btn-history" onclick="openHistory(${i.id})">▤ HISTORY</button>
          </div>
        </td>
      </tr>`;
    }).join('');

    return `
    <div class="group" style="margin-bottom:16px">
      <div class="group-hdr" onclick="toggleGroup('cert-${type}')" style="cursor:pointer">
        <div class="group-title">◈ ${esc(type)} <span class="group-count" style="margin-left:8px">${plural(instruments.length,'instrument')}</span></div>
        <div style="display:flex;align-items:center;gap:10px">${statusDot}<span class="group-chevron">▾</span></div>
      </div>
      <div class="group-body" id="cert-group-${type.replace(/\s/g,'_')}">
        <div class="inst-table">
          <table>
            <thead><tr>
              <th>INSTRUMENT / SERIAL</th>
              <th>LAST CERT DATE</th>
              <th>NEXT DUE</th>
              <th style="text-align:center">INTERVAL</th>
              <th>STATUS</th>
              <th>ACTIONS</th>
            </tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>
    </div>`;
  }).join('');

  const hasFilters = q || (statusF && statusF !== 'All Status') || dateFrom || dateTo;

  return `
  <div class="section-hdr print-hide">
    <div class="section-title">Instrument Certification Tracker</div>
  </div>
  <div style="display:flex;gap:12px;align-items:center;margin-bottom:18px;flex-wrap:wrap" class="print-hide">
    <div class="wo-tabs">
      <button class="wo-tab ${ui.woFilter==='Open'?'active':''}"    onclick="ui.woFilter='Open';render()">OPEN (${openCount})</button>
      <button class="wo-tab ${ui.woFilter==='Pending'?'active':''}" onclick="ui.woFilter='Pending';render()" style="${pendingCount>0?'color:var(--amber)':''}">⏳ PENDING${pendingCount>0?` (${pendingCount})`:''}</button>
      <button class="wo-tab ${ui.woFilter==='Closed'?'active':''}"  onclick="ui.woFilter='Closed';render()">CLOSED (${closedCount})</button>
      <button class="wo-tab ${ui.woFilter==='All'?'active':''}"     onclick="ui.woFilter='All';render()">ALL (${allCount})</button>
      <button class="wo-tab cert-tab ${ui.woFilter==='cert'?'active':''}" onclick="ui.woFilter='cert';render()">◈ CERT TRACKER</button>
    </div>
  </div>

  <div style="display:flex;gap:8px;align-items:center;margin-bottom:16px;flex-wrap:wrap" class="print-hide">
    <div class="search-box" style="min-width:220px;flex:1;max-width:320px">
      <span class="search-icon">⌕</span>
      <input placeholder="Search name / serial / site..." value="${esc(ui.certSearch||'')}" id="cert-search"
        oninput="ui.certSearch=this.value;filterCertTracker(this.value)"/>
      ${ui.certSearch ? `<button onclick="ui.certSearch='';document.getElementById('cert-search').value='';filterCertTracker('')" style="background:none;border:none;color:var(--subtle);cursor:pointer;padding:0 6px;font-size:13px" title="Clear">✕</button>` : ''}
    </div>
    <select class="filter-sel" onchange="ui.certStatusF=this.value;render()">
      <option value="All Status"   ${statusF==='All Status'  ?'selected':''}>All Status</option>
      <option value="Overdue"      ${statusF==='Overdue'     ?'selected':''}>Overdue</option>
      <option value="Due Soon"     ${statusF==='Due Soon'    ?'selected':''}>Due Soon</option>
      <option value="OK"           ${statusF==='OK'          ?'selected':''}>OK</option>
      <option value="No Date"      ${statusF==='No Date'     ?'selected':''}>No Date on File</option>
      <option value="Not Tracked"  ${statusF==='Not Tracked' ?'selected':''}>Not Tracked</option>
    </select>
    <input type="date" class="filter-sel" style="font-family:var(--font-mono);font-size:11px;cursor:pointer"
      value="${esc(dateFrom)}" title="Last cert from"
      onchange="ui.certDateFrom=this.value;render()"/>
    <input type="date" class="filter-sel" style="font-family:var(--font-mono);font-size:11px;cursor:pointer"
      value="${esc(dateTo)}" title="Last cert to"
      onchange="ui.certDateTo=this.value;render()"/>
    <button class="btn-act" onclick="ui.certSearch='';ui.certStatusF='All Status';ui.certDateFrom='';ui.certDateTo='';filterCertTracker('');render()" style="white-space:nowrap">✕ Clear</button>
  </div>

  ${overdueAll > 0 || dueSoonAll > 0 ? `
  <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center">
    <span style="font-family:var(--font-mono);font-size:11px;color:var(--subtle)">SUMMARY:</span>
    ${overdueAll > 0 ? `<span class="cert-overdue">⚠ ${overdueAll} OVERDUE</span>` : ''}
    ${dueSoonAll > 0 ? `<span class="cert-due-soon">◉ ${dueSoonAll} DUE WITHIN 90 DAYS</span>` : ''}
    ${noCertAll  > 0 ? `<span class="cert-none">${noCertAll} NO DATE ON FILE</span>` : ''}
  </div>` : ''}

  ${groups.replace(/^\s*$/, '') === '' ? `<div style="text-align:center;padding:40px;color:var(--subtle);font-family:var(--font-mono)">No instruments match your filters</div>` : groups}

  <div class="cert-table-footer" style="margin-top:8px">
    ◈ Instruments flagged amber are due within ${CERT_WARN_DAYS} days. Click ⚙ SET INTERVAL on any instrument to enable cert tracking. Intervals are set per instrument.
  </div>`;
}

// ── ADMIN TABLE HELPER ─────────────────────────────────────
function adminTable(cols, rows, addRow, tableId) {
  return `
    <div class="inst-table">
      <table${tableId ? ` id="${tableId}"` : ''}>
        <thead><tr>${cols.map(c => `<th>${c}</th>`).join('')}</tr></thead>
        <tbody>${rows.length === 0
          ? `<tr class="empty-row"><td colspan="${cols.length}">Nothing configured yet</td></tr>`
          : rows.join('')}
        </tbody>
      </table>
    </div>
    ${addRow ? `<div class="admin-add-row" style="border:1px solid var(--border);border-top:none;border-radius:0 0 6px 6px;background:var(--surface2)">${addRow}</div>` : ''}`;
}

// ── ADMIN ───────────────────────────────────────────────────
function renderAdmin() {
  if (!ui.adminUnlocked) { ui.modal = 'adminlogin'; ui.form = {}; return ''; }
  const instCount = {};
  const siteCount = {};
  db.instruments.forEach(i => {
    instCount[i.name] = (instCount[i.name]||0) + 1;
    if (i.site) siteCount[i.site] = (siteCount[i.site]||0) + 1;
  });

  const siteRows = db.sites.map((s, idx) => `<tr>
    <td><span class="inst-name" style="font-size:13px">${esc(s)}</span></td>
    <td style="color:var(--muted)">${plural(siteCount[s]||0,'instrument')} assigned</td>
    <td>${PROTECTED_SITES.includes(s)
      ? '<span style="font-family:var(--font-mono);font-size:10px;color:var(--muted)">protected</span>'
      : `<div style="display:flex;gap:6px">
           <button class="btn-edit-sm" onclick="openEditSite('${esc(s)}')">EDIT</button>
           <button class="btn-del-sm"  onclick="archiveSite(${idx})">ARCHIVE</button>
         </div>`}
    </td>
  </tr>`);
  const archivedSiteRows = (db.archivedSites||[]).map(s => `<tr class="row-archived">
    <td><span class="inst-name" style="font-size:13px">${esc(s)}</span></td>
    <td><span class="badge-archived">ARCHIVED</span></td>
    <td>
      <div style="display:flex;gap:6px">
        <button class="btn-restore" onclick="restoreSite('${esc(s)}')">RESTORE</button>
        <button class="btn-del-sm"  onclick="permanentlyDeleteSite('${esc(s)}')">DELETE</button>
      </div>
    </td>
  </tr>`);

  const typeRows = db.instTypes.map((t, idx) => `<tr>
    <td><span class="inst-name" style="font-size:13px">${esc(t)}</span></td>
    <td style="color:var(--muted)">${plural(instCount[t]||0,'instrument')}</td>
    <td>
      <div style="display:flex;gap:6px">
        <button class="btn-edit-sm" onclick="openEditType(${idx})">EDIT</button>
        <button class="btn-del-sm"  onclick="archiveInstType(${idx})">ARCHIVE</button>
      </div>
    </td>
  </tr>`);

  // ── USER CREDENTIALS TABLE ──────────────────────────────
  const ROLES        = ['Operator','Supervisor','Chief','Admin'];
  const PERMISSIONS  = ['View','Edit','Full Control'];
  const permColor    = p => p==='Full Control' ? 'var(--purple)' : p==='Edit' ? 'var(--blue)' : 'var(--slate)';
  const permBg       = p => p==='Full Control' ? 'rgba(167,139,250,.12)' : p==='Edit' ? 'rgba(34,211,238,.09)' : 'rgba(148,163,184,.09)';
  const permBorder   = p => p==='Full Control' ? 'rgba(167,139,250,.3)' : p==='Edit' ? 'rgba(34,211,238,.22)' : 'rgba(148,163,184,.2)';
  const roleColor    = r => r==='Admin' ? 'var(--red)' : r==='Chief'||r==='Supervisor' ? 'var(--amber)' : 'var(--green)';
  const roleBg       = r => r==='Admin' ? 'rgba(248,113,113,.1)' : r==='Chief'||r==='Supervisor' ? 'rgba(251,191,36,.09)' : 'rgba(52,211,153,.09)';
  const roleBorder   = r => r==='Admin' ? 'rgba(248,113,113,.25)' : r==='Chief'||r==='Supervisor' ? 'rgba(251,191,36,.25)' : 'rgba(52,211,153,.22)';

  function userBadge(val, color, bg, border) {
    return `<span style="font-family:var(--font-mono);font-size:10px;font-weight:600;letter-spacing:.05em;padding:2px 9px;border-radius:var(--radius);background:${bg};color:${color};border:1px solid ${border}">${esc(val)}</span>`;
  }

  const techRows = db.techs.map((t, idx) => {
    const uname   = t.username || generateUsername(t.name);
    const isAdmin = uname === 'admin';
    const tempPw  = t.tempPassword || '';
    const status  = t.archived ? 'Archived' : 'Active';
    const perm    = t.permission || 'Edit';
    const role    = t.role || 'Operator';
    return `<tr>
      <td style="font-family:var(--font-mono);font-size:12px;font-weight:600;color:var(--blue)">${esc(uname)}</td>
      <td><div class="inst-name" style="font-size:13px">${esc(t.name)}</div></td>
      <td>${userBadge(role, roleColor(role), roleBg(role), roleBorder(role))}</td>
      <td><span style="font-family:var(--font-mono);font-size:10px;font-weight:600;padding:2px 9px;border-radius:var(--radius);background:rgba(52,211,153,.09);color:var(--green);border:1px solid rgba(52,211,153,.22)">${status}</span></td>
      <td>${userBadge(perm, permColor(perm), permBg(perm), permBorder(perm))}</td>
      <td style="font-family:var(--font-mono);font-size:11px;color:var(--muted)">${tempPw ? esc(tempPw) : '<span style="color:var(--subtle)">—</span>'}</td>
      <td>
        <div style="display:flex;gap:6px;align-items:center">
          ${isAdmin
            ? `<button class="btn-edit-sm" onclick="openEditTech(${idx})">Edit</button>
               <span style="font-family:var(--font-mono);font-size:10px;color:var(--subtle)">protected</span>`
            : `<button class="btn-edit-sm" onclick="openEditTech(${idx})">Edit</button>
               <button class="btn-del-sm"  onclick="archiveTech(${idx})">Archive</button>`}
        </div>
      </td>
    </tr>`;
  });

  const archivedTypeRows = (db.archivedTypes||[]).map(t => `<tr class="row-archived">
    <td><span class="inst-name" style="font-size:13px">${esc(t)}</span></td>
    <td><span class="badge-archived">ARCHIVED</span></td>
    <td>
      <div style="display:flex;gap:6px">
        <button class="btn-restore" onclick="restoreInstType('${esc(t)}')">RESTORE</button>
        <button class="btn-del-sm"  onclick="permanentlyDeleteType('${esc(t)}')">DELETE</button>
      </div>
    </td>
  </tr>`);
  const archivedTechRows = (db.archivedTechs||[]).map((t, idx) => `<tr class="row-archived">
    <td><div class="inst-name" style="font-size:13px">${esc(t.name)}</div><div class="inst-sn">${esc(t.role||'Technician')}</div></td>
    <td style="color:var(--muted);font-family:var(--font-mono);font-size:11px">${esc(t.email||'—')}</td>
    <td>
      <div style="display:flex;gap:6px">
        <button class="btn-restore" onclick="restoreTech(${idx})">RESTORE</button>
        <button class="btn-del-sm"  onclick="permanentlyDeleteTech(${idx})">DELETE</button>
      </div>
    </td>
  </tr>`);

  const instrSearch = (ui.adminInstrSearch||'').toLowerCase();
  const activeInstr  = db.instruments.filter(i => !i.archived);
  const archivedInstr = db.instruments.filter(i => i.archived);
  const instrList   = instrSearch
    ? activeInstr.filter(i => i.name.toLowerCase().includes(instrSearch) || i.serial.toLowerCase().includes(instrSearch) || (i.site||'').toLowerCase().includes(instrSearch))
    : activeInstr;
  const instrRows = instrList.map(i => `<tr>
    <td>
      <div class="inst-name" style="font-size:13px">${esc(i.name)}</div>
      <div class="inst-sn">${esc(i.serial)}</div>
    </td>
    <td style="color:var(--muted)">${esc(i.site||'—')}</td>
    <td><span class="${statusClass(i.status)}" style="padding:3px 8px;border-radius:var(--radius);font-size:11px;font-weight:500">${esc(i.status)}</span></td>
    <td>
      <div style="display:flex;gap:6px">
        <button class="btn-edit-sm" onclick="openEditInstrument(${i.id})">EDIT</button>
        <button class="btn-del-sm"  onclick="archiveInstrument(${i.id})">ARCHIVE</button>
      </div>
    </td>
  </tr>`);
  const archivedInstrRows = archivedInstr.map(i => `<tr class="row-archived">
    <td>
      <div class="inst-name" style="font-size:13px">${esc(i.name)}</div>
      <div class="inst-sn">${esc(i.serial)}</div>
    </td>
    <td style="color:var(--muted)">${esc(i.archivedDate||'—')}</td>
    <td><span class="badge-archived">ARCHIVED</span></td>
    <td>
      <div style="display:flex;gap:6px">
        <button class="btn-restore" onclick="restoreInstrument(${i.id})">RESTORE</button>
        <button class="btn-del-sm" onclick="permanentlyDeleteInstrument(${i.id})">DELETE</button>
      </div>
    </td>
  </tr>`);

  return `
  <div class="section-hdr">
    <div class="section-title">Administration</div>
    <div style="display:flex;gap:8px;align-items:center">
      <button class="btn-export" onclick="openChangePassword()">🔑 Change Password</button>
      <button class="btn-export" onclick="exportCSV()">↓ EXPORT CSV</button>
      <button class="btn-del-sm" style="padding:6px 12px" onclick="lockAdmin()">🔒 LOCK</button>
    </div>
  </div>

  <div class="group">
    <div class="group-hdr" onclick="toggleAdminSection(this)">
      <div class="group-title">⊟ Instruments<span class="group-chevron">▼</span></div>
      <div class="group-count">${instrSearch ? `${instrList.length} of ${activeInstr.length}` : plural(activeInstr.length,'instrument')}${archivedInstr.length > 0 ? ` · <span style="color:var(--subtle)">${archivedInstr.length} archived</span>` : ''}</div>
      <button class="btn-add-sm" style="margin-left:12px" onclick="openAdd()">+ ADD INSTRUMENT</button>
    </div>
    <div class="toolbar" style="margin-bottom:12px">
      <div class="search-box" style="max-width:100%">
        <span class="search-icon">⌕</span>
        <input id="admin-instr-search" placeholder="Search type, serial, site..." oninput="ui.adminInstrSearch=this.value;filterTable('admin-instr-table',this.value)" value="${esc(ui.adminInstrSearch||'')}"/>
        ${ui.adminInstrSearch ? `<button onclick="ui.adminInstrSearch='';document.getElementById('admin-instr-search').value='';filterTable('admin-instr-table','')" style="background:none;border:none;color:var(--subtle);cursor:pointer;padding:0 6px;font-size:13px">✕</button>` : ''}
      </div>
    </div>
    ${adminTable(['Type / Serial','Site','Status',''], instrRows,'','admin-instr-table')}
    ${archivedInstr.length > 0 ? `
    <div style="margin-top:16px">
      <div class="archived-section-hdr">
        Archived Instruments (${archivedInstr.length})
      </div>
      ${adminTable(['Type / Serial','Archived Date','',''], archivedInstrRows,'')}
    </div>` : ''}
  </div>

  <div class="group">
    <div class="group-hdr" onclick="toggleAdminSection(this)">
      <div class="group-title">◎ Monitoring Sites<span class="group-chevron">▼</span></div>
      <div class="group-count">${plural(db.sites.length,'site')}${(db.archivedSites||[]).length > 0 ? ` · <span style="color:var(--subtle)">${db.archivedSites.length} archived</span>` : ''}</div>
    </div>
    ${adminTable(['Site Code / ID','Instruments Assigned',''], siteRows, '')}
    <div class="admin-add-row" style="border:1px solid var(--border);border-top:none;border-radius:0 0 6px 6px;background:var(--surface2)">
      <button class="btn-add-sm" onclick="openAddSite()">+ Add Site</button>
    </div>
    ${(db.archivedSites||[]).length > 0 ? `
    <div style="margin-top:16px">
      <div class="archived-section-hdr">
        Archived Sites (${(db.archivedSites||[]).length})
      </div>
      ${adminTable(['Site Code / ID','',''], archivedSiteRows,'')}
    </div>` : ''}
  </div>

  <div class="group">
    <div class="group-hdr" onclick="toggleAdminSection(this)">
      <div class="group-title">⊞ Instrument Types<span class="group-chevron">▼</span></div>
      <div class="group-count">${plural(db.instTypes.length,'type')}${(db.archivedTypes||[]).length > 0 ? ` · <span style="color:var(--subtle)">${db.archivedTypes.length} archived</span>` : ''}</div>
    </div>
    ${adminTable(['Type Name','Total Instruments',''], typeRows, '')}
    <div class="admin-add-row" style="border:1px solid var(--border);border-top:none;border-radius:0 0 6px 6px;background:var(--surface2)">
      <input id="new-type" class="admin-input" placeholder="e.g. BC1060"
        value="${esc(ui.newType||'')}"
        oninput="ui.newType=this.value"
        onkeydown="if(event.key==='Enter')addInstType()"/>
      <button class="btn-add-sm" onclick="addInstType()">+ Add Type</button>
    </div>
    ${(db.archivedTypes||[]).length > 0 ? `
    <div style="margin-top:16px">
      <div class="archived-section-hdr">
        Archived Types (${(db.archivedTypes||[]).length})
      </div>
      ${adminTable(['Type Name','',''], archivedTypeRows,'')}
    </div>` : ''}
  </div>

  <div class="group">
    <div class="group-hdr" onclick="toggleAdminSection(this)">
      <div class="group-title">◈ User Credentials<span class="group-chevron">▼</span></div>
      <div class="group-count">${plural(db.techs.length,'user')}${(db.archivedTechs||[]).length > 0 ? ` · <span style="color:var(--subtle)">${db.archivedTechs.length} archived</span>` : ''}</div>
    </div>
    <div class="inst-table">
      <table>
        <thead><tr>
          <th>USERNAME</th>
          <th>DISPLAY NAME</th>
          <th>ROLE</th>
          <th>STATUS</th>
          <th>PERMISSION</th>
          <th>TEMP PASSWORD</th>
          <th>ACTIONS</th>
        </tr></thead>
        <tbody>
          <tr>
            <td style="font-family:var(--font-mono);font-size:12px;font-weight:600;color:var(--blue)">admin</td>
            <td><div class="inst-name" style="font-size:13px">System Administrator</div></td>
            <td><span style="font-family:var(--font-mono);font-size:10px;font-weight:600;padding:2px 9px;border-radius:var(--radius);background:rgba(248,113,113,.1);color:var(--red);border:1px solid rgba(248,113,113,.25)">admin</span></td>
            <td><span style="font-family:var(--font-mono);font-size:10px;font-weight:600;padding:2px 9px;border-radius:var(--radius);background:rgba(52,211,153,.09);color:var(--green);border:1px solid rgba(52,211,153,.22)">Active</span></td>
            <td><span style="font-family:var(--font-mono);font-size:10px;font-weight:600;padding:2px 9px;border-radius:var(--radius);background:rgba(167,139,250,.12);color:var(--purple);border:1px solid rgba(167,139,250,.3)">Full Control</span></td>
            <td style="font-family:var(--font-mono);font-size:11px;color:var(--subtle)">—</td>
            <td><span style="font-family:var(--font-mono);font-size:10px;color:var(--subtle)">protected</span></td>
          </tr>
          ${techRows.join('')}
        </tbody>
      </table>
    </div>

    <!-- ADD NEW USER FORM -->
    <div style="border:1px solid var(--border);border-top:none;border-radius:0 0 var(--radius-lg) var(--radius-lg);padding:18px 20px;background:var(--surface2)">
      <div style="font-family:var(--font-mono);font-size:11px;font-weight:600;color:var(--blue);letter-spacing:.08em;margin-bottom:14px">+ ADD NEW USER</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">
        <div>
          <div class="form-label" style="margin-bottom:4px">USERNAME *</div>
          <input id="new-tech-username" class="form-input" placeholder="e.g. jsmith"
            autocapitalize="none" spellcheck="false"
            value="${esc(ui.newTechUsername||'')}"
            oninput="ui.newTechUsername=this.value"/>
        </div>
        <div>
          <div class="form-label" style="margin-bottom:4px">DISPLAY NAME *</div>
          <input id="new-tech-name" class="form-input" placeholder="e.g. John Smith"
            value="${esc(ui.newTechName||'')}"
            oninput="ui.newTechName=this.value;ui.newTechUsername=ui.newTechUsername||generateUsername(this.value)"/>
        </div>
        <div>
          <div class="form-label" style="margin-bottom:4px">ROLE</div>
          <select id="new-tech-role" class="form-input"
            onchange="ui.newTechRole=this.value">
            <option value="Operator" ${(ui.newTechRole||'Operator')==='Operator'?'selected':''}>Operator</option>
            <option value="Supervisor" ${ui.newTechRole==='Supervisor'?'selected':''}>Supervisor</option>
            <option value="Chief" ${ui.newTechRole==='Chief'?'selected':''}>Chief</option>
            <option value="Admin" ${ui.newTechRole==='Admin'?'selected':''}>Admin</option>
          </select>
        </div>
        <div>
          <div class="form-label" style="margin-bottom:4px">PERMISSION</div>
          <select id="new-tech-permission" class="form-input"
            onchange="ui.newTechPermission=this.value">
            <option value="View" ${(ui.newTechPermission||'View')==='View'?'selected':''}>View</option>
            <option value="Edit" ${ui.newTechPermission==='Edit'?'selected':''}>Edit</option>
            <option value="Full Control" ${ui.newTechPermission==='Full Control'?'selected':''}>Full Control</option>
          </select>
        </div>
        <div>
          <div class="form-label" style="margin-bottom:4px">EMAIL (OPTIONAL)</div>
          <input id="new-tech-email" class="form-input" placeholder="user@sdapcd.gov"
            value="${esc(ui.newTechEmail||'')}"
            oninput="ui.newTechEmail=this.value"/>
        </div>
        <div>
          <div class="form-label" style="margin-bottom:4px">TEMPORARY PASSWORD</div>
          <input id="new-tech-temppw" class="form-input" placeholder="Default: circuit"
            value="${esc(ui.newTechTempPw||'circuit')}"
            oninput="ui.newTechTempPw=this.value"/>
        </div>
      </div>
      <button class="btn-add-sm" onclick="addTech()">+ Add User</button>
    </div>

    ${(db.archivedTechs||[]).length > 0 ? `
    <div style="margin-top:16px">
      <div class="archived-section-hdr">Archived Users (${(db.archivedTechs||[]).length})</div>
      <div class="inst-table">
        <table>
          <thead><tr><th>USERNAME</th><th>DISPLAY NAME</th><th>ROLE</th><th>STATUS</th><th>ACTIONS</th></tr></thead>
          <tbody>${(db.archivedTechs||[]).map((t, idx) => `<tr class="row-archived">
            <td style="font-family:var(--font-mono);font-size:12px;color:var(--subtle)">${esc(t.username||generateUsername(t.name))}</td>
            <td><div class="inst-name" style="font-size:13px">${esc(t.name)}</div></td>
            <td style="font-family:var(--font-mono);font-size:11px;color:var(--subtle)">${esc(t.role||'Operator')}</td>
            <td><span class="badge-archived">ARCHIVED</span></td>
            <td><div style="display:flex;gap:6px">
              <button class="btn-restore" onclick="restoreTech(${idx})">RESTORE</button>
              <button class="btn-del-sm"  onclick="permanentlyDeleteTech(${idx})">DELETE</button>
            </div></td>
          </tr>`).join('')}</tbody>
        </table>
      </div>
    </div>` : ''}

    <div style="padding:10px 14px;font-family:var(--font-mono);font-size:10px;color:var(--subtle);line-height:1.8;border-top:1px solid var(--border2);margin-top:4px">
      <strong style="color:var(--muted)">Permissions:</strong> View = read only. Edit = create/update records. Full Control = all edit access plus admin-level operations.<br>
      <strong style="color:var(--muted)">Roles:</strong> Operator = standard staff. Supervisor / Chief = can see/edit everything except Credentials tab; can authorize deletions. Admin = full system access.
    </div>
  </div>

    <div class="group">
    <div class="group-hdr" onclick="toggleAdminSection(this)">
      <div class="group-title">Statuses<span class="group-chevron">▼</span></div>
      <div class="group-count">${plural((db.customStatuses||[]).length, 'custom status')}</div>
    </div>
    ${adminTable(
      ['Status Name','Instruments Using',''],
      (db.customStatuses||[]).map((s, idx) => {
        const n = db.instruments.filter(i => i.status === s && !i.archived).length;
        return '<tr><td><span class="inst-name" style="font-size:13px">' + esc(s) + '</span></td><td style="color:var(--muted);font-size:12px">' + n + ' instrument' + (n===1?'':'s') + '</td><td><button class="btn-del-sm" onclick="removeCustomStatus(' + idx + ')">REMOVE</button></td></tr>';
      }),
      '<input id="new-status" class="admin-input" placeholder="e.g. Out of Service" onkeydown="if(event.key===\'Enter\')addCustomStatus()"/>' +
      '<button class="btn-add-sm" onclick="addCustomStatus()">+ Add Status</button>'
    )}
    <div style="margin-top:8px;font-family:var(--font-mono);font-size:10px;color:var(--subtle)">Built-in statuses (Operational, Maintenance, Repair, Calibration, Offline, Deployed, At Vendor) cannot be removed.</div>
  </div>

  <div class="group">
    <div class="group-hdr" onclick="toggleAdminSection(this)">
      <div class="group-title">🗑 Delete Log<span class="group-chevron">▼</span></div>
      <div class="group-count">${plural((db.deleteLog||[]).length,'record')}</div>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--surface2);border:1px solid var(--border);border-bottom:none;border-radius:var(--radius-lg) var(--radius-lg) 0 0">
      <div style="display:flex;align-items:center;gap:8px;font-family:var(--font-mono);font-size:11px;color:var(--muted)">
        <span style="color:var(--blue)">ⓘ</span> Records all permanent deletions. Visible to administrators only.
      </div>
      <button class="btn-export" onclick="exportDeleteLogCSV()">↓ Export CSV</button>
    </div>
    ${(db.deleteLog||[]).length === 0
      ? `<div style="text-align:center;padding:32px;color:var(--subtle);font-family:var(--font-mono);font-size:12px;background:var(--surface);border:1px solid var(--border);border-radius:0 0 var(--radius-lg) var(--radius-lg)">No deletions recorded yet.</div>`
      : `<div style="border:1px solid var(--border);border-top:none;border-radius:0 0 var(--radius-lg) var(--radius-lg);overflow:hidden">
          ${(db.deleteLog||[]).map(e => `
          <div style="padding:12px 16px;border-bottom:1px solid var(--border2);background:var(--surface)">
            <div style="font-family:var(--font-mono);font-size:10px;color:var(--subtle);margin-bottom:4px">${esc(e.ts)}</div>
            <div style="font-family:var(--font-mono);font-size:12px;color:var(--text)">
              <span style="color:var(--red);font-weight:600">[${esc(e.what||'DELETE')}]</span>
              <span style="color:var(--muted)"> ${esc(e.user)}</span> — ${esc(e.detail)}
            </div>
          </div>`).join('')}
        </div>`
    }
  </div>

  <div class="group">
    <div class="group-hdr" onclick="toggleAdminSection(this)">

function navigateTo(page) {

  // Admin page is accessible to Full Control users without extra password
  if (page === 'admin') {
    ui.adminUnlocked = true;
    ui.adminUnlockedAt = Date.now();
  }
  if (ui.modal && ui.dirty) {
    showConfirm({
      title: 'UNSAVED CHANGES',
      icon: '⚠',
      msg: 'You have unsaved changes in an open form. Navigating away will discard them.',
      detail: 'Discard changes and navigate?',
      onConfirm: () => {
        ui.dirty = false;
        if (page === 'workorders') ui.woFilter = 'Open';
        if (page === 'activity')   ui.actFilter = 'All';
        ui.page = page; render();
      }
    });

    if (page === 'workorders') ui.woFilter = 'Open';
    if (page === 'activity')   ui.actFilter = 'All';
    ui.page = page; render();
  }
}

function submitAdminPassword() {
  const pw = document.getElementById('admin-pw-input')?.value || '';
  if (!pw) { ui.form = {...ui.form, err: 'Please enter the password.'}; render(); return; }
  const stored = getStoredPassword('admin');
  if (pw !== stored) {
    ui.form = {...ui.form, err: 'Incorrect password. Try again.'};
    render();
    setTimeout(() => {
      const el = document.getElementById('admin-pw-input');
      if (el) { el.value = ''; el.focus(); }
    }, 50);
    return;
  }
  ui.adminUnlocked = true;
  ui.adminUnlockedAt = Date.now();
  ui.modal = null; ui.form = {};
  ui.page = 'admin';
  render();

  const current = document.getElementById('pw-current')?.value || '';
  const newPw   = document.getElementById('pw-new')?.value     || '';
  const confirm = document.getElementById('pw-confirm')?.value || '';
  const stored  = getStoredPassword('admin');

function updateSite(id, val) {
  const i = db.instruments.find(x => x.id === id);
  if (!i) return;
  const prev = i.site;
  showConfirm({
    title: 'CONFIRM SITE CHANGE',
    icon: '▶',
    msg: `Move <strong>${esc(i.name)}</strong> S/N ${esc(i.serial)} to a new site?`,
    detail: `${prev}  →  ${val}`,
    onConfirm: () => {
      addHistory(id, 'Site changed', `${prev} → ${val}`);
      i.site = val;
      if (val === 'VENDOR') {
        const prevStatus = i.status;
        i.status = 'At Vendor';
        addHistory(id, 'Status changed', `${prevStatus} → At Vendor (sent to vendor)`);
      } else if (val === 'HQ/SHOP') {
        if (i.status === 'At Vendor' || i.status === 'Deployed') {
          const prevStatus2 = i.status;
          i.status = 'Operational';
          addHistory(id, 'Status changed', `${prevStatus2} → Operational (returned to HQ/SHOP)`);
        }
      } else if (i.status === 'Operational') { // moving to field site
        i.status = 'Deployed';
        addHistory(id, 'Status changed', 'Operational → Deployed');
      }
      saveDB('instrument'); render(); toast(`Moved to ${val}`);
    }
  });
}

function attachLogWorkFiles(input) {
  const files = Array.from(input.files);
  if (!ui.form.attachments) ui.form.attachments = [];
  const inst = db.instruments.find(x => x.id === ui.form.instId);

  files.forEach(file => {
    if (file.size > 8 * 1024 * 1024) { toast('⚠ ' + file.name + ' too large — max 8MB'); return; }
    const reader = new FileReader();
    reader.onload = async e => {
      // Save current field values before any re-render
      const byEl    = document.getElementById('f-lw-by');
      const descEl  = document.getElementById('f-lw-desc');
      const dateEl  = document.getElementById('f-lw-date');
      const otherEl = document.getElementById('f-lw-other');
      if (byEl)    ui.form.by          = byEl.value;
      if (descEl)  ui.form.desc        = descEl.value;
      if (dateEl)  ui.form.date        = dateEl.value;
      if (otherEl) ui.form.otherReason = otherEl.value;

      // Add a placeholder while uploading
      const placeholderIdx = ui.form.attachments.length;
      ui.form.attachments.push({
        name: file.name,
        type: file.type.startsWith('image/') ? 'image' : 'pdf',
        uploading: true,
        data: e.target.result  // keep local copy as fallback
      });
      render();

      // Upload to Google Drive
      try {
        const result = await API.uploadFile(
          e.target.result,
          file.name,
          file.type,
          inst ? inst.name   : '',
          inst ? inst.serial : '',
          ui.form.workType || 'Work'
        );
        // Replace placeholder with Drive link
        ui.form.attachments[placeholderIdx] = {
          name:      file.name,
          type:      file.type.startsWith('image/') ? 'image' : 'pdf',
          fileId:    result.fileId,
          fileUrl:   result.fileUrl,
          directUrl: result.directUrl,
          data:      e.target.result  // keep local fallback
        };
        toast('📎 ' + file.name + ' uploaded to Drive');
      } catch(err) {
        // Drive upload failed — keep local base64 as fallback
        console.warn('Drive upload failed, keeping local:', err);
        ui.form.attachments[placeholderIdx] = {
          name: file.name,
          type: file.type.startsWith('image/') ? 'image' : 'pdf',
          data: e.target.result,
          localOnly: true
        };
        toast('⚠ Drive upload failed — file saved locally only');
      }
      render();
    };
    reader.readAsDataURL(file);
  });
}

function saveLogWork() {
  const byEl    = document.getElementById('f-lw-by');
  const descEl  = document.getElementById('f-lw-desc');
  const otherEl = document.getElementById('f-lw-other');
  const by      = byEl   ? byEl.value.trim()  : '';

  const { instId } = ui.form;
  const typeLabel = workType === 'Other' ? `Other — ${otherReason}` : workType;
  const attachNote = attachments.length > 0 ? ` · ${attachments.length} attachment${attachments.length>1?'s':''}` : '';
  addHistory(instId, `Work performed — ${typeLabel}`, `Tech: ${by} · ${desc.slice(0,120)}${attachNote}`);

  // Store attachments on the instrument record — use Drive links, strip raw base64
  if (attachments.length > 0) {
    const inst = db.instruments.find(x => String(x.id) === String(instId));
    if (inst) {
      if (!inst.workAttachments) inst.workAttachments = [];
      attachments.forEach(a => inst.workAttachments.push({
        name:      a.name,
        type:      a.type,
        fileId:    a.fileId    || null,
        fileUrl:   a.fileUrl   || null,
        directUrl: a.directUrl || null,
        localOnly: a.localOnly || false,
        // Only keep base64 if Drive upload failed (localOnly)
        data:      a.localOnly ? a.data : null,
        date:      today(),
        tech:      by,
        workType:  typeLabel
      }));
    }
  }

  try{saveDB('instrument', instId);}catch(e){console.warn('saveDB',e);} closeModal();
  toast('✓ Work entry logged');
}

function generateUsername(fullName) {
  // Format: first initial + last name, lowercase, letters only
  const parts = fullName.trim().split(/\s+/);
  if (parts.length < 2) return fullName.trim().toLowerCase().replace(/[^a-z]/g, '');
  const first = parts[0].replace(/[^a-zA-Z]/g, '');
  const last  = parts[parts.length - 1].replace(/[^a-zA-Z]/g, '');
  return (first[0] + last).toLowerCase();
}

function openEditSite(siteCode) {
  const idx  = db.sites.indexOf(siteCode);
  if (idx === -1) return;
  const meta = (db.sitesMeta || {})[siteCode] || { type:'Field', address:'', lat:'', lng:'', siteName:'' };
  ui.modal = 'editsite';
  ui.form  = { idx, val:siteCode, siteName:meta.siteName||'', type:meta.type||'Field', address:meta.address||'', lat:meta.lat||'', lng:meta.lng||'' };
  render();
}
function saveEditSite(idx) {
  const val      = getVal('f-val').toUpperCase().trim();
  const siteName = getVal('f-site-name').trim();
  const typeEl   = document.getElementById('f-site-type');
  const type     = typeEl ? typeEl.value : (ui.form.type||'Field');
  const address  = getVal('f-site-address').trim();
  const lat      = getVal('f-site-lat').trim();
  const lng      = getVal('f-site-lng').trim();
  if (!val) { ui.form={...ui.form,err:'Site code is required.'}; render(); return; }
  if (PROTECTED_SITES.includes(db.sites[idx])) { ui.form={...ui.form,err:'Protected site cannot be renamed.'}; render(); return; }
  if (db.sites.includes(val) && val !== db.sites[idx]) { ui.form={...ui.form,err:'Site already exists.'}; render(); return; }
  const old = db.sites[idx];
  if (old !== val) {
    db.sitesMeta[val] = db.sitesMeta[old] || {};
    delete db.sitesMeta[old];
    db.instruments.forEach(i => { if (i.site === old) i.site = val; });
  }
  db.sites[idx] = val;
  const existing = db.sitesMeta[val] || {};
  db.sitesMeta[val] = { ...existing, siteName, type, address, lat, lng };
  if (ui.selectedSite === old) ui.selectedSite = val;
  try{saveDB('site');}catch(e){console.warn('saveDB',e);} closeModal(); toast('✓ Site updated');
}

function openAddSite() {

function uploadSitePhoto(siteCode, input) {
  const files = Array.from(input.files);
  if (!files.length) return;
  if (!db.sitesMeta) db.sitesMeta = {};
  if (!db.sitesMeta[siteCode]) db.sitesMeta[siteCode] = {};
  // Migrate legacy single photo to array
  const meta = db.sitesMeta[siteCode];
  if (meta.photo && !meta.photos) { meta.photos = [meta.photo]; delete meta.photo; }
  if (!meta.photos) meta.photos = [];

  let loaded = 0;
  files.forEach(file => {
    if (file.size > 4 * 1024 * 1024) { toast('⚠ ' + file.name + ' too large — max 4MB per photo'); return; }
    const reader = new FileReader();
    reader.onload = e => {
      meta.photos.push(e.target.result);
      loaded++;
      if (loaded === files.length) {
        saveDB('site'); render();
        toast('✓ ' + loaded + ' photo' + (loaded > 1 ? 's' : '') + ' added to ' + siteCode);
      }
    };
    reader.readAsDataURL(file);
  });
}
function removeSitePhoto(siteCode, idx) {
  const meta = (db.sitesMeta || {})[siteCode];
  if (!meta) return;
  // Support both legacy and array
  if (meta.photos) {
    meta.photos.splice(idx, 1);
    if (meta.photos.length === 0) delete meta.photos;
  } else if (meta.photo) {
    delete meta.photo;
  }
  saveDB('site'); render(); toast('Photo removed');
}
function setSitePhotoActive(siteCode, idx) {
  // Bring clicked thumbnail to front (swap with index 0)
  const meta = (db.sitesMeta || {})[siteCode];
  if (!meta || !meta.photos) return;
  const tmp = meta.photos[0];
  meta.photos[0] = meta.photos[idx];
  meta.photos[idx] = tmp;
  render();
}

// ── SERVICE LOG ────────────────────────────────────────────
function renderServiceLog() {
  const WORK_TYPES = ['Maintenance','Calibration','Repair','Inspection','Other'];
  const q        = (ui.slSearch   || '').toLowerCase();
  const typeF    =  ui.slTypeF    || 'All Types';
  const techF    =  ui.slTechF    || 'All Techs';
  const dateFrom =  ui.slDateFrom || '';
  const dateTo   =  ui.slDateTo   || '';

  // Collect all log work entries from every instrument's history
  const entries = [];
  Object.entries(db.history || {}).forEach(([instId, hist]) => {
    const inst = db.instruments.find(i => String(i.id) === String(instId));
    if (!inst) return;
    (hist || []).forEach(h => {
      if (!(h.action || '').toLowerCase().includes('work performed')) return;
      // Parse work type from action string "Work performed — Calibration"
      const typePart = (h.action || '').split('—')[1]?.trim() || 'Work';
      const baseType = WORK_TYPES.find(t => typePart.toLowerCase().startsWith(t.toLowerCase())) || 'Other';
      // Parse tech from detail "Tech: jsmith · ..."
      const techMatch = (h.detail || '').match(/Tech:\s*([^·\n]+)/i);
      const tech = techMatch ? techMatch[1].trim() : '—';
      // Parse attachments count
      const attachMatch = (h.detail || '').match(/(\d+) attachment/i);
      const attachCount = attachMatch ? parseInt(attachMatch[1]) : 0;
      // Get actual attachment objects
      const attachments = attachCount > 0
        ? ((inst.workAttachments || []).filter(a => a.date === (h.ts||'').slice(0,10) && a.tech === tech))
        : [];
      entries.push({ instId, inst, h, typePart, baseType, tech, attachCount, attachments,
                     dateStr: (h.ts||'').slice(0,10) });
    });
  });

  // Sort newest first
  entries.sort((a, b) => (b.h.epoch||0) - (a.h.epoch||0));

  // Apply filters
  const filtered = entries.filter(e => {
    const matchQ = !q
      || e.inst.name.toLowerCase().includes(q)
      || e.inst.serial.toLowerCase().includes(q)
      || e.tech.toLowerCase().includes(q)
      || (e.h.detail||'').toLowerCase().includes(q)
      || e.typePart.toLowerCase().includes(q);
    const matchType = typeF === 'All Types' || e.baseType === typeF;
    const matchTech = techF === 'All Techs' || e.tech === techF;
    const matchFrom = !dateFrom || e.dateStr >= dateFrom;
    const matchTo   = !dateTo   || e.dateStr <= dateTo;
    return matchQ && matchType && matchTech && matchFrom && matchTo;
  });

  // All unique techs for filter dropdown
  const allTechs = [...new Set(entries.map(e => e.tech).filter(t => t && t !== '—'))].sort();

  // Type color map
  const typeColor = t => ({
    Maintenance: 'var(--blue)',   Calibration: 'var(--green)',
    Repair:      'var(--red)',    Inspection:  'var(--purple)',
    Other:       'var(--slate)'
  }[t] || 'var(--slate)');
  const typeBg = t => ({
    Maintenance: 'rgba(34,211,238,.09)',  Calibration: 'rgba(52,211,153,.09)',
    Repair:      'rgba(248,113,113,.09)', Inspection:  'rgba(167,139,250,.09)',
    Other:       'rgba(148,163,184,.09)'
  }[t] || 'rgba(148,163,184,.09)');
  const typeBorder = t => ({
    Maintenance: 'rgba(34,211,238,.25)',  Calibration: 'rgba(52,211,153,.25)',
    Repair:      'rgba(248,113,113,.25)', Inspection:  'rgba(167,139,250,.25)',
    Other:       'rgba(148,163,184,.25)'
  }[t] || 'rgba(148,163,184,.25)');

  const hasFilters = q || typeF !== 'All Types' || techF !== 'All Techs' || dateFrom || dateTo;

  const rows = filtered.length === 0
    ? `<tr class="empty-row"><td colspan="6" style="text-align:center;padding:28px;color:var(--subtle)">No service log entries match your filters</td></tr>`
    : filtered.map(e => {
        // Strip "Tech: X · " prefix from detail for cleaner display
        const detail = (e.h.detail || '').replace(/^Tech:[^·]+·\s*/i, '').replace(/·\s*\d+ attachments?/i,'').trim();
        const attachHtml = e.attachments.length > 0
          ? e.attachments.map(a =>
              `<a href="${a.fileUrl||a.data||'#'}" ${a.fileUrl?'target="_blank"':'download="'+esc(a.name)+'"'} style="display:inline-flex;align-items:center;gap:4px;padding:2px 7px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);font-family:var(--font-mono);font-size:10px;color:var(--blue);text-decoration:none;margin-right:4px;margin-top:3px">${a.type==='image'?'🖼':'📄'} ${esc(a.name)}${a.fileUrl?' ↗':''}</a>`
            ).join('')
          : e.attachCount > 0
            ? `<span style="font-family:var(--font-mono);font-size:10px;color:var(--subtle)">${e.attachCount} attachment${e.attachCount>1?'s':''}</span>`
            : '';
        return `<tr>
          <td style="font-family:var(--font-mono);font-size:11px;color:var(--subtle);white-space:nowrap">${esc(e.dateStr)}</td>
          <td>
            <div class="inst-name">${esc(e.inst.name)}</div>
            <div class="inst-sn">${esc(e.inst.serial)}</div>
          </td>
          <td><span style="font-family:var(--font-mono);font-size:10px;font-weight:600;padding:2px 9px;border-radius:var(--radius);background:${typeBg(e.baseType)};color:${typeColor(e.baseType)};border:1px solid ${typeBorder(e.baseType)}">${esc(e.typePart)}</span></td>
          <td style="font-family:var(--font-mono);font-size:11px;color:var(--muted)">${esc(e.tech)}</td>
          <td style="font-size:12px;color:var(--muted);max-width:260px;line-height:1.45">
            ${esc(detail)}
            ${attachHtml ? `<div style="margin-top:4px">${attachHtml}</div>` : ''}
          </td>
          <td>
            <button class="btn-act btn-history" onclick="openHistory(${e.instId})" style="font-size:10px">▤ History</button>
          </td>
        </tr>`;
      }).join('');

  return `
  <div class="section-hdr">
    <div class="section-title">▣ Service Log</div>
    <div style="font-family:var(--font-mono);font-size:11px;color:var(--subtle)">${filtered.length} entr${filtered.length===1?'y':'ies'}</div>
  </div>

  <div style="display:flex;gap:8px;align-items:center;margin-bottom:18px;flex-wrap:wrap">
    <div class="search-box" style="min-width:220px;flex:1;max-width:320px">
      <span class="search-icon">⌕</span>
      <input placeholder="Search instrument, serial, tech..." value="${esc(ui.slSearch||'')}" id="sl-search" oninput="ui.slSearch=this.value;filterTable('sl-table',this.value)"/>
      ${ui.slSearch ? `<button onclick="ui.slSearch='';document.getElementById('sl-search').value='';filterTable('sl-table','')" style="background:none;border:none;color:var(--subtle);cursor:pointer;padding:0 6px;font-size:13px" title="Clear">✕</button>` : ''}
    </div>
    <select class="filter-sel" onchange="ui.slTypeF=this.value;render()">
      <option value="All Types" ${typeF==='All Types'?'selected':''}>All Types</option>
      ${WORK_TYPES.map(t => `<option value="${esc(t)}" ${typeF===t?'selected':''}>${esc(t)}</option>`).join('')}
    </select>
    <select class="filter-sel" onchange="ui.slTechF=this.value;render()">
      <option value="All Techs" ${techF==='All Techs'?'selected':''}>All Techs</option>
      ${allTechs.map(t => `<option value="${esc(t)}" ${techF===t?'selected':''}>${esc(t)}</option>`).join('')}
    </select>
    <input type="date" class="filter-sel" style="font-family:var(--font-mono);font-size:11px;cursor:pointer"
      value="${esc(dateFrom)}" title="From date" onchange="ui.slDateFrom=this.value;render()"/>
    <input type="date" class="filter-sel" style="font-family:var(--font-mono);font-size:11px;cursor:pointer"
      value="${esc(dateTo)}" title="To date" onchange="ui.slDateTo=this.value;render()"/>
    <button class="btn-act" onclick="ui.slSearch='';ui.slTypeF='All Types';ui.slTechF='All Techs';ui.slDateFrom='';ui.slDateTo='';filterTable('sl-table','');render()" style="white-space:nowrap">✕ Clear</button>
  </div>

  <div class="inst-table">
    <table id="sl-table">
      <thead><tr>
        <th>DATE</th>
        <th>INSTRUMENT / SERIAL</th>
        <th>TYPE</th>
        <th>TECHNICIAN</th>
        <th>DESCRIPTION / FILES</th>
        <th></th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

// ── ADMIN COLLAPSIBLE SECTIONS ────────────────────────────────────────
function toggleAdminSection(el) {
  const group = el.closest('.group');
  if (!group) return;
  if (!ui._openAdminSections) ui._openAdminSections = new Set();
  const key = group.dataset.sectionKey;
  if (group.classList.contains('group-collapsed')) {
    group.classList.remove('group-collapsed');
    if (key) ui._openAdminSections.add(key);
  } else {
    group.classList.add('group-collapsed');
    if (key) ui._openAdminSections.delete(key);
  }
}
function setupAdminSections() {
  document.querySelectorAll('#root .group').forEach((group, i) => {
    const hdr = group.querySelector('.group-hdr');
    if (!hdr) return;
    if (!group.querySelector('.group-body')) {
      const body = document.createElement('div');
      body.className = 'group-body';
      Array.from(group.children).forEach(child => { if (child !== hdr) body.appendChild(child); });
      group.appendChild(body);
    }
    const key = 'admin_section_' + i;
    group.dataset.sectionKey = key;
    if (ui._openAdminSections && ui._openAdminSections.has(key)) {
      group.classList.remove('group-collapsed');
    } else {
      group.classList.add('group-collapsed');
    }
  });
}

// ── CONFIRM CLOSE WORK ORDER ─────────────────────────────────────────
function confirmCloseWO() {
  const woId     = ui.form.woId;
  const byEl     = document.getElementById('f-close-by');
  const confEl   = document.getElementById('f-close-confirm');
  const closedBy = byEl ? byEl.value : '';
  const confirmed = confEl ? confEl.checked : false;
  if (!closedBy) { ui.form={...ui.form,err:'Please select the technician who completed this work order.'}; render(); return; }
  if (!confirmed) { ui.form={...ui.form,err:'Please confirm all tasks are completed before closing.'}; render(); return; }
  const wo = db.workOrders.find(w => w.id === woId);
  if (!wo) return;
  wo.status = 'Closed'; wo.technician = closedBy; wo.closedBy = closedBy; wo.closedDate = today();
  addHistory(wo.instrumentId, 'Work order closed', 'WO-' + woId + ' · ' + wo.type + ' · Completed by: ' + closedBy);
  addSecurityLog('APPROVAL', `Approved closure of WO-${String(woId).padStart(3,'0')}.`);
  try{saveDB('workorder', wo.id);}catch(e){console.warn('saveDB',e);} closeModal();
  toast('✓ Work order WO-' + woId + ' marked complete');
}

// ── UNSAVED CHANGES — BROWSER CLOSE WARNING ─────────────
window.addEventListener('beforeunload', e => {
  if (ui.dirty) {
    e.preventDefault();
    e.returnValue = 'You have unsaved changes. Are you sure you want to leave?';
    return e.returnValue;
  }
});

// ── KEYBOARD ───────────────────────────────────────────────
document.addEventListener('keydown', e => { if (e.key === 'Escape' && ui.modal) { if (ui.modal === 'confirm') confirmCancel(); else if (ui.modal !== 'adminlogin') closeModal(); } });

// ══════════════════════════════════════════════════════════════
//  SERVER-SYNC LAYER
//  Overrides saveDB so every mutation is persisted to SQLite
//  via the REST API.  The in-memory `db` object still drives
//  all rendering — this layer just makes it durable.
// ══════════════════════════════════════════════════════════════

// Debounce timer — batches rapid consecutive saves into one request
let _syncTimer = null;

// Re-define saveDB to do a targeted push of only dirty records
window.saveDB = function saveDB(type, id) {
  if (type === 'instrument' && id !== undefined) markDirty('instruments', id);
  else if (type === 'workorder' && id !== undefined) markDirty('workOrders', id);
  else if (type === 'site')    markDirty('sites');
  else if (type === 'tech')    markDirty('techs');
  else if (type === 'type')    markDirty('types');
  else if (type === 'status')  markDirty('statuses');
  clearTimeout(_syncTimer);
  _syncTimer = setTimeout(syncToServer, 120);
};

// ── DIRTY TRACKING ─────────────────────────────────────────
// Instead of fetching full DB to diff, track what changed locally
const _dirty = { instruments: new Set(), workOrders: new Set(), sites: false, techs: false, types: false, statuses: false };

function markDirty(type, id) {
  if (id !== undefined) _dirty[type].add(String(id));
  else _dirty[type] = true;
}

async function syncToServer() {
  try {
    // ── INSTRUMENTS ─────────────────────────────────────────
    for (const instId of _dirty.instruments) {
      const inst = db.instruments.find(i => String(i.id) === instId);
      if (!inst) { await API.del('/instruments/' + instId).catch(()=>{}); continue; }
      if (!inst._synced) {
        // New instrument — POST
        const body = { name: inst.name, serial: inst.serial, status: inst.status, site: inst.site, notes: inst.notes||'' };
        const created = await API.post('/instruments', body).catch(()=>null);
        if (created) { inst.id = created.id; inst._synced = true; }
      } else {
        // Existing — PUT
        await API.put('/instruments/' + inst.id, {
          name: inst.name, serial: inst.serial, status: inst.status,
          site: inst.site, notes: inst.notes||'',
          archived: inst.archived ? 1 : 0,
          last_cert_date: inst.lastCertDate || null,
          cert_interval_months: inst.certIntervalMonths || null
        }).catch(()=>{});
      }
    }
    _dirty.instruments.clear();

    // ── WORK ORDERS ─────────────────────────────────────────
    for (const woId of _dirty.workOrders) {
      const wo = db.workOrders.find(w => String(w.id) === woId);
      if (!wo) { await API.del('/work-orders/' + woId).catch(()=>{}); continue; }
      if (!wo._synced) {
        const created = await API.post('/work-orders', {
          instrument_id: wo.instrumentId, type: wo.type||'',
          description: wo.description||'', tech_name: wo.technician||'', notes: wo.notes||''
        }).catch(()=>null);
        if (created) { wo.id = created.id; wo._synced = true; }
      } else {
        await API.put('/work-orders/' + wo.id, {
          status: wo.status, type: wo.type||'',
          description: wo.description||'', tech_name: wo.technician||'', notes: wo.notes||''
        }).catch(()=>{});
        if (wo.status === 'Closed') {
          await API.patch('/work-orders/' + wo.id + '/close', {}).catch(()=>{});
        }
      }
    }
    _dirty.workOrders.clear();

    // ── SITES ───────────────────────────────────────────────
    if (_dirty.sites) {
      for (const name of db.sites) {
        await API.post('/sites', { name }).catch(()=>{});
      }
      _dirty.sites = false;
    }

    // ── INST TYPES ──────────────────────────────────────────
    if (_dirty.types) {
      for (const name of db.instTypes) {
        await API.post('/inst-types', { name }).catch(()=>{});
      }
      _dirty.types = false;
    }

    // ── TECHS ───────────────────────────────────────────────
    if (_dirty.techs) {
      for (const t of db.techs) {
        await API.post('/technicians', { name: t.name, role: t.role||'', email: t.email||'' }).catch(()=>{});
      }
      _dirty.techs = false;
    }

    // ── CUSTOM STATUSES ─────────────────────────────────────
    if (_dirty.statuses) {
      for (const name of (db.customStatuses||[])) {
        await API.post('/custom-statuses', { name }).catch(()=>{});
      }
      _dirty.statuses = false;
    }

  } catch(e) {
    console.error('SDAPCD: sync to server failed', e);
    toast('⚠ Server sync failed — check that the server is running');
  }
}

// Mark instruments/WOs as synced on load
function markAllSynced() {
  (db.instruments||[]).forEach(i => { i._synced = true; });
  (db.workOrders||[]).forEach(w => { w._synced = true; });
}

// Admin password — now uses plain text from db (no hashing)
window.submitAdminPassword = function() {
  const pw = document.getElementById('admin-pw-input')?.value || '';
  if (!pw) { ui.form = {...ui.form, err: 'Please enter the password.'}; render(); return; }
  const stored = getStoredPassword('admin');
  if (pw !== stored) {
    ui.form = {...ui.form, err: 'Incorrect password. Try again.'}; render();
    setTimeout(() => { const el = document.getElementById('admin-pw-input'); if (el) { el.value=''; el.focus(); } }, 50);
    return;
  }
  ui.adminUnlocked = true; ui.adminUnlockedAt = Date.now();
  ui.modal = null; ui.form = {}; ui.page = 'admin'; render();
};

window.saveAdminPassword = function() {
  const current = document.getElementById('pw-current')?.value || '';
  const newPw   = document.getElementById('pw-new')?.value     || '';
  const confirm = document.getElementById('pw-confirm')?.value || '';
  const stored  = getStoredPassword('admin');
  if (current !== stored) { ui.form = {...ui.form, err: 'Current password is incorrect.'}; render(); return; }
  if (newPw.length < 1)   { ui.form = {...ui.form, err: 'New password cannot be empty.'}; render(); return; }
  if (newPw !== confirm)  { ui.form = {...ui.form, err: 'Passwords do not match.'}; render(); return; }
  setStoredPassword('admin', newPw);
  closeModal(); toast('Admin password updated');
};

// Danger-zone actions wired to server endpoints
window.confirmClearNotes = function() {
  showConfirm({
    title: 'CLEAR ALL NOTES', icon: '⚠',
    msg: 'This will remove all notes from every instrument.',
    detail: 'Instruments, sites, work orders, and history will not be affected.',
    onConfirm: async () => {
      db.instruments.forEach(i => { i.notes = ''; });
      await API.post('/admin/clear-notes', {});
      render(); toast('All instrument notes cleared');
    }
  });
};

window.confirmClearExceptSitesInst = function() {
  showConfirm({
    title: 'CLEAR ALL RECORDS', icon: '⚠',
    msg: 'This will delete all work orders, history, notes, technicians, and instrument types — keeping only your sites and instruments.',
    detail: 'Step 1 of 2 — confirm to proceed to final warning',
    onConfirm: () => {
      showConfirm({
        title: 'FINAL CONFIRMATION', icon: '⚠',
        msg: 'All work orders, history logs, notes, technicians, and types will be permanently deleted.',
        detail: 'Step 2 of 2 — this cannot be undone',
        onConfirm: async () => {
          db.workOrders = []; db.history = {}; db.woId = 1;
          db.techs = []; db.instTypes = ['BC1060', 'ESEQ'];
          db.instruments.forEach(i => { i.notes = ''; });
          await API.post('/admin/soft-reset', {});
          await loadDBFromServer();
          toast('Records cleared — sites and instruments preserved');
        }
      });
    }
  });
};

// ── SESSION TIMEOUT ────────────────────────────────────────
const SESSION_TIMEOUT_MS  = 20 * 60 * 1000; // 20 minutes
const SESSION_WARN_MS     = 2  * 60 * 1000; // warn 2 min before
let _sessionTimer  = null;
let _sessionWarnTimer = null;
let _sessionWarning = false;

function resetSessionTimer() {
  if (!ui.currentUser) return;
  clearTimeout(_sessionTimer);
  clearTimeout(_sessionWarnTimer);
  _sessionWarning = false;
  // Remove warning modal if showing
  const warnEl = document.getElementById('_session_warn');
  if (warnEl) warnEl.remove();

  _sessionWarnTimer = setTimeout(() => {
    if (!ui.currentUser) return;
    _sessionWarning = true;
    // Show warning overlay
    let warnDiv = document.getElementById('_session_warn');
    if (!warnDiv) {
      warnDiv = document.createElement('div');
      warnDiv.id = '_session_warn';
      document.body.appendChild(warnDiv);
    }
    warnDiv.innerHTML = `
      <div style="position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9999;display:flex;align-items:center;justify-content:center">
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-xl);padding:32px 28px;max-width:380px;width:100%;box-shadow:var(--shadow-lg);text-align:center">
          <div style="font-size:28px;margin-bottom:12px">⏱</div>
          <div style="font-family:var(--font-mono);font-size:14px;font-weight:700;color:var(--amber);letter-spacing:.04em;margin-bottom:8px">SESSION EXPIRING SOON</div>
          <div style="font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:20px">
            You will be automatically signed out in <strong style="color:var(--text)">2 minutes</strong> due to inactivity.<br>Click below to stay signed in.
          </div>
          <div style="display:flex;gap:10px;justify-content:center">
            <button onclick="resetSessionTimer()" style="background:linear-gradient(135deg,rgba(34,211,238,.15),rgba(34,211,238,.07));color:var(--blue);border:1px solid rgba(34,211,238,.3);padding:8px 22px;border-radius:var(--radius);font-size:12px;font-weight:600;font-family:var(--font-mono);cursor:pointer">
              ✓ Stay Signed In
            </button>
            <button onclick="signOut()" style="background:var(--surface2);color:var(--muted);border:1px solid var(--border);padding:8px 22px;border-radius:var(--radius);font-size:12px;font-family:var(--font-mono);cursor:pointer">
              Sign Out Now
            </button>
          </div>
        </div>
      </div>`;
  }, SESSION_TIMEOUT_MS - SESSION_WARN_MS);

  _sessionTimer = setTimeout(() => {
    if (!ui.currentUser) return;
    const warnEl2 = document.getElementById('_session_warn');
    if (warnEl2) warnEl2.remove();
    toast('⏱ Session expired — you have been signed out.');
    signOut();
  }, SESSION_TIMEOUT_MS);
}

// Reset timer on any user activity
['mousedown','keydown','touchstart','scroll','click'].forEach(evt =>
  document.addEventListener(evt, () => { if (ui.currentUser) resetSessionTimer(); }, { passive: true })
);

// ── BOOTSTRAP ──────────────────────────────────────────────
// Show a loading state then fetch real data from server
render(); // initial paint with empty db
loadDBFromServer(); // fetch from SQLite and re-render
</script>
