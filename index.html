<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SDAPCD / Instrument Management</title>
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>:root {
  /* ── CORE PALETTE ────────────────────────────────────── */
  --bg:        #0d1117;
  --surface:   rgba(22, 27, 34, 0.96);
  --surface2:  rgba(13, 17, 23, 0.97);
  --surface3:  rgba(30, 37, 48, 0.80);
  --border:    rgba(48, 54, 61, 0.85);
  --border2:   rgba(33, 38, 45, 0.70);

  /* accents */
  --blue:      #58a6ff;
  --blue-dim:  rgba(88,166,255,0.10);
  --cyan:      #58a6ff;
  --green:     #3fb950;
  --green-dim: rgba(63,185,80,0.10);
  --amber:     #d29922;
  --amber-dim: rgba(210,153,34,0.10);
  --red:       #f85149;
  --red-dim:   rgba(248,81,73,0.10);
  --purple:    #bc8cff;
  --purple-dim:rgba(188,140,255,0.10);
  --slate:     #8b949e;
  --slate-dim: rgba(139,148,158,0.10);

  /* text */
  --text:      #c9d1d9;
  --muted:     #8b949e;
  --subtle:    #484f58;

  /* typography */
  --font-body: 'IBM Plex Sans', system-ui, sans-serif;
  --font-mono: 'IBM Plex Mono', monospace;

  /* shape */
  --radius:    5px;
  --radius-lg: 9px;
  --radius-xl: 12px;

  /* elevation */
  --shadow-xs: 0 1px 2px rgba(0,0,0,.4);
  --shadow:    0 2px 6px rgba(0,0,0,.5), 0 1px 2px rgba(0,0,0,.4);
  --shadow-md: 0 8px 28px rgba(0,0,0,.65), 0 2px 8px rgba(0,0,0,.4);
  --shadow-lg: 0 20px 60px rgba(0,0,0,.7), 0 4px 16px rgba(0,0,0,.5);

  /* glows */
  --glow:      0 1px 3px rgba(88,166,255,.08);
  --glow-sm:   0 1px 2px rgba(88,166,255,.06);

  /* layout */
  --sb-width:  224px;
}

/* ── LIGHT MODE ─────────────────────────────────────────── */
[data-theme="light"] {
  --bg:        #f6f8fa;
  --surface:   rgba(255,255,255,0.99);
  --surface2:  rgba(246,248,250,0.99);
  --surface3:  rgba(234,238,242,0.95);
  --border:    rgba(208,215,222,0.95);
  --border2:   rgba(175,184,193,0.90);

  --blue:      #0969da;
  --blue-dim:  rgba(9,105,218,0.08);
  --cyan:      #0969da;
  --green:     #1a7f37;
  --green-dim: rgba(26,127,55,0.09);
  --amber:     #9a6700;
  --amber-dim: rgba(154,103,0,0.09);
  --red:       #cf222e;
  --red-dim:   rgba(207,34,46,0.09);
  --purple:    #8250df;
  --purple-dim:rgba(130,80,223,0.09);
  --slate:     #57606a;
  --slate-dim: rgba(87,96,106,0.09);

  --text:      #1f2328;
  --muted:     #57606a;
  --subtle:    #8c959f;

  --shadow-xs: 0 1px 2px rgba(0,0,0,.06);
  --shadow:    0 1px 4px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.05);
  --shadow-md: 0 4px 20px rgba(0,0,0,.1), 0 2px 6px rgba(0,0,0,.06);
  --shadow-lg: 0 8px 32px rgba(0,0,0,.14), 0 2px 8px rgba(0,0,0,.08);
  --glow:      0 0 14px rgba(26,86,219,.14);
  --glow-sm:   0 0 7px rgba(26,86,219,.1);
}
[data-theme="light"] body {
  background-color: #d1d5db;
  background-image:
    radial-gradient(ellipse 90% 55% at 15% -8%, rgba(148,163,184,.08) 0%, transparent 62%),
    radial-gradient(ellipse 65% 45% at 85% 108%, rgba(148,163,184,.06) 0%, transparent 58%),
    linear-gradient(168deg, #d1d5db 0%, #c8cdd6 50%, #ced3da 100%);
}
[data-theme="light"] #sidebar,
[data-theme="light"] .sidebar {
  background: #c8cdd6;
  border-right-color: rgba(100,116,139,0.25);
  box-shadow: 3px 0 24px rgba(0,0,0,.1);
}
[data-theme="light"] #sidebar::before,
[data-theme="light"] .sidebar::before { opacity:.28; }
[data-theme="light"] .sb-brand        { border-bottom-color: rgba(26,86,219,.09);   flex-shrink: 0;
}
[data-theme="light"] .brand           { text-shadow: none; color: var(--blue); }
[data-theme="light"] .breadcrumb      { color: var(--subtle); }
[data-theme="light"] .btn-nav         { color: var(--muted); }
[data-theme="light"] .btn-theme       { color: var(--muted); }
[data-theme="light"] .section-title   { text-shadow: none; color: var(--blue); }
[data-theme="light"] .stat-card       { backdrop-filter: none; }
[data-theme="light"] .inst-table      { backdrop-filter: none; }
[data-theme="light"] .inst-table tr:hover td { background: rgba(26,86,219,.022); }
[data-theme="light"] .modal           { background: rgba(255,255,255,0.99); }
[data-theme="light"] .overlay         { background: rgba(0,0,0,.38); }
[data-theme="light"] .feed-card       { backdrop-filter: none; }
[data-theme="light"] .sidebar-card    { backdrop-filter: none; }
[data-theme="light"] .filter-sel option       { background: #fff; color: #0e1626; }
[data-theme="light"] .status-sel option       { background: #fff; color: #0e1626; }
[data-theme="light"] .form-input option       { background: #fff; color: #0e1626; }
[data-theme="light"] .form-input {
  background: #ffffff;
  border-color: rgba(100,116,139,.3);
  color: #0e1626;
}
[data-theme="light"] .form-input:focus {
  border-color: rgba(26,86,219,.45);
  box-shadow: 0 0 0 3px rgba(26,86,219,.08);
  background: #ffffff;
}
[data-theme="light"] .form-input::placeholder { color: #94a3b8; }
[data-theme="light"] .modal-actions { background: rgba(220,224,230,.6); }
[data-theme="light"] .modal-sub { color: var(--muted); }
[data-theme="light"] .form-label { color: var(--muted); }
[data-theme="light"] .wo-field-label { color: var(--subtle); }
[data-theme="light"] .c-blue  { text-shadow: none; }
[data-theme="light"] .c-green { text-shadow: none; }
[data-theme="light"] .c-amber { text-shadow: none; }
[data-theme="light"] .c-red   { text-shadow: none; }
[data-theme="light"] .stat-card.active { background: rgba(100,116,139,.18); border-color: rgba(100,116,139,.4); }
[data-theme="light"] .stat-card.active .stat-num { text-shadow: none; }

/* ── RESET ──────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background-color: #080c14;
  background-image:
    radial-gradient(circle, rgba(48,68,100,0.35) 1px, transparent 1px),
    radial-gradient(ellipse 72% 46% at 10% -6%, rgba(34,211,238,.055) 0%, transparent 62%),
    radial-gradient(ellipse 62% 42% at 92% 108%, rgba(52,211,153,.045) 0%, transparent 58%),
    radial-gradient(ellipse 55% 62% at 50% 52%, rgba(20,28,42,0) 0%, #080c14 100%);
  background-size: 28px 28px, 100% 100%, 100% 100%, 100% 100%;
  background-attachment: fixed;
  color: var(--text);
  font-family: var(--font-body);
  min-height: 100vh;
  font-size: 13px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

@keyframes page-in { from { opacity:0; transform:translateY(3px) } to { opacity:1; transform:translateY(0) } }
#root { animation: page-in .25s ease both; }

::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(48,68,100,.65); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: rgba(34,211,238,.45); }

/* ── SIDEBAR ─────────────────────────────────────────────── */
#sidebar,
.sidebar {
  position: fixed;
  top: 0; left: 0; bottom: 0;
  width: var(--sb-width);
  background: rgba(8,12,20,0.99);
  border-right: 1px solid rgba(34,211,238,.1);
  box-shadow: 4px 0 36px rgba(0,0,0,.65);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  display: flex;
  flex-direction: column;
  z-index: 200;
  overflow: hidden;
}
#sidebar::before,
.sidebar::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent 0%, var(--blue) 35%, var(--green) 65%, transparent 100%);
  opacity: .82;
}
#sidebar::after,
.sidebar::after {
  content: '';
  position: absolute;
  top: 0; right: 0; bottom: 0;
  width: 1px;
  background: linear-gradient(180deg, rgba(34,211,238,.28) 0%, rgba(34,211,238,.04) 55%, transparent 100%);
  pointer-events: none;
}
.sb-brand {
  padding: 24px 18px 18px;
  border-bottom: 1px solid rgba(34,211,238,.07);
  flex-shrink: 0;
}
.brand {
  font-family: var(--font-mono);
  font-size: 17px; font-weight: 600;
  color: var(--blue);
  letter-spacing: .08em;
  text-shadow: 0 0 22px rgba(34,211,238,.5);
  display: block;
  margin-bottom: 5px;
}
.breadcrumb {
  font-size: 10px;
  color: var(--subtle);
  font-family: var(--font-mono);
  display: block;
  line-height: 1.65;
  letter-spacing: .02em;
}
.sb-nav {
  flex: 1;
  padding: 14px 10px;
  display: flex;
  flex-direction: column;
  gap: 2px;
  overflow-y: auto;
  min-height: 0;
}
.btn-nav {
  display: flex; align-items: center; gap: 10px;
  width: 100%; text-align: left;
  background: transparent;
  border: 1px solid transparent;
  color: var(--muted);
  padding: 9px 12px;
  border-radius: var(--radius);
  font-size: 13px; font-weight: 500;
  font-family: var(--font-mono); letter-spacing: .03em;
  cursor: pointer;
  transition: background .15s, color .15s, border-color .15s, box-shadow .15s;
}
.btn-nav:hover {
  border-color: rgba(34,211,238,.2);
  color: var(--blue);
  background: rgba(34,211,238,.07);
}
.btn-nav.active {
  border-color: rgba(34,211,238,.32);
  color: var(--blue);
  background: linear-gradient(135deg, rgba(34,211,238,.11) 0%, rgba(34,211,238,.04) 100%);
  font-weight: 600;
  box-shadow: inset 3px 0 0 var(--blue), var(--glow-sm);
}
.btn-nav .nav-icon { font-size: 16px; width: 22px; text-align: center; flex-shrink: 0; opacity: .9; }
.btn-nav.active .nav-icon { opacity: 1; }
.sb-footer {
  padding: 10px 10px 16px;
  border-top: 1px solid rgba(34,211,238,.07);
  display: flex;
  flex-direction: column;
  gap: 2px;
  flex-shrink: 0;
}
.btn-theme {
  display: flex; align-items: center; gap: 10px;
  width: 100%; text-align: left;
  background: transparent;
  border: 1px solid transparent;
  color: var(--subtle);
  padding: 8px 12px;
  border-radius: var(--radius);
  font-size: 11.5px; font-family: var(--font-mono);
  cursor: pointer;
  transition: background .15s, color .15s, border-color .15s;
  letter-spacing: .02em;
}
.btn-theme:hover { border-color: rgba(34,211,238,.2); color: var(--blue); background: rgba(34,211,238,.06); }
.btn-theme .nav-icon { font-size: 13px; width: 20px; text-align: center; flex-shrink: 0; }

/* ── LAYOUT ─────────────────────────────────────────────── */
.main {
  padding: 28px 32px;
  max-width: 1440px;
  margin: 0 auto;
  flex: 1;
  margin-left: var(--sb-width);
}
.section-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.section-title {
  font-size: 12px; font-weight: 600;
  color: var(--blue);
  font-family: var(--font-mono);
  letter-spacing: .12em; text-transform: uppercase;
  display: flex; align-items: center; gap: 10px;
  text-shadow: 0 0 12px rgba(34,211,238,.3);
}
.section-title::before {
  content: '';
  width: 3px; height: 14px;
  background: linear-gradient(180deg, var(--blue), rgba(34,211,238,.2));
  border-radius: 2px;
  flex-shrink: 0;
}

/* ── STAT CARDS ─────────────────────────────────────────── */
.stat-grid { display: grid; grid-template-columns: repeat(5,1fr); gap: 14px; margin-bottom: 28px; }
.stat-card {
  background: linear-gradient(145deg, rgba(20,28,44,0.92) 0%, rgba(14,20,34,0.96) 100%);
  border: 1px solid rgba(48,68,100,.62);
  border-radius: var(--radius-lg);
  padding: 18px 20px 16px;
  cursor: pointer;
  transition: transform .2s ease, border-color .2s, box-shadow .2s;
  box-shadow: var(--shadow);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  position: relative;
  overflow: hidden;
}
/* shimmer at top */
.stat-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent 10%, rgba(255,255,255,.08) 50%, transparent 90%);
}
/* bottom accent bar */
.stat-card::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 2px;
  background: var(--blue);
  opacity: 0;
  transform: scaleX(0);
  transform-origin: left;
  transition: opacity .2s, transform .22s ease;
}
.stat-card:hover { transform: translateY(-2px); border-color: rgba(34,211,238,.38); box-shadow: 0 6px 28px rgba(0,0,0,.55), var(--glow-sm); }
.stat-card:hover::after { opacity: 1; transform: scaleX(1); }
.stat-card.active { border-color: var(--border); background: transparent; box-shadow: none; }
.stat-card.active::after { opacity: 1; transform: scaleX(1); background: var(--slate); }
.stat-label { font-size: 9.5px; font-weight: 600; color: var(--subtle); letter-spacing: .11em; margin-bottom: 10px; text-transform: uppercase; font-family: var(--font-mono); }
.stat-num { font-size: 32px; font-weight: 600; line-height: 1; color: var(--text); font-family: var(--font-mono); letter-spacing: -.02em; }
.stat-card.active .stat-num { color: var(--slate); text-shadow: none; }
.c-blue  { color: var(--blue);   text-shadow: 0 0 12px rgba(34,211,238,.4); }
.c-green { color: var(--green);  text-shadow: 0 0 12px rgba(52,211,153,.35); }
.c-amber { color: var(--amber);  text-shadow: 0 0 12px rgba(251,191,36,.3); }
.c-slate { color: var(--slate); }
.c-red   { color: var(--red);    text-shadow: 0 0 12px rgba(248,113,113,.3); }
.stat-hint { font-size: 10px; color: var(--subtle); margin-top: 6px; font-family: var(--font-mono); }

/* ── TOOLBAR ────────────────────────────────────────────── */
.toolbar { display: flex; gap: 8px; align-items: center; margin-bottom: 18px; flex-wrap: wrap; position: sticky; top: 0; z-index: 20; background: var(--bg); padding: 10px 0; border-bottom: 1px solid var(--border2); }
.search-box {
  display: flex; align-items: center; gap: 8px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 0 12px; flex: 1; min-width: 200px; max-width: 320px;
  transition: border-color .15s, box-shadow .15s;
}
.search-box:focus-within { border-color: rgba(34,211,238,.42); box-shadow: 0 0 0 3px rgba(34,211,238,.06); }
.search-box input { background: transparent; border: none; outline: none; color: var(--text); font-family: var(--font-mono); font-size: 12px; padding: 8px 0; width: 100%; }
.search-box input::placeholder { color: var(--subtle); }
.search-icon { color: var(--subtle); font-size: 13px; }
.filter-sel {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: var(--radius);
  padding: 7px 10px;
  font-family: var(--font-mono); font-size: 11.5px;
  outline: none; cursor: pointer; min-width: 130px;
  transition: border-color .15s;
}
.filter-sel:focus { border-color: rgba(34,211,238,.4); }
.filter-sel option { background: #0d1220; color: var(--text); }
.btn-add {
  background: linear-gradient(135deg, rgba(34,211,238,.15) 0%, rgba(34,211,238,.06) 100%);
  color: var(--blue);
  border: 1px solid rgba(34,211,238,.3);
  padding: 7px 16px; border-radius: var(--radius);
  font-size: 12px; font-weight: 600;
  font-family: var(--font-mono); letter-spacing: .04em;
  cursor: pointer; display: inline-flex; align-items: center; gap: 6px;
  transition: all .15s; white-space: nowrap; margin-left: auto;
}
.btn-add:hover { background: rgba(34,211,238,.22); border-color: var(--blue); box-shadow: var(--glow); }
.btn-reset {
  background: rgba(248,113,113,.08); color: var(--red);
  border: 1px solid rgba(248,113,113,.22);
  padding: 7px 12px; border-radius: var(--radius);
  font-size: 11px; font-weight: 600;
  font-family: var(--font-mono); letter-spacing: .04em;
  cursor: pointer; transition: all .15s; white-space: nowrap;
}
.btn-reset:hover { background: rgba(248,113,113,.15); border-color: var(--red); }

/* ── GROUP / TABLE ──────────────────────────────────────── */
.group { margin-bottom: 32px; }
.group + .group { padding-top: 12px; border-top: 1px solid var(--border); }
.group-hdr {
  cursor: pointer; user-select: none; display: flex; align-items: center; margin-bottom: 10px; }
.group-title {
  font-size: 10.5px; font-weight: 600;
  color: var(--muted);
  font-family: var(--font-mono);
  letter-spacing: .1em; text-transform: uppercase;
  display: flex; align-items: center; gap: 8px;
}
.group-title::before { content: ''; display: inline-block; width: 14px; height: 1px; background: var(--blue); opacity: .55; flex-shrink: 0; }
.group-collapsed .group-body { max-height:0!important; opacity:0; pointer-events:none; overflow:hidden; }
.group-body { transition: max-height .25s ease, opacity .2s ease; max-height:4000px; opacity:1; }
.group-chevron { font-size:10px; color:var(--subtle); transition:transform .2s; display:inline-block; margin-left:6px; }
.group-collapsed .group-chevron { transform:rotate(-90deg); }
.group-hdr:hover .group-title { color:var(--blue); }
.group-count {
  font-size: 10px; color: var(--subtle);
  margin-left: auto;
  background: var(--surface3);
  padding: 2px 9px; border-radius: 10px;
  border: 1px solid var(--border2);
  font-family: var(--font-mono);
}
.inst-table {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: visible;
  box-shadow: var(--shadow);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
}
.inst-table--field   { box-shadow: -4px 0 0 0 var(--amber),  var(--shadow); }
.inst-table--shop    { box-shadow: -4px 0 0 0 var(--blue),   var(--shadow); }
.inst-table--vendor  { box-shadow: -4px 0 0 0 var(--purple), var(--shadow); }
.inst-table--storage { box-shadow: -4px 0 0 0 var(--green),  var(--shadow); }
.inst-table table { width: 100%; border-collapse: collapse; }
.inst-table th {
  padding: 10px 14px;
  font-size: 9.5px; font-weight: 600;
  color: var(--subtle);
  letter-spacing: .1em; text-transform: uppercase;
  border-bottom: 1px solid var(--border);
  text-align: left;
  background: rgba(10,15,26,0.85);
  white-space: nowrap;
  font-family: var(--font-mono);
}
.inst-table td { padding: 11px 14px; border-bottom: 1px solid var(--border2); vertical-align: middle; font-size: 13px; }
.inst-table tr:last-child td { border-bottom: none; }
.inst-table tbody tr:nth-child(even) td { background: rgba(255,255,255,.015); }
.inst-table tr:hover td { background: rgba(34,211,238,.04); transition: background .1s; }
.empty-row td { text-align: center; padding: 36px; color: var(--subtle); font-size: 13px; font-family: var(--font-mono); }
.card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; padding: 14px; }
.inst-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 14px 16px; transition: border-color .15s, box-shadow .15s; }
.inst-card:hover { border-color: rgba(34,211,238,.25); box-shadow: 0 2px 8px rgba(0,0,0,.12); }
.inst-card-hdr { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
.inst-card-name { font-size: 14px; font-weight: 700; color: var(--text); font-family: var(--font-mono); }
.inst-card-sn { font-size: 11px; color: var(--blue); font-family: var(--font-mono); margin-top: 2px; }
.inst-card-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; font-size: 12px; }
.inst-card-lbl { color: var(--subtle); font-family: var(--font-mono); font-size: 10px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; }
.inst-card-val { color: var(--text); font-family: var(--font-mono); font-size: 12px; font-weight: 500; }
.inst-card-actions { display: flex; gap: 6px; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border2); flex-wrap: wrap; }
.view-toggle { display: inline-flex; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.view-toggle button { background: var(--surface2); border: none; padding: 5px 10px; cursor: pointer; font-size: 13px; color: var(--muted); transition: all .15s; }
.view-toggle button.active { background: var(--blue); color: #fff; }
.inst-name { font-size: 13px; font-weight: 600; color: var(--text); font-family: var(--font-mono); }
.inst-sn   { font-family: var(--font-mono); font-size: 11px; color: var(--blue); margin-top: 2px; opacity: .78; }
.inst-notes { font-size: 11px; color: var(--subtle); margin-top: 3px; font-style: italic; max-width: 240px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.row-archived td { opacity: .4; }
.archived-section-hdr {
  font-size: 10px; font-weight: 600; color: var(--subtle);
  letter-spacing: .08em; text-transform: uppercase;
  font-family: var(--font-mono);
  padding: 8px 14px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  border-bottom: none;
}
.badge-archived {
  background: rgba(148,163,184,.09); color: var(--slate);
  border: 1px solid rgba(148,163,184,.2);
  padding: 2px 8px; border-radius: 3px;
  font-size: 9.5px; font-family: var(--font-mono); font-weight: 600; letter-spacing: .05em;
}
.btn-restore {
  background: rgba(52,211,153,.08); color: var(--green);
  border: 1px solid rgba(52,211,153,.22);
  padding: 4px 10px; border-radius: var(--radius);
  font-size: 11px; font-weight: 500; font-family: var(--font-mono);
  cursor: pointer; transition: all .15s; white-space: nowrap;
}
.btn-restore:hover { background: rgba(52,211,153,.16); box-shadow: 0 0 8px rgba(52,211,153,.15); }

/* ── INLINE SELECTS ─────────────────────────────────────── */
.site-sel {
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); border-radius: var(--radius);
  padding: 5px 8px; font-size: 11px; font-family: var(--font-mono);
  outline: none; cursor: pointer; max-width: 180px; width: 100%; transition: border-color .15s;
}
.site-sel:focus { border-color: rgba(34,211,238,.4); }
.status-sel {
  border: 1px solid transparent; border-radius: var(--radius);
  padding: 4px 8px; font-size: 11px; font-weight: 600;
  font-family: var(--font-mono); outline: none; cursor: pointer;
  min-width: 110px; letter-spacing: .03em;
}
.status-sel:focus { border-color: rgba(34,211,238,.4); }
.status-sel option { background: #0d1220; color: var(--text); }
.s-operational { background: rgba(52,211,153,.11); color: var(--green); border-color: rgba(52,211,153,.24)!important; }
.s-maintenance { background: rgba(251,191,36,.09); color: var(--amber); border-color: rgba(251,191,36,.22)!important; }
.s-repair      { background: rgba(248,113,113,.09); color: var(--red);   border-color: rgba(248,113,113,.22)!important; }
.s-calibration { background: rgba(167,139,250,.09); color: var(--purple);border-color: rgba(167,139,250,.22)!important; }
.s-offline     { background: rgba(148,163,184,.07); color: var(--slate); border-color: rgba(148,163,184,.14)!important; }
.s-deployed    { background: rgba(34,211,238,.09);  color: var(--blue);  border-color: rgba(34,211,238,.24)!important; }
.s-at-vendor   { background: rgba(251,146,60,.09);  color: #e55f0c;      border-color: rgba(251,146,60,.26)!important; }

/* ── ACTION BUTTONS ─────────────────────────────────────── */
.actions { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; }
.btn-act {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 4px 10px; border-radius: var(--radius);
  font-size: 11px; font-weight: 500;
  font-family: var(--font-mono); letter-spacing: .03em;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--muted);
  transition: background .12s, color .12s, border-color .12s;
  white-space: nowrap;
}
.btn-act:hover { background: var(--surface3); border-color: rgba(148,163,184,.38); color: var(--text); }
.btn-logwork  { background: rgba(34,211,238,.09);  color: var(--blue);   border-color: rgba(34,211,238,.26); }
.btn-logwork:hover  { background: rgba(34,211,238,.17); border-color: var(--blue); box-shadow: var(--glow-sm); }
.btn-history  { background: var(--surface2); color: var(--slate); border-color: var(--border); position: relative; }
.hist-badge { display:inline-flex;align-items:center;justify-content:center;min-width:16px;height:16px;padding:0 4px;border-radius:9px;background:var(--purple);color:#fff;font-size:9px;font-weight:700;margin-left:5px;line-height:1;letter-spacing:0; }
.btn-qr { padding: 4px 7px; font-size: 13px; }
.more-menu-wrap { position: relative; display: inline-block; }
.btn-more { padding: 4px 8px; font-size: 15px; font-weight: 700; letter-spacing: 2px; }
.more-menu { display: none; position: absolute; right: 0; top: 100%; margin-top: 4px; min-width: 140px; background: var(--surface3); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: 0 8px 24px rgba(0,0,0,.45); z-index: 50; padding: 4px 0; }
.more-menu.open { display: block; }
.more-item { padding: 7px 14px; font-family: var(--font-mono); font-size: 11px; color: var(--text); cursor: pointer; white-space: nowrap; transition: background .1s; }
.more-item:hover { background: var(--surface2); }
.btn-createwo { background: rgba(34,211,238,.06);  color: var(--blue);   border-color: rgba(34,211,238,.18); }
.wo-badge {
  font-family: var(--font-mono); font-size: 11px;
  color: var(--blue); cursor: pointer;
  padding: 3px 8px; border-radius: var(--radius);
  background: rgba(34,211,238,.08);
  border: 1px solid rgba(34,211,238,.22);
  letter-spacing: .03em;
  transition: background .12s, box-shadow .12s;
}
.wo-badge:hover { background: rgba(34,211,238,.15); box-shadow: var(--glow-sm); }
.btn-export {
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--subtle);
  padding: 6px 12px; border-radius: var(--radius);
  font-size: 11px; font-weight: 500;
  font-family: var(--font-mono); letter-spacing: .04em;
  cursor: pointer; transition: all .15s;
}
.btn-export:hover { border-color: rgba(34,211,238,.38); color: var(--blue); }

/* ── MODAL ──────────────────────────────────────────────── */
.overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.6);
  display: flex; align-items: center; justify-content: center;
  z-index: 9999;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  overflow-y: auto;
  padding: 16px;
}
.modal {
  background: linear-gradient(168deg, rgba(16,22,36,.99) 0%, rgba(10,16,28,.99) 100%);
  border: 1px solid rgba(34,211,238,.18);
  border-radius: var(--radius-xl);
  padding: 0;
  width: 500px; max-width: calc(100vw - 32px);
  max-height: calc(100vh - 32px);
  overflow: hidden;
  display: flex; flex-direction: column;
  min-height: 0;
  animation: modal-in .18s cubic-bezier(.22,.9,.28,1);
  box-shadow: 0 0 0 1px rgba(34,211,238,.05), var(--shadow-lg);
}
@keyframes modal-in { from { opacity:0; transform:scale(.96) translateY(8px) } to { opacity:1; transform:scale(1) translateY(0) } }
.modal-hdr {
  display: flex; justify-content: space-between; align-items: center;
  padding: 18px 22px 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.modal-title { font-size: 12px; font-weight: 600; color: var(--blue); font-family: var(--font-mono); letter-spacing: .1em; text-transform: uppercase; text-shadow: 0 0 12px rgba(34,211,238,.35); }
.modal > .modal-hdr + div { overflow-y: auto; flex: 1; padding: 20px 22px; }
/* fallback for older structure */
.modal > div:not(.modal-hdr):not(.modal-actions) { padding: 20px 22px; }
.modal-sub { font-family: var(--font-mono); font-size: 12px; color: var(--blue); margin-bottom: 16px; padding: 8px 12px; background: rgba(34,211,238,.07); border-radius: var(--radius); border: 1px solid rgba(34,211,238,.14); }
.close-btn { background: none; border: none; color: var(--subtle); cursor: pointer; font-size: 20px; line-height: 1; padding: 3px 7px; transition: color .15s, background .15s; border-radius: var(--radius); }
.close-btn:hover { color: var(--text); background: rgba(255,255,255,.06); }
.form-group { margin-bottom: 14px; }
.form-label { display: block; font-size: 10px; font-weight: 600; color: var(--subtle); letter-spacing: .08em; margin-bottom: 5px; text-transform: uppercase; font-family: var(--font-mono); }
.form-input {
  width: 100%; padding: 8px 11px;
  background: rgba(10,15,26,.85);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: var(--font-mono); font-size: 12px;
  outline: none; transition: border-color .15s, box-shadow .15s;
}
.form-input:focus { border-color: rgba(34,211,238,.48); box-shadow: 0 0 0 3px rgba(34,211,238,.06); }
.form-input option { background: #0d1220; color: var(--text); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; padding: 14px 22px; border-top: 1px solid var(--border); background: rgba(8,12,20,.6); flex-shrink: 0; border-radius: 0 0 var(--radius-xl) var(--radius-xl); }
.btn-cancel { background: var(--surface2); border: 1px solid var(--border); color: var(--muted); padding: 7px 16px; border-radius: var(--radius); font-size: 12px; font-weight: 500; font-family: var(--font-mono); cursor: pointer; transition: all .15s; }
.btn-cancel:hover { border-color: rgba(148,163,184,.42); color: var(--text); }
.btn-save { background: linear-gradient(135deg, rgba(34,211,238,.15) 0%, rgba(34,211,238,.07) 100%); color: var(--blue); border: 1px solid rgba(34,211,238,.3); padding: 7px 20px; border-radius: var(--radius); font-size: 12px; font-weight: 600; font-family: var(--font-mono); letter-spacing: .04em; cursor: pointer; transition: all .15s; }
.btn-save:hover { background: rgba(34,211,238,.22); box-shadow: var(--glow); }
.btn-close-wo { background: rgba(52,211,153,.09); color: var(--green); border: 1px solid rgba(52,211,153,.24); padding: 7px 16px; border-radius: var(--radius); font-size: 12px; font-weight: 500; font-family: var(--font-mono); cursor: pointer; transition: all .15s; }
.btn-close-wo:hover { background: rgba(52,211,153,.17); box-shadow: 0 0 9px rgba(52,211,153,.15); }
.btn-edit-sm { background: var(--surface2); color: var(--slate); border: 1px solid var(--border); padding: 4px 10px; border-radius: var(--radius); font-size: 11px; font-weight: 500; font-family: var(--font-mono); cursor: pointer; transition: all .15s; white-space: nowrap; }
.btn-edit-sm:hover { border-color: rgba(148,163,184,.4); color: var(--text); background: var(--surface3); }
.btn-del-sm { background: var(--surface2); color: var(--red); border: 1px solid rgba(248,113,113,.17); padding: 4px 10px; border-radius: var(--radius); font-size: 11px; font-weight: 500; font-family: var(--font-mono); cursor: pointer; transition: all .15s; white-space: nowrap; }
.btn-del-sm:hover { background: rgba(248,113,113,.1); border-color: rgba(248,113,113,.35); }
.btn-edit-md { background: var(--surface2); color: var(--slate); border: 1px solid var(--border); padding: 7px 16px; border-radius: var(--radius); font-size: 12px; font-weight: 500; font-family: var(--font-mono); cursor: pointer; transition: all .15s; }
.btn-edit-md:hover { border-color: rgba(148,163,184,.4); color: var(--text); background: var(--surface3); }
.err-msg { background: rgba(248,113,113,.07); border: 1px solid rgba(248,113,113,.18); color: var(--red); padding: 9px 12px; border-radius: var(--radius); font-size: 12px; margin-bottom: 14px; font-family: var(--font-mono); }

/* ── HISTORY ────────────────────────────────────────────── */
.history-item { padding: 10px 0; border-bottom: 1px solid var(--border2); }
.history-item:last-child { border-bottom: none; }
.history-date { font-family: var(--font-mono); font-size: 10px; color: var(--subtle); letter-spacing: .04em; }
.history-action { color: var(--text); margin-top: 3px; font-size: 12px; font-family: var(--font-mono); }

/* ── WO DETAIL ──────────────────────────────────────────── */
.wo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
.wo-field-label { font-size: 10px; font-weight: 600; color: var(--subtle); letter-spacing: .08em; text-transform: uppercase; margin-bottom: 3px; font-family: var(--font-mono); }
.wo-field-val { font-size: 13px; color: var(--text); font-family: var(--font-mono); }

/* ── CERTIFICATION BADGES ───────────────────────────────── */
.cert-overdue  { background: rgba(248,113,113,.11); color: var(--red);    border: 1px solid rgba(248,113,113,.27); padding: 3px 8px; border-radius: var(--radius); font-size: 10px; font-weight: 600; font-family: var(--font-mono); letter-spacing: .04em; white-space: nowrap; }
.cert-due-soon { background: rgba(251,191,36,.1);   color: var(--amber);  border: 1px solid rgba(251,191,36,.27);  padding: 3px 8px; border-radius: var(--radius); font-size: 10px; font-weight: 600; font-family: var(--font-mono); letter-spacing: .04em; white-space: nowrap; }
.cert-ok       { background: rgba(52,211,153,.09);  color: var(--green);  border: 1px solid rgba(52,211,153,.2);   padding: 3px 8px; border-radius: var(--radius); font-size: 10px; font-weight: 600; font-family: var(--font-mono); letter-spacing: .04em; white-space: nowrap; }
.cert-none     { background: var(--surface3);       color: var(--subtle); border: 1px solid var(--border2);        padding: 3px 8px; border-radius: var(--radius); font-size: 10px; font-weight: 500; font-family: var(--font-mono); letter-spacing: .04em; white-space: nowrap; }
.btn-cert { background: rgba(167,139,250,.1); color: var(--purple); border: 1px solid rgba(167,139,250,.27); padding: 4px 10px; border-radius: var(--radius); font-size: 11px; font-weight: 600; font-family: var(--font-mono); cursor: pointer; transition: all .15s; white-space: nowrap; }
.btn-cert:hover { background: rgba(167,139,250,.18); box-shadow: 0 0 10px rgba(167,139,250,.15); }
.wo-tab.cert-tab { color: var(--purple); }
.wo-tab.cert-tab.active { color: var(--purple); border-color: rgba(167,139,250,.3); background: rgba(167,139,250,.1); }

/* ── CONFIRM MODAL ──────────────────────────────────────── */
.confirm-modal { max-width: 420px; }
.confirm-icon { font-size: 30px; margin-bottom: 12px; display: block; }
.confirm-msg { font-size: 13px; color: var(--text); line-height: 1.65; margin-bottom: 6px; }
.confirm-detail { font-family: var(--font-mono); font-size: 11px; color: var(--blue); background: var(--blue-dim); border: 1px solid rgba(34,211,238,.18); border-radius: var(--radius); padding: 8px 12px; margin-bottom: 4px; }
.btn-confirm-ok { background: rgba(248,113,113,.11); color: var(--red); border: 1px solid rgba(248,113,113,.27); padding: 7px 20px; border-radius: var(--radius); font-size: 12px; font-weight: 600; font-family: var(--font-mono); letter-spacing: .04em; cursor: pointer; transition: all .15s; }
.btn-confirm-ok:hover { background: rgba(248,113,113,.2); box-shadow: 0 0 10px rgba(248,113,113,.14); }

/* ── PRINT ──────────────────────────────────────────────── */
@media print {
  *, *::before, *::after { -webkit-print-color-adjust: exact!important; print-color-adjust: exact!important; }
  body { background: #fff!important; color: #111!important; font-family: 'IBM Plex Sans', sans-serif; font-size: 11px; }
  #sidebar, .sidebar, .toolbar, .stat-grid, .btn-add, .btn-export, .btn-act,
  .actions, .group-hdr .group-count, .wo-tabs, .search-box,
  .section-hdr button, .print-hide { display: none!important; }
  .main { padding: 0!important; max-width: 100%!important; margin-left: 0!important; }
  .inst-table { box-shadow: none!important; border: 1px solid #ccc!important; }
  .inst-table th { background: #f0f0f0!important; color: #333!important; border-bottom: 1px solid #ccc!important; }
  .inst-table td { border-bottom: 1px solid #eee!important; color: #111!important; }
  .inst-table tr:hover td { background: none!important; }
  .inst-name { color: #111!important; }
  .inst-sn   { color: #1d4ed8!important; }
  .wo-status-open   { background: #dbeafe!important; color: #1e40af!important; border: 1px solid #93c5fd!important; }
  .wo-status-closed { background: #d1fae5!important; color: #065f46!important; border: 1px solid #6ee7b7!important; }
  .print-header { display: block!important; }
  @page { margin: 18mm 14mm; }
}
.print-header { display: none; padding-bottom: 16px; margin-bottom: 16px; border-bottom: 2px solid #1d4ed8; }
.print-header h1 { font-size: 18px; font-weight: 700; color: #1d4ed8; margin-bottom: 4px; }
.print-header p  { font-size: 11px; color: #555; }

/* ── SITE PILLS ────────────────────────────────────────── */
.site-pill {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border);
  background: var(--surface2); color: var(--muted);
  font-family: var(--font-mono); font-size: 11px; font-weight: 500;
  cursor: pointer; transition: all .15s; letter-spacing: .03em; white-space: nowrap;
}
.site-pill:hover { border-color: rgba(88,166,255,.3); color: var(--text); }
.site-pill-active { background: var(--blue-dim); border-color: rgba(88,166,255,.35); color: var(--blue); font-weight: 700; }
.site-pill-count {
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 18px; height: 18px; padding: 0 5px; border-radius: 10px;
  background: rgba(139,148,158,.15); font-size: 10px; font-weight: 700; color: var(--subtle);
}
.site-pill-active .site-pill-count { background: rgba(88,166,255,.18); color: var(--blue); }

/* ── MOBILE RESPONSIVE ─────────────────────────────────── */
.mobile-menu-btn { display: none; position: fixed; top: 12px; left: 12px; z-index: 250; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 8px 10px; font-size: 18px; color: var(--muted); cursor: pointer; box-shadow: var(--shadow); }

@media (max-width: 768px) {
  :root { --sb-width: 0px; }
  .mobile-menu-btn { display: block; }
  #sidebar, .sidebar {
    transform: translateX(-100%);
    transition: transform .25s ease;
    width: 240px;
    z-index: 300;
  }
  #sidebar.mobile-open, .sidebar.mobile-open {
    transform: translateX(0);
  }
  .mobile-overlay {
    position: fixed; inset: 0; z-index: 299;
    background: rgba(0,0,0,.5);
  }
  .main { padding: 16px 12px; margin-left: 0; padding-top: 52px; }
  .section-hdr { flex-direction: column; align-items: flex-start; gap: 10px; }
  .stat-grid { grid-template-columns: 1fr 1fr !important; gap: 8px !important; }
  .inst-table { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .inst-table table { min-width: 600px; }
  .actions { flex-wrap: wrap; gap: 4px; }
  .btn-act { padding: 5px 8px; font-size: 10px; }
  .form-row { display: flex; flex-direction: column; gap: 0; }
  .wo-tabs { flex-wrap: wrap; width: 100%; }
  .wo-tab { padding: 5px 12px; font-size: 10px; }
  .wo-grid { grid-template-columns: 1fr 1fr !important; }
  .modal { max-width: 95vw !important; max-height: 90vh !important; margin: 10px; }
  .search-box { min-width: 0 !important; max-width: 100% !important; }
  .filter-sel { font-size: 10px !important; }
  .site-pill { padding: 5px 10px; font-size: 10px; }
  .btn-qr { display: none; }
}

@media (max-width: 480px) {
  .stat-grid { grid-template-columns: 1fr !important; }
  .wo-grid { grid-template-columns: 1fr !important; }
  .main { padding: 10px 8px; padding-top: 52px; }
  .modal { padding: 16px !important; }
}

/* ── WORK ORDER TABS ────────────────────────────────────── */
.wo-tabs { display: flex; gap: 3px; margin-bottom: 18px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 4px; width: fit-content; }
.wo-tab { padding: 6px 18px; border-radius: var(--radius); font-size: 11px; font-weight: 600; font-family: var(--font-mono); letter-spacing: .06em; cursor: pointer; border: none; background: transparent; color: var(--subtle); transition: all .15s; }
.wo-tab:hover { color: var(--text); }
.wo-tab.active { background: var(--surface); color: var(--blue); box-shadow: var(--shadow-xs); border: 1px solid rgba(34,211,238,.2); }
.wo-status-open    { background: rgba(34,211,238,.09); color: var(--blue);  border: 1px solid rgba(34,211,238,.2);  padding: 3px 8px; border-radius: var(--radius); font-size: 10px; font-weight: 600; font-family: var(--font-mono); letter-spacing: .04em; }
.wo-status-closed  { background: rgba(52,211,153,.09); color: var(--green); border: 1px solid rgba(52,211,153,.2);  padding: 3px 8px; border-radius: var(--radius); font-size: 10px; font-weight: 600; font-family: var(--font-mono); letter-spacing: .04em; }
.wo-status-pending { background: rgba(251,191,36,.1);  color: var(--amber); border: 1px solid rgba(251,191,36,.28); padding: 3px 8px; border-radius: var(--radius); font-size: 10px; font-weight: 600; font-family: var(--font-mono); letter-spacing: .04em; }
.btn-submit-closure { background: rgba(251,191,36,.1); color: var(--amber); border: 1px solid rgba(251,191,36,.3); padding: 7px 16px; border-radius: var(--radius); font-size: 12px; font-weight: 500; font-family: var(--font-mono); cursor: pointer; transition: all .15s; }
.btn-submit-closure:hover { background: rgba(251,191,36,.18); box-shadow: 0 0 9px rgba(251,191,36,.2); }
.btn-approve-close { background: rgba(52,211,153,.1); color: var(--green); border: 1px solid rgba(52,211,153,.3); padding: 7px 16px; border-radius: var(--radius); font-size: 12px; font-weight: 500; font-family: var(--font-mono); cursor: pointer; transition: all .15s; }
.btn-approve-close:hover { background: rgba(52,211,153,.18); box-shadow: 0 0 9px rgba(52,211,153,.15); }

// ── API CLIENT ─────────────────────────────────────────────
// ── GOOGLE APPS SCRIPT API CLIENT ──────────────────────────
const GAS_URL = 'https://script.google.com/macros/s/AKfycby06qwg0bTTIPIeOoFtGBsHfWuW10QZxkkcwLF_fqLrkXJrDWyxvSF4L_WnrgKOY4Q8/exec';

const GAS_KEY = 'sdapcd-8f3k2m9x7q4w1e6r';

async function gasRequest(path, action, params, body) {
  const isFileUpload = path === 'upload' && action === 'file';
  const url = new URL(GAS_URL);
  url.searchParams.set('apikey', GAS_KEY);
  url.searchParams.set('path', path);
  url.searchParams.set('action', action);

  // Add explicit params (id, key, etc.)
  if (params) Object.entries(params).forEach(([k,v]) => {
    if (v !== undefined && v !== null) url.searchParams.set(k, String(v));
  });

  let response;
  try {
    if (isFileUpload) {
      // File uploads: POST with JSON body — base64 too large for URL
      response = await fetch(url.toString(), { method:'POST', body: JSON.stringify(body) });
    } else if (body !== null && body !== undefined) {
      // Mutations: flatten every body field into its own URL param
      // GAS reads e.parameter.status, e.parameter.closed_by, etc. — no JSON parsing
      Object.entries(body).forEach(([k,v]) => {
        if (v !== undefined && v !== null && k !== 'path' && k !== 'action') url.searchParams.set(k, String(v));
      });
      response = await fetch(url.toString());
    } else {
      response = await fetch(url.toString());
    }
  } catch(fetchErr) {
    throw new Error('Network error: ' + fetchErr.message);
  }

  let j;
  try { j = await response.json(); }
  catch(e) { throw new Error('Bad response from server'); }

  if (!j.ok) throw new Error(j.error || 'Server error');
  return j.data;
}

const API = {
  async uploadFile(fileData, fileName, mimeType, instrName, instrSerial, workType) {
    return gasRequest('upload', 'file', null, {
      data:        fileData,
      fileName:    fileName,
      mimeType:    mimeType,
      instrName:   instrName  || '',
      instrSerial: instrSerial|| '',
      workType:    workType   || '',
      uploadDate:  new Date().toISOString().slice(0,10)
    });
  },
  async get(path) {
    // Map /db, /instruments, etc. to GAS path/action params
    const clean = path.replace(/^\//, '');
    const parts = clean.split('/');
    const resource = parts[0];
    const id = parts[1];
    if (resource === 'db') return gasRequest('db', 'get', null, null);
    if (resource === 'settings' && id) return gasRequest('settings', 'get', {key: id}, null);
    return gasRequest(resource, 'get', id ? {id} : null, null);
  },
  async post(path, body) {
    const clean = path.replace(/^\//, '');
    const parts = clean.split('/');
    const resource = parts[0];
    const sub = parts[1]; // e.g. 'archive', 'delete', 'rename', 'password'
    if (resource === 'admin') {
      const action = (sub||'').replace(/-/g,'_');
      return gasRequest('admin', action, null, body);
    }
    // Use sub-path as action if present (e.g. /sites/archive → action='archive')
    const action = sub || 'post';
    const gasResource = resource.replace(/-/g,'_');
    return gasRequest(gasResource, action, null, body);
  },
  async put(path, body) {
    const clean = path.replace(/^\//, '');
    const parts = clean.split('/');
    const resource = parts[0];
    const id = parts[1];
    if (resource === 'settings') return gasRequest('settings', 'put', {key: id}, body);
    return gasRequest(resource.replace(/-/g,'_'), 'put', {id}, body);
  },
  async patch(path, body) {
    const clean = path.replace(/^\//, '');
    const parts = clean.split('/');
    const resource = parts[0];
    const id = parts[1];
    const sub = parts[2]; // e.g. 'archive', 'close', 'status', 'site', 'cert'
    const action = sub || 'patch';
    if (resource === 'work-orders') return gasRequest('work_orders', action === 'close' ? 'close' : 'put', {id}, body);
    return gasRequest(resource.replace(/-/g,'_'), action, {id}, body);
  },
  async del(path) {
    const clean = path.replace(/^\//, '');
    const parts = clean.split('/');
    const resource = parts[0];
    const id = parts[1];
    return gasRequest(resource.replace(/-/g,'_'), 'delete', {id}, {});
  }
};

// ── DATABASE ───────────────────────────────────────────────
// db is loaded async from the server at startup; saveDB is now a no-op
// because every mutation goes directly to the API.
function saveDB() { /* data is saved to SQLite via API calls — no-op */ }

// Synchronous placeholder so render() works before async load completes
let db = {
  instruments: [], workOrders: [], history: {}, nextId: 1, woId: 1,
  sites: [...DEFAULT_SITES], instTypes: ['BC1060','ESEQ'],
  techs: [{name:'User 1',role:'',email:''},{name:'User 2',role:'',email:''}],
  archivedSites: [], archivedTypes: [], archivedTechs: [],
  sitesMeta: {}, customStatuses: [],
  securityLog: [], deleteLog: []
};

async function loadDBFromServer() {
  try {
    const d = await API.get('/db');
    db = d;
    if (!db.customStatuses) db.customStatuses = [];
    if (!db.sitesMeta)      db.sitesMeta = {};
    if (!db.securityLog)    db.securityLog = [];
    if (!db.deleteLog)      db.deleteLog = [];
    if (!db.history)        db.history = {};
    // Map snake_case server fields → camelCase used throughout the app
    if (db.instruments) {
      db.instruments.forEach(i => {
        if (i.cert_interval_months !== undefined && i.certIntervalMonths === undefined)
          i.certIntervalMonths = i.cert_interval_months !== undefined && i.cert_interval_months !== '' ? Number(i.cert_interval_months) : null;
        if (i.last_cert_date !== undefined && i.lastCertDate === undefined)
          i.lastCertDate = i.last_cert_date || null;
        if (i.work_attachments !== undefined && i.workAttachments === undefined)
          i.workAttachments = i.work_attachments || [];
      });
    }
    markAllSynced();
    if (!db.adminPassword) db.adminPassword = null;
    // Load attachments — map to instruments and sitesMeta
    if (!db.attachments) db.attachments = [];
    if (db.attachments.length > 0) {
      // Map work attachments to instruments
      db.instruments.forEach(inst => {
        const instAttachments = db.attachments.filter(a => String(a.instrumentId) === String(inst.id) && a.type === 'work');
        if (instAttachments.length > 0) inst.workAttachments = instAttachments;
      });
      // Map site photos to sitesMeta
      db.attachments.filter(a => a.type === 'site_photo' && a.siteCode).forEach(a => {
        if (!db.sitesMeta[a.siteCode]) db.sitesMeta[a.siteCode] = {};
        if (!db.sitesMeta[a.siteCode].photos) db.sitesMeta[a.siteCode].photos = [];
        // Store as object with url + id for deletion
        db.sitesMeta[a.siteCode].photos.push({ url: a.directUrl || a.fileUrl, attachmentId: a.id, fileName: a.fileName });
      });
    }
    render();
    // Check for QR code deep link after data loads
    handleDeepLink();
  } catch(e) {
    console.error('SDAPCD: failed to load from server.', e);
    toast('⚠ Could not connect to server — is it running?');
  }
}

function getStoredPassword(username) {
  if (!username) return null;
  if (username.toLowerCase() === 'admin') {
    return db.adminPassword || null;
  }
  const all = [...(db.techs||[]), ...(db.archivedTechs||[])];
  const tech = all.find(t => (t.username||'').toLowerCase() === username.toLowerCase());
  return tech ? (tech.password || null) : null;
}

function setStoredPassword(username, newPw) {
  if (!username || !newPw) return;
  if (username.toLowerCase() === 'admin') {
    db.adminPassword = newPw;
    API.post('/settings', {key: 'admin_password', value: newPw}).catch(e => toast('⚠ Password save failed: ' + e.message, 'warn'));
    return;
  }
  const tech = (db.techs||[]).find(t => (t.username||'').toLowerCase() === username.toLowerCase());
  if (tech) {
    tech.password = newPw;
    API.post('/technicians/password', {username, password: newPw}).catch(e => toast('⚠ Password save failed: ' + e.message, 'warn'));
  }
}

// Returns permission level for current user: 'Full Control' | 'Edit' | 'View'
function currentUserPermission() {
  if (ui.currentUsername === 'admin') return 'Full Control';
  const tech = (db.techs||[]).find(t => (t.username||'') === ui.currentUsername);
  return tech ? (tech.permission || 'Edit') : 'Edit';
}

function currentUserHasFullControl() {
  return currentUserPermission() === 'Full Control';
}
function getSessionUser() {

const today       = () => new Date().toISOString().slice(0, 10);
const nowTs       = () => new Date().toLocaleString('en-US', {month:'short',day:'numeric',year:'numeric',hour:'2-digit',minute:'2-digit'});

// ── CERTIFICATION HELPERS ──────────────────────────────────
// Returns YYYY-MM-DD offset by `months` months after a given date string
function certDueDate(lastDate, months) {
  if (!lastDate || !months) return null;
  try {
    const dateStr = String(lastDate).slice(0,10); // ensure YYYY-MM-DD format
    const d = new Date(dateStr + 'T00:00:00');
    if (isNaN(d.getTime())) return null;
    d.setMonth(d.getMonth() + Number(months));
    if (isNaN(d.getTime())) return null;
    return d.toISOString().slice(0, 10);
  } catch(e) { return null; }
}
// Returns days remaining (negative = overdue). null if no cert data.
function certDaysLeft(i) {
  try {
    const due = certDueDate(i.lastCertDate, i.certIntervalMonths);
    if (!due) return null;
    const t = new Date(today() + 'T00:00:00');
    const d = new Date(due   + 'T00:00:00');
    if (isNaN(t.getTime()) || isNaN(d.getTime())) return null;
    return Math.round((d - t) / 86400000);
  } catch(e) { return null; }
}
// Returns 'overdue' | 'due-soon' | 'ok' | 'none'
function certStatus(i) {
  if (!i.certIntervalMonths) return 'none';
  if (!i.lastCertDate)       return 'none';
  const days = certDaysLeft(i);
  if (days === null)           return 'none';
  if (days < 0)                return 'overdue';
  if (days <= CERT_WARN_DAYS)  return 'due-soon';
  return 'ok';
}
function certBadge(i) {
  const due  = certDueDate(i.lastCertDate, i.certIntervalMonths);
  const st   = certStatus(i);
  const days = certDaysLeft(i);
  if (!i.certIntervalMonths) return `<span class="cert-none">NOT TRACKED</span>`;
  if (st === 'none')         return `<span class="cert-none">NO CERT DATE</span>`;
  if (st === 'overdue')      return `<span class="cert-overdue">⚠ OVERDUE ${Math.abs(days)}d · ${due}</span>`;
  if (st === 'due-soon') {
    const label = days === 0 ? 'TODAY' : days === 1 ? 'TOMORROW' : `IN ${days}d`;
    return `<span class="cert-due-soon">◉ DUE ${label} · ${due}</span>`;
  }
  return `<span class="cert-ok">✓ OK · ${due}</span>`;
}

function addHistory(instId, action, detail) {
  if (!db.history[instId]) db.history[instId] = [];
  const user = ui.currentUser || 'Unknown';
  const detailWithUser = detail ? `${detail} · by: ${user}` : `by: ${user}`;
  db.history[instId].unshift({ ts: nowTs(), epoch: Date.now(), action, detail: detailWithUser, user });
  if (db.history[instId].length > 10000) db.history[instId].length = 10000;
  API.post('/history', { instrument_id: instId, hist_action: action, detail: detailWithUser }).catch(e => console.warn('history save failed', e));
}
function addSecurityLog(type, detail) {
  if (!db.securityLog) db.securityLog = [];
  const entry = { ts: nowTs(), epoch: Date.now(), type, user: ui.currentUser || 'Unknown', detail };
  db.securityLog.unshift(entry);
  if (db.securityLog.length > 5000) db.securityLog.length = 5000;
  API.post('/security-log', { type, user: entry.user, detail }).catch(()=>{});
}
function addDeleteLog(what, detail) {
  if (!db.deleteLog) db.deleteLog = [];
  const entry = { ts: nowTs(), epoch: Date.now(), user: ui.currentUser || 'Unknown', what, detail };
  db.deleteLog.unshift(entry);
  if (db.deleteLog.length > 5000) db.deleteLog.length = 5000;
  API.post('/delete-log', { user: entry.user, what, detail }).catch(()=>{});
}

let _toastTimer;
function toggleMoreMenu(btn) {
  const menu = btn.nextElementSibling;
  const wasOpen = menu.classList.contains('open');
  document.querySelectorAll('.more-menu.open').forEach(m => m.classList.remove('open'));
  if (!wasOpen) menu.classList.add('open');
}
document.addEventListener('click', function(e) {
  if (!e.target.closest('.more-menu-wrap')) {
    document.querySelectorAll('.more-menu.open').forEach(m => m.classList.remove('open'));
  }
});
document.addEventListener('mouseover', function(e) {
  if (!e.target.closest('.more-menu-wrap')) {
    document.querySelectorAll('.more-menu.open').forEach(m => m.classList.remove('open'));
  }
});

function toast(msg, severity) {
  clearTimeout(_toastTimer);
  let el = document.getElementById('toast');
  if (!el) { el = document.createElement('div'); el.id = 'toast'; el.className = 'toast'; document.body.appendChild(el); }
  el.textContent = msg;
  el.style.display = 'block';
  el.style.borderColor = severity === 'error' ? 'var(--red)' : severity === 'warn' ? 'var(--amber)' : 'rgba(34,211,238,.3)';
  el.style.color = severity === 'error' ? 'var(--red)' : severity === 'warn' ? 'var(--amber)' : '';
  _toastTimer = setTimeout(() => { el.style.display = 'none'; }, severity === 'error' ? 4000 : 2200);
}

// ── LIVE SEARCH — filters rows directly without re-rendering ──
function filterTable(tableId, q) {
  const s = (q || '').toLowerCase().trim();
  const table = document.getElementById(tableId);
  if (!table) return;
  const rows = table.querySelectorAll('tbody tr');
  rows.forEach(row => {
    if (row.classList.contains('empty-row')) return;
    const text = row.textContent.toLowerCase();
    row.style.display = (!s || text.includes(s)) ? '' : 'none';
  });
}

function filterCertTracker(q) {
  const s = (q || '').toLowerCase().trim();
  document.querySelectorAll('.group-body table tbody tr').forEach(row => {
    if (row.classList.contains('empty-row')) return;
    const text = row.textContent.toLowerCase();
    row.style.display = (!s || text.includes(s)) ? '' : 'none';
  });
}

function filterActivity(q) {
  const s = (q || '').toLowerCase().trim();
  const feed = document.getElementById('act-feed');
  if (!feed) return;
  feed.querySelectorAll('.feed-item').forEach(item => {
    const text = item.textContent.toLowerCase();
    item.style.display = (!s || text.includes(s)) ? '' : 'none';
  });
}

function filterDashboard(q) {
  const s = (q || '').toLowerCase().trim();
  // Filter all instrument tables on the dashboard
  ['inst-table--field','inst-table--shop','inst-table--storage','inst-table--vendor'].forEach(cls => {
    const tables = document.querySelectorAll('.' + cls);
    tables.forEach(table => {
      const rows = table.querySelectorAll('tbody tr');
      let visibleCount = 0;
      rows.forEach(row => {
        if (row.classList.contains('empty-row')) return;
        const text = row.textContent.toLowerCase();
        const show = !s || text.includes(s);
        row.style.display = show ? '' : 'none';
        if (show) visibleCount++;
      });
    });
  });
}

function submitLogin() {
  const username = (document.getElementById('login-username')?.value || '').trim().toLowerCase();
  const pw       = (document.getElementById('login-pw')?.value      || '').trim();
  const remember = document.getElementById('login-remember')?.checked || false;
  if (!username) { ui._loginErr = 'Please enter your username.'; render(); return; }
  if (!pw)       { ui._loginErr = 'Please enter your password.'; render(); return; }
  // Remember me — save/clear username in localStorage
  if (remember) { try { localStorage.setItem('sdapcd_remember_user', username); } catch(e){} }
  else { try { localStorage.removeItem('sdapcd_remember_user'); } catch(e){} }

  // ── BOOTSTRAP ADMIN ACCOUNT ──────────────────────────────
  if (username === 'admin') {
    const stored = getStoredPassword('admin');
    if (pw !== stored) {
      ui._loginErr = 'Incorrect password. Try again.';
      render();
      setTimeout(() => { const el = document.getElementById('login-pw'); if (el) { el.value = ''; el.focus(); } }, 50);
      return;
    }
    ui._loginErr = '';
    ui.currentUser = 'Admin';
    ui.currentUsername = 'admin';
    setSessionUser('Admin');
    sessionStorage.setItem('sdapcd_username', 'admin');
    addSecurityLog('LOGIN', 'User logged in successfully.');
    ui.page = 'dashboard';
    resetSessionTimer();
    render();
    return;
  }

  // ── REGULAR USERS ────────────────────────────────────────
  const tech = [...db.techs, ...(db.archivedTechs||[])].find(t => (t.username||'').toLowerCase() === username);
  if (!tech) {
    ui._loginErr = 'Username not found. Contact your admin.';
    render();
    setTimeout(() => { const el = document.getElementById('login-username'); if (el) { el.value = ''; el.focus(); } }, 50);
    return;
  }
  const stored = getStoredPassword(username);
  if (pw !== stored) {
    ui._loginErr = 'Incorrect password. Try again.';
    render();
    setTimeout(() => { const el = document.getElementById('login-pw'); if (el) { el.value = ''; el.focus(); } }, 50);
    return;
  }
  ui._loginErr = '';
  ui.currentUser = tech.name;
  ui.currentUsername = username;
  setSessionUser(tech.name);
  sessionStorage.setItem('sdapcd_username', username);
  addSecurityLog('LOGIN', 'User logged in successfully.');
  ui.page = 'dashboard';
  resetSessionTimer();
  render();
}

function submitChangePassword() {
  const username = (document.getElementById('cp-username')?.value || '').trim().toLowerCase();
  const cur      = (document.getElementById('cp-current')?.value  || '').trim();
  const newPw    = (document.getElementById('cp-new')?.value      || '').trim();
  const conf     = (document.getElementById('cp-confirm')?.value  || '').trim();
  if (!username) { ui._cpErr = 'Please enter your username.'; render(); return; }
  const isAdmin = username === 'admin';
  const tech = !isAdmin && [...db.techs, ...(db.archivedTechs||[])].find(t => (t.username||'').toLowerCase() === username);
  if (!isAdmin && !tech) { ui._cpErr = 'Username not found.'; render(); return; }
  const stored = getStoredPassword(username);
  if (cur !== stored) { ui._cpErr = 'Current password is incorrect.'; render(); return; }
  if (newPw.length < 1) { ui._cpErr = 'New password cannot be empty.'; render(); return; }
  if (newPw !== conf)   { ui._cpErr = 'Passwords do not match.'; render(); return; }
  setStoredPassword(username, newPw);
  ui._cpErr = ''; ui._loginView = '';
  ui._loginErr = '✓ Password updated — please sign in.';
  render();
}

function signOut() {
  addSecurityLog('LOGOUT', `User ${ui.currentUser} signed out.`);
  clearTimeout(_sessionTimer);
  clearTimeout(_sessionWarnTimer);
  const warnEl = document.getElementById('_session_warn');
  if (warnEl) warnEl.remove();
  ui.currentUser = '';
  ui.currentUsername = '';
  ui.adminUnlocked = false;
  ui.adminUnlockedAt = null;
  clearSessionUser();
  try { sessionStorage.removeItem('sdapcd_username'); } catch(e) {}
  render();
}

function openChangeUserPassword() {

function saveChangeUserPassword() {
  const cur    = document.getElementById('upw-current')?.value || '';
  const newPw  = document.getElementById('upw-new')?.value     || '';
  const conf   = document.getElementById('upw-confirm')?.value || '';
  const username = ui.currentUsername;
  const stored   = getStoredPassword(username);
  if (cur !== stored) {
    ui.form = {...ui.form, err: 'Current password is incorrect.'}; render(); return;
  }
  if (newPw.length < 1) {
    ui.form = {...ui.form, err: 'New password cannot be empty.'}; render(); return;
  }
  if (newPw !== conf) {
    ui.form = {...ui.form, err: 'Passwords do not match.'}; render(); return;
  }
  setStoredPassword(username, newPw);
  closeModal(); toast('Password updated');
}
