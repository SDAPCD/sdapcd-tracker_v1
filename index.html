      <textarea id="f-desc" class="form-input" rows="3" placeholder="Describe the work..." oninput="markDirty()">${esc(f.desc||'')}</textarea>
    </div>`;
}

function renderModal() {
  const f = ui.form;

  if (ui.modal === 'add') {
    return modalShell('ADD INSTRUMENT', `
      ${f.err ? `<div class="err-msg">${esc(f.err)}</div>` : ''}
      <div class="form-row">
        <div class="form-group"><label class="form-label">Instrument Type *</label>
          <select id="f-name" class="form-input" onchange="if(this.value==='custom'){document.getElementById('f-custom-name').style.display='block'}else{document.getElementById('f-custom-name').style.display='none'}">
            <option value="">— Select —</option>
            ${db.instTypes.map(t=>`<option ${f.name===t?'selected':''}>${t}</option>`).join('')}
            <option value="custom">+ Custom type...</option>
          </select>
          <input id="f-custom-name" class="form-input" placeholder="Enter custom type name" style="margin-top:6px;display:${f.name==='custom'?'block':'none'}"/>
        </div>
        <div class="form-group"><label class="form-label">Serial Number *</label>
          <input id="f-serial" class="form-input" value="${esc(f.serial||'')}" placeholder="e.g. Y21836" oninput="checkDuplicateSerial(this.value)"/>
          <div id="dup-serial-warn" style="display:none;font-family:var(--font-mono);font-size:10px;color:var(--amber);margin-top:4px;padding:4px 8px;background:var(--amber-dim);border:1px solid rgba(210,153,34,.25);border-radius:var(--radius)"></div>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Status</label>
          <select id="f-status" class="form-input">
            ${shopStatuses().map(s=>`<option ${(f.status||'Operational')===s?'selected':''}>${s}</option>`).join('')}
          </select>
        </div>
        <div class="form-group"><label class="form-label">Location</label>
          <select id="f-site" class="form-input">
            ${db.sites.map(s=>`<option ${(f.site||'HQ/SHOP')===s?'selected':''}>${s}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="form-group"><label class="form-label">Notes</label>
        <textarea id="f-notes" class="form-input" rows="2" style="resize:vertical">${esc(f.notes||'')}</textarea>
      </div>`,
      `<button class="btn-cancel" onclick="closeModal()">Cancel</button>
       <button class="btn-save" onclick="saveAdd()">Add Instrument</button>`
    );
  }

  if (ui.modal === 'logwork') {
    const WORK_TYPES = ['Maintenance','Calibration','Repair','Inspection','Other'];
    const selType = f.workType || 'Maintenance';
    const attachments = f.attachments || [];
    return modalShell('LOG WORK', `
      <div class="modal-sub">${esc(f.instName)} &nbsp;·&nbsp; <span style="font-family:var(--font-mono);color:var(--subtle)">${esc(f.serial)}</span></div>
      ${f.err ? `<div class="err-msg">${esc(f.err)}</div>` : ''}

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Type of Work *</label>
          <div style="display:flex;gap:6px;flex-wrap:wrap">
            ${WORK_TYPES.map(t => `<button type="button"
              onclick="ui.form.workType='${t}';render()"
              style="padding:5px 12px;border-radius:var(--radius);font-size:11px;font-family:var(--font-mono);cursor:pointer;border:1px solid ${selType===t?'rgba(34,211,238,.5)':'var(--border)'};background:${selType===t?'rgba(34,211,238,.12)':'var(--surface2)'};color:${selType===t?'var(--blue)':'var(--muted)'};transition:all .12s">${t}</button>`).join('')}
          </div>
        </div>
      </div>
      ${selType === 'Other' ? `
      <div class="form-group">
        <label class="form-label">Specify Reason *</label>
        <input id="f-lw-other" class="form-input" value="${esc(f.otherReason||'')}" placeholder="Describe the type of work..." oninput="ui.form.otherReason=this.value"/>
      </div>` : ''}

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Performed By *</label>
          ${techSelect('f-lw-by', f.by||'', 'Select technician')}
        </div>
        <div class="form-group">
          <label class="form-label">Date Performed</label>
          <input id="f-lw-date" class="form-input" type="date" value="${f.date||today()}"/>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Description of Work *</label>
        <textarea id="f-lw-desc" class="form-input" rows="3" placeholder="Describe the work performed, parts replaced, observations...">${esc(f.desc||'')}</textarea>
      </div>

      <div class="form-group">
        <label class="form-label">Attachments <span style="color:var(--subtle);font-weight:400">(PDF, images)</span></label>
        <label style="display:inline-flex;align-items:center;gap:7px;cursor:pointer;background:rgba(34,211,238,.07);border:1px dashed rgba(34,211,238,.3);color:var(--blue);font-family:var(--font-mono);font-size:11px;padding:8px 14px;border-radius:var(--radius);transition:all .15s" onmouseover="this.style.background='rgba(34,211,238,.13)'" onmouseout="this.style.background='rgba(34,211,238,.07)'">
          <input type="file" accept="image/*,.pdf" multiple style="display:none" onchange="attachLogWorkFiles(this)"/>
          📎 Upload Files
        </label>
        ${attachments.length > 0 ? `
        <div style="margin-top:8px;display:flex;flex-direction:column;gap:5px">
          ${attachments.map((a, ai) => `
          <div style="display:flex;align-items:center;justify-content:space-between;padding:6px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius)">
            <span style="font-family:var(--font-mono);font-size:11px;color:${a.uploading?'var(--amber)':a.localOnly?'var(--red)':'var(--muted)'};overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:220px">
              ${a.type==='image'?'🖼':'📄'} ${esc(a.name)}
              ${a.uploading?'<span style="color:var(--amber)"> ⏳ uploading...</span>':''}
              ${a.fileId?'<span style="color:var(--green)"> ✓</span>':''}
              ${a.localOnly?'<span style="color:var(--red)" title="Drive upload failed"> ⚠</span>':''}
            </span>
            <div style="display:flex;gap:6px;align-items:center;flex-shrink:0">
              ${a.fileUrl?`<a href="${esc(a.fileUrl)}" target="_blank" style="font-family:var(--font-mono);font-size:10px;color:var(--blue);text-decoration:none;padding:2px 6px;border:1px solid rgba(34,211,238,.2);border-radius:var(--radius)">↗ View</a>`:''}
              <button onclick="(function(){var b=document.getElementById('f-lw-by'),d=document.getElementById('f-lw-desc'),dt=document.getElementById('f-lw-date'),o=document.getElementById('f-lw-other');if(b)ui.form.by=b.value;if(d)ui.form.desc=d.value;if(dt)ui.form.date=dt.value;if(o)ui.form.otherReason=o.value;ui.form.attachments.splice(${ai},1);render()})()" style="background:none;border:none;color:var(--red);cursor:pointer;font-size:13px;padding:0 4px">✕</button>
            </div>
          </div>`).join('')}
        </div>` : ''}
      </div>`,
      `<button class="btn-cancel" onclick="closeModal()">Cancel</button>
       <button class="btn-save" onclick="saveLogWork()">✓ Save Work Entry</button>`
    );
  }

  if (ui.modal === 'createwo') {
    return modalShell('CREATE WORK ORDER', `
      <div class="modal-sub">${esc(f.instName)} · ${esc(f.serial)}</div>
      ${f.err ? `<div class="err-msg">${esc(f.err)}</div>` : ''}
      ${woFormBody({type: f.type||WO_TYPES[0], by: f.by||'', desc: f.desc||'', priority: f.priority||'Medium'})}`,
      `<button class="btn-cancel" onclick="closeModal()">Cancel</button>
       <button class="btn-save" onclick="saveWorkEntry('createwo')">Create Work Order</button>`
    );
  }

  if (ui.modal === 'addSitePhotoLink') {
    const f = ui.form;
    return modalShell('ADD SITE PHOTO', `
      <div class="modal-sub">${esc(f.siteCode||'')}</div>
      ${f.err ? `<div class="err-msg" style="margin-bottom:12px">${esc(f.err)}</div>` : ''}
      <div class="form-group">
        <label class="form-label">Google Drive Share Link *</label>
        <input id="f-drive-url" class="form-input" placeholder="Paste Google Drive link here…" value="${esc(f.driveUrl||'')}">
        <div style="font-family:var(--font-mono);font-size:10px;color:var(--subtle);margin-top:5px;line-height:1.7">
          In Google Drive: right-click photo → <strong>Get link</strong> → set to "Anyone with link" → Copy → Paste above
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Label (optional)</label>
        <input id="f-photo-label" class="form-input" placeholder="e.g. North face of station" value="${esc(f.label||'')}">
      </div>
    `,
    `<button class="btn-cancel" onclick="closeModal()">Cancel</button>
     <button class="btn-save" onclick="saveAddSitePhotoLink()">Save Link</button>`);
  }

  if (ui.modal === 'history') {
    const hist  = db.history[f.instId] || [];
    const inst  = db.instruments.find(x => String(x.id) === String(f.instId));
    const attachments = (db.attachments||[]).filter(a => String(a.instrumentId) === String(f.instId) && a.type !== 'site_photo');

    // Color and icon by action type
    function entryStyle(action) {
      const a = (action||'').toLowerCase();
      if (a.includes('work performed'))   return { color:'var(--blue)',   icon:'▣', bg:'rgba(34,211,238,.06)'  };
      if (a.includes('work order'))       return { color:'var(--purple)', icon:'⊡', bg:'rgba(167,139,250,.06)' };
      if (a.includes('status'))           return { color:'var(--amber)',  icon:'◎', bg:'rgba(251,191,36,.06)'  };
      if (a.includes('cert'))             return { color:'var(--green)',  icon:'◈', bg:'rgba(52,211,153,.06)'  };
      if (a.includes('site'))             return { color:'var(--amber)',  icon:'◈', bg:'rgba(251,191,36,.06)'  };
      if (a.includes('archived')||a.includes('restored')) return { color:'var(--red)', icon:'⊟', bg:'rgba(248,113,113,.06)' };
      return { color:'var(--muted)', icon:'·', bg:'transparent' };
    }

    const entries = hist.map(h => {
      const st = entryStyle(h.action);
      // Find attachments matching this history entry (by date proximity)
      const entryAttach = attachments.filter(a => a.date === (h.ts||'').slice(0,10));
      return `
      <div style="padding:12px 14px;border-bottom:1px solid var(--border2);background:${st.bg};border-left:3px solid ${st.color}20;margin-bottom:1px">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:5px">
          <div style="display:flex;align-items:center;gap:7px">
            <span style="font-size:13px;color:${st.color}">${st.icon}</span>
            <strong style="font-family:var(--font-mono);font-size:12px;color:${st.color}">${esc(h.action)}</strong>
          </div>
          <span style="font-family:var(--font-mono);font-size:10px;color:var(--subtle);flex-shrink:0">${esc(h.ts)}</span>
        </div>
        ${h.detail ? `<div style="font-family:var(--font-mono);font-size:11px;color:var(--muted);line-height:1.6;padding-left:20px">${esc(h.detail)}</div>` : ''}
        ${entryAttach.length > 0 ? `
        <div style="padding-left:20px;margin-top:6px;display:flex;flex-wrap:wrap;gap:6px">
          ${entryAttach.map(a => `
          <a href="${a.fileUrl||a.data||'#'}" ${a.fileUrl?'target="_blank"':'download="'+esc(a.name)+'"'} style="display:inline-flex;align-items:center;gap:5px;padding:3px 9px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);font-family:var(--font-mono);font-size:10px;color:var(--blue);text-decoration:none" title="${a.fileUrl?'Open in Drive':('Download '+esc(a.name))}">
            ${a.type==='image'?'🖼':'📄'} ${esc(a.name)}${a.fileUrl?' ↗':''}
          </a>`).join('')}
        </div>` : ''}
      </div>`;
    }).join('');

    // Show all attachments for this instrument at the bottom
    const allAttachSection = attachments.length > 0 ? `
    <div style="margin-top:16px;padding:12px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-lg)">
      <div style="font-family:var(--font-mono);font-size:10px;font-weight:700;letter-spacing:.08em;color:var(--subtle);margin-bottom:10px">ALL ATTACHMENTS (${attachments.length})</div>
      <div style="display:flex;flex-direction:column;gap:6px">
        ${attachments.map(a => `
        <div style="display:flex;align-items:center;justify-content:space-between;padding:6px 10px;background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius)">
          <div style="display:flex;align-items:center;gap:8px;overflow:hidden">
            <span style="font-size:14px">${a.type==='image'?'🖼':'📄'}</span>
            <div style="overflow:hidden">
              <div style="font-family:var(--font-mono);font-size:11px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(a.name)}</div>
              <div style="font-family:var(--font-mono);font-size:10px;color:var(--subtle)">${esc(a.date||'')} · ${esc(a.tech||'')} · ${esc(a.workType||'')}</div>
            </div>
          </div>
          <a href="${a.fileUrl||a.data||'#'}" ${a.fileUrl?'target="_blank"':'download="'+esc(a.name)+'"'} style="flex-shrink:0;margin-left:10px;padding:4px 10px;background:rgba(34,211,238,.09);border:1px solid rgba(34,211,238,.22);border-radius:var(--radius);font-family:var(--font-mono);font-size:10px;color:var(--blue);text-decoration:none">${a.fileUrl?'↗ View in Drive':'↓ Download'}</a>
        </div>`).join('')}
      </div>
    </div>` : '';

    return modalShell('INSTRUMENT HISTORY', `
      <div class="modal-sub">${esc(f.instName)} · ${esc(f.serial)}</div>
      ${hist.length === 0
        ? '<div style="color:var(--muted);font-size:13px;padding:20px 0;text-align:center">No history recorded yet.</div>'
        : `<div style="border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden">${entries}</div>`}
      ${allAttachSection}`,
      `<button class="btn-export" onclick="printHistory(${f.instId})">⎙ Print PDF</button>
       <button class="btn-save" onclick="closeModal()">Close</button>`
    );
  }

  if (ui.modal === 'attachments') {
    const instId = f.instId;
    const atts = (db.attachments||[]).filter(a => String(a.instrumentId) === String(instId) && a.type !== 'site_photo');
    const images = atts.filter(a => (a.mimeType||'').startsWith('image') || a.type === 'image');
    const pdfs   = atts.filter(a => (a.mimeType||'').includes('pdf') || a.type === 'pdf');
    const others = atts.filter(a => !images.includes(a) && !pdfs.includes(a));

    const renderAtt = (a, idx) => {
      const isPDF = (a.mimeType||'').includes('pdf') || a.type === 'pdf';
      const isImg = (a.mimeType||'').startsWith('image') || a.type === 'image';
      const url   = a.fileUrl || a.directUrl || '';
      const icon  = isPDF ? '📄' : isImg ? '🖼' : '📎';
      const label = a.workType ? `${a.workType} · ` : '';
      return `
      <div style="display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-lg);margin-bottom:8px">
        <span style="font-size:22px;flex-shrink:0">${icon}</span>
        <div style="flex:1;min-width:0">
          <div style="font-family:var(--font-mono);font-size:12px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(a.fileName||a.name||'Attachment '+(idx+1))}</div>
          <div style="font-family:var(--font-mono);font-size:10px;color:var(--subtle);margin-top:2px">${label}${esc(a.date||'')}${a.tech?' · '+esc(a.tech):''}</div>
        </div>
        <div style="display:flex;gap:6px;flex-shrink:0">
          ${url ? `<a href="${esc(url)}" target="_blank" style="display:inline-flex;align-items:center;gap:4px;padding:5px 12px;background:var(--blue-dim);border:1px solid rgba(88,166,255,.25);border-radius:var(--radius);font-family:var(--font-mono);font-size:11px;color:var(--blue);text-decoration:none;font-weight:600">↗ Open</a>` : '<span style="font-size:11px;color:var(--subtle)">No link</span>'}
        </div>
      </div>`;
    };

    const body = atts.length === 0
      ? `<div style="text-align:center;padding:40px 0;color:var(--muted)">
           <div style="font-size:32px;margin-bottom:10px">📎</div>
           <div style="font-family:var(--font-mono);font-size:13px">No attachments found for this instrument.</div>
           <div style="font-family:var(--font-mono);font-size:11px;margin-top:6px;color:var(--subtle)">Upload files using the LOG WORK button.</div>
         </div>`
      : `
        ${pdfs.length > 0 ? `
          <div style="font-family:var(--font-mono);font-size:10px;font-weight:700;letter-spacing:.08em;color:var(--subtle);margin-bottom:8px">PDF DOCUMENTS (${pdfs.length})</div>
          ${pdfs.map(renderAtt).join('')}
        ` : ''}
        ${images.length > 0 ? `
          <div style="font-family:var(--font-mono);font-size:10px;font-weight:700;letter-spacing:.08em;color:var(--subtle);margin-bottom:8px;${pdfs.length?'margin-top:16px':''}">IMAGES (${images.length})</div>
          <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin-bottom:16px">
            ${images.map(a => `
            <div style="border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;background:var(--surface)">
              <a href="${esc(driveViewUrl(a.fileUrl||a.directUrl||''))}" target="_blank">
                <img src="${esc(driveDirectUrl(a.fileUrl||a.directUrl||''))}" style="width:100%;height:120px;object-fit:cover;display:block" onerror="this.style.display='none';var d=document.createElement('div');d.style.cssText='height:120px;display:flex;align-items:center;justify-content:center;color:var(--subtle);font-size:11px';d.textContent='Click to view';this.parentElement.appendChild(d)" alt="${esc(a.fileName||'')}">
              </a>
              <div style="padding:6px 10px">
                <div style="font-size:10px;font-family:var(--font-mono);color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(a.fileName||'')}</div>
                <div style="font-size:9px;font-family:var(--font-mono);color:var(--subtle)">${esc(a.date||'')}${a.tech?' · '+esc(a.tech):''}</div>
              </div>
            </div>`).join('')}
          </div>
        ` : ''}
        ${others.length > 0 ? `
          <div style="font-family:var(--font-mono);font-size:10px;font-weight:700;letter-spacing:.08em;color:var(--subtle);margin-bottom:8px">OTHER FILES (${others.length})</div>
          ${others.map(renderAtt).join('')}
        ` : ''}`;

    return modalShell(`ATTACHMENTS — ${esc(f.instName||'')} ${esc(f.serial||'')}`,
      `<div style="font-family:var(--font-mono);font-size:11px;color:var(--muted);margin-bottom:16px">${atts.length} file${atts.length!==1?'s':''} attached to this instrument</div>
      ${body}`,
      `<button class="btn-save" onclick="closeModal()">Close</button>`
    );
  }

  if (ui.modal === 'wodetail') {
    const wo   = db.workOrders.find(w => String(w.id) === String(f.woId));
    const inst = wo ? db.instruments.find(i => String(i.id) === String(wo.instrumentId)) : null;
    if (!wo) return modalShell('WORK ORDER', '<div style="color:var(--muted)">Work order not found.</div>',
      '<button class="btn-save" onclick="closeModal()">Close</button>');
    return modalShell(`WO-${wo.id} DETAIL`, `
      <div class="wo-grid">
        <div><div class="wo-field-label">INSTRUMENT</div><div class="wo-field-val" style="font-family:var(--font-mono);font-size:15px">${esc(inst?inst.name:'?')}</div></div>
        <div><div class="wo-field-label">SERIAL</div><div class="wo-field-val inst-sn">${esc(inst?inst.serial:'—')}</div></div>
        <div><div class="wo-field-label">TYPE</div><div class="wo-field-val">${esc(wo.type)}</div></div>
        <div><div class="wo-field-label">PRIORITY</div><div class="wo-field-val">${(() => { const p = PRIORITY_COLORS[wo.priority] || PRIORITY_COLORS.Medium; return `<span style="display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:var(--radius);font-size:11px;font-weight:600;font-family:var(--font-mono);background:${p.bg};color:${p.color};border:1px solid ${p.border}">${p.icon} ${esc(wo.priority||'Medium')}</span>`; })()}</div></div>
        <div><div class="wo-field-label">TECHNICIAN</div><div class="wo-field-val inst-sn">${esc(wo.technician||'—')}</div></div>
        <div><div class="wo-field-label">STATUS</div><span class="${statusClass(wo.status)}" style="padding:3px 8px;border-radius:var(--radius);font-size:11px;font-weight:600">${esc(wo.status)}</span></div>
        <div><div class="wo-field-label">CREATED</div><div class="wo-field-val" style="font-family:var(--font-mono);font-size:11px;color:var(--muted)">${esc(wo.created)}</div></div>
        ${wo.closedDate    ? `<div><div class="wo-field-label">COMPLETED</div><div class="wo-field-val" style="font-family:var(--font-mono);font-size:11px;color:var(--green)">${esc(wo.closedDate)}</div></div>` : ''}
        ${wo.closedBy      ? `<div><div class="wo-field-label">CLOSED BY</div><div class="wo-field-val inst-sn">${esc(wo.closedBy)}</div></div>` : ''}
        ${wo.restoredBy    ? `<div><div class="wo-field-label">RESTORED BY</div><div class="wo-field-val inst-sn">${esc(wo.restoredBy)} · ${esc(wo.restoredDate||'')}</div></div>` : ''}
      </div>
      ${wo.description   ? `<div class="form-group"><div class="wo-field-label">DESCRIPTION</div><div style="font-size:13px;color:var(--muted);margin-top:4px;line-height:1.5">${esc(wo.description)}</div></div>` : ''}
      ${wo.restoreReason ? `<div class="form-group" style="margin-top:8px"><div class="wo-field-label" style="color:var(--amber)">RESTORE REASON</div><div style="font-size:13px;color:var(--amber);margin-top:4px;line-height:1.5;padding:8px 10px;background:rgba(251,191,36,.07);border:1px solid rgba(251,191,36,.2);border-left:3px solid var(--amber);border-radius:var(--radius)">${esc(wo.restoreReason)}</div></div>` : ''}
      ${(() => {
        if (!inst) return '';
        const woAtts = (db.attachments||[]).filter(a => String(a.instrumentId) === String(wo.instrumentId) && a.type !== 'site_photo');
        if (!woAtts.length) return '';

    return modalShell('RESTORE WORK ORDER', `
      <div class="modal-sub">WO-${esc(String(wo.id))} &nbsp;·&nbsp; ${esc(wo.type)} &nbsp;·&nbsp; ${esc(inst?inst.name:'—')} ${esc(inst?inst.serial:'')}</div>
      ${f.err ? `<div class="err-msg">${esc(f.err)}</div>` : ''}
      <div style="font-family:var(--font-mono);font-size:11px;color:var(--muted);margin-bottom:12px;line-height:1.6">
        Submitted by <strong style="color:var(--text)">${esc(wo.submittedBy||'—')}</strong> on ${esc(wo.submittedDate||'—')}
        ${wo.technician ? ` &nbsp;·&nbsp; Work by <strong style="color:var(--text)">${esc(wo.technician)}</strong>` : ''}
      </div>
      <div style="font-family:var(--font-mono);font-size:11px;color:var(--amber);margin-bottom:16px;padding:8px 10px;background:rgba(251,191,36,.07);border:1px solid rgba(251,191,36,.18);border-radius:var(--radius)">
        Status will revert to: <strong>${esc(restoreTo)}</strong>
      </div>
      ${wo.description ? `<div style="font-size:12px;color:var(--muted);padding:8px 10px;background:var(--surface2);border-radius:var(--radius);margin-bottom:16px;line-height:1.5">${esc(wo.description)}</div>` : ''}
      <div class="form-group">
        <label class="form-label">Reason for Restoring *</label>
        <textarea id="f-restore-notes" class="form-input" rows="2" placeholder="Why is this being restored?" style="resize:none"></textarea>
      </div>`,
      `<button class="btn-cancel" onclick="closeModal()">Cancel</button>
       <button class="btn-submit-closure" onclick="confirmRestoreWO()">↩ Restore to ${esc(restoreTo)}</button>`
    );
  }

  return '';
}

// ── WORK ORDERS PAGE ───────────────────────────────────────
function renderWorkOrders() {
  const q         = (ui.woSearch    || '').toLowerCase();
  const typeF     = (ui.woTypeF     || 'All Status');
  const dateFrom  =  ui.woDateFrom  || '';
  const dateTo    =  ui.woDateTo    || '';
  const isFullControl = currentUserHasFullControl();

  // Short-circuit: cert tab has its own renderer
  if (ui.woFilter === 'cert') {
    try { return renderCertSection(); }
    catch(e) {
      console.error('renderCertSection error:', e);
      return `<div style="padding:40px;color:var(--red);font-family:var(--font-mono)">⚠ Cert Tracker error: ${e.message}</div>`;
    }
  }

  const filtered = db.workOrders.filter(wo => {
    const inst = db.instruments.find(i => String(i.id) === String(wo.instrumentId));
    const matchStatus =
      ui.woFilter === 'All'     ? true :
      ui.woFilter === 'Open'    ? (wo.status !== 'Closed' && wo.status !== 'Pending Closure') :
      ui.woFilter === 'Closed'  ? wo.status === 'Closed' :
      ui.woFilter === 'Pending' ? wo.status === 'Pending Closure' : true;
    const matchSearch = !q
      || `WO-${wo.id}`.toLowerCase().includes(q)
      || (wo.type||'').toLowerCase().includes(q)
      || (wo.technician||'').toLowerCase().includes(q)
      || (wo.description||'').toLowerCase().includes(q)
      || (inst ? inst.serial.toLowerCase().includes(q) : false)
      || (inst ? inst.name.toLowerCase().includes(q) : false)
      || (inst ? (inst.site||'').toLowerCase().includes(q) : false);
    const matchType = typeF === 'All Status' || wo.type === typeF;
    const woDate = (wo.created || '').slice(0,10);
    const matchFrom = !dateFrom || woDate >= dateFrom;
    const matchTo   = !dateTo   || woDate <= dateTo;
    return matchStatus && matchSearch && matchType && matchFrom && matchTo;
  }).sort((a, b) => Number(b.id) - Number(a.id));

  const openCount    = db.workOrders.filter(w => w.status !== 'Closed' && w.status !== 'Pending Closure').length;
  const closedCount  = db.workOrders.filter(w => w.status === 'Closed').length;
  const pendingCount = db.workOrders.filter(w => w.status === 'Pending Closure').length;
  const allCount     = db.workOrders.length;

  const rows = filtered.length === 0
    ? `<tr class="empty-row"><td colspan="7">No work orders match your filter</td></tr>`
    : filtered.map(wo => {
        const inst = db.instruments.find(i => String(i.id) === String(wo.instrumentId));
        const statusBadge =
          wo.status === 'Closed'          ? `<span class="wo-status-closed">CLOSED</span>` :
          wo.status === 'Pending Closure' ? `<span class="wo-status-pending">⏳ PENDING CLOSURE</span>` :
                                            `<span class="wo-status-open">OPEN</span>`;
        const actionBtn =
          wo.status === 'Closed'          ? '' :
          wo.status === 'Pending Closure' ? (isFullControl
            ? `<button class="btn-approve-close" onclick="openApproveWO(${wo.id})">✓ Approve & Close</button>
               <button class="btn-act" style="color:var(--amber);border-color:rgba(251,191,36,.25)" onclick="openRestoreWO(${wo.id})">↩ Restore</button>`
            : `<span style="font-family:var(--font-mono);font-size:10px;color:var(--amber)">Awaiting approval</span>`)
          : `<button class="btn-submit-closure" onclick="submitForClosure(${wo.id})">↑ Submit for Closure</button>`;

        const pri = PRIORITY_COLORS[wo.priority] || PRIORITY_COLORS.Medium;
        const priBadge = `<span style="display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:var(--radius);font-size:10px;font-weight:600;font-family:var(--font-mono);letter-spacing:.04em;background:${pri.bg};color:${pri.color};border:1px solid ${pri.border}">${pri.icon} ${esc(wo.priority||'Medium')}</span>`;
        return `<tr>
          <td>
            <div class="wo-id" onclick="openWODetail(${wo.id})">WO-${wo.id}</div>
            <div class="wo-inst">${inst ? esc(inst.name) + ' · ' + esc(inst.serial) : '—'}</div>
          </td>
          <td style="font-family:var(--font-mono);font-size:12px">${esc(wo.type)}</td>
          <td>${priBadge}</td>
          <td>${statusBadge}</td>
          <td style="font-family:var(--font-mono);font-size:12px;color:var(--muted)">${esc(wo.technician||'—')}</td>
          <td style="font-family:var(--font-mono);font-size:11px;color:var(--subtle)">${esc(wo.created)}</td>
          <td>
            <div class="actions">
              <button class="btn-act btn-history" onclick="openWODetail(${wo.id})">▤ VIEW</button>
              <button class="btn-act" onclick="printWO(${wo.id})">⎙ PRINT</button>
              ${actionBtn}
            </div>
          </td>
        </tr>`;
      }).join('');

  return `
  <div class="print-header">
    <h1>SDAPCD — Open Work Orders</h1>
    <p>San Diego Air Pollution Control District &nbsp;·&nbsp; Instrument Management &nbsp;·&nbsp; Generated: ${new Date().toLocaleString('en-US',{dateStyle:'long',timeStyle:'short'})}</p>
  </div>

  <div class="section-hdr print-hide">
    <div class="section-title">Work Orders</div>
    <div style="display:flex;gap:8px">
      <button class="btn-export" onclick="exportOpenWOPDF()">⎙ EXPORT OPEN WOs PDF</button>
      <button class="btn-export" onclick="exportWOCSV()">↓ EXPORT CSV</button>
    </div>
  </div>

  <div style="display:flex;gap:12px;align-items:center;margin-bottom:18px;flex-wrap:wrap" class="print-hide">
    <div class="wo-tabs">
      <button class="wo-tab ${ui.woFilter==='Open'?'active':''}"    onclick="ui.woFilter='Open';render()">OPEN (${openCount})</button>
      <button class="wo-tab ${ui.woFilter==='Pending'?'active':''}" onclick="ui.woFilter='Pending';render()" style="${pendingCount>0?'color:var(--amber)':''}">
        ⏳ PENDING CLOSURE${pendingCount>0?` (${pendingCount})`:''}
      </button>
      <button class="wo-tab ${ui.woFilter==='Closed'?'active':''}"  onclick="ui.woFilter='Closed';render()">CLOSED (${closedCount})</button>
      <button class="wo-tab ${ui.woFilter==='All'?'active':''}"     onclick="ui.woFilter='All';render()">ALL (${allCount})</button>
      <button class="wo-tab cert-tab ${ui.woFilter==='cert'?'active':''}" onclick="ui.woFilter='cert';render()">◈ CERT TRACKER</button>
    </div>
  </div>

  <div style="display:flex;gap:8px;align-items:center;margin-bottom:16px;flex-wrap:wrap" class="print-hide">
    <div class="search-box" style="min-width:220px;flex:1;max-width:320px">
      <span class="search-icon">⌕</span>
      <input placeholder="Search name / serial / site..." value="${esc(ui.woSearch||'')}" id="wo-search" oninput="ui.woSearch=this.value;filterTable('wo-table',this.value)"/>
      ${ui.woSearch ? `<button onclick="ui.woSearch='';document.getElementById('wo-search').value='';filterTable('wo-table','')" style="background:none;border:none;color:var(--subtle);cursor:pointer;padding:0 6px;font-size:13px" title="Clear">✕</button>` : ''}

    </select>
    <input type="date" class="filter-sel" style="font-family:var(--font-mono);font-size:11px;cursor:pointer"
      value="${esc(ui.woDateFrom||'')}" title="From date"
      onchange="ui.woDateFrom=this.value;render()"/>
    <input type="date" class="filter-sel" style="font-family:var(--font-mono);font-size:11px;cursor:pointer"
      value="${esc(ui.woDateTo||'')}" title="To date"
      onchange="ui.woDateTo=this.value;render()"/>
    <button class="btn-act" onclick="ui.woSearch='';ui.woTypeF='All Status';ui.woDateFrom='';ui.woDateTo='';filterTable('wo-table','');render()" style="white-space:nowrap">✕ Clear</button>

  <div class="group">

    <div class="inst-table">
      <table id="wo-table">
        <thead>
          <tr>
            <th>WO # / INSTRUMENT</th>
            <th>TYPE</th>

            <th>TECHNICIAN</th>

            <th>ACTIONS</th>

        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  </div>`;
}

// ── ACTIVITY FEED ──────────────────────────────────────────
function renderActivity() {
  // Flatten all history across all instruments into one sorted array
  const allEvents = [];
  Object.entries(db.history || {}).forEach(([instId, events]) => {
    const inst = db.instruments.find(i => String(i.id) === String(instId));
    (events || []).forEach(ev => allEvents.push({ ...ev, instId: Number(instId), inst }));
  });

  // Sort by timestamp descending (most recent first)
  // ts format: "Mar 14, 2026, 10:30 AM" — use localeCompare reversed
  allEvents.sort((a, b) => (b.epoch || 0) - (a.epoch || 0) || (b.ts||'').localeCompare(a.ts||''));

  // Filter categories
  const FILTERS = ['All','Work Order','Status Change','Site Change','Certification','Instrument'];
  const filterMap = {
    'Work Order':   ev => ev.action.toLowerCase().includes('work') || ev.action.toLowerCase().includes('wo'),
    'Status Change':ev => ev.action.toLowerCase().includes('status'),
    'Site Change':  ev => ev.action.toLowerCase().includes('site'),
    'Certification':ev => ev.action.toLowerCase().includes('cert'),
    'Instrument':   ev => ev.action.toLowerCase().includes('instrument'),
  };

  const q = (ui.actSearch || '').toLowerCase();
  const filtered = allEvents.filter(ev => {
      const matchFilter = ui.actFilter === 'All' || (filterMap[ui.actFilter] && filterMap[ui.actFilter](ev));
    const matchDate = (() => {
      if (!ui.actDateFrom && !ui.actDateTo) return true;
      const ep = ev.epoch || 0;
      const from = ui.actDateFrom ? new Date(ui.actDateFrom).getTime() : 0;
      const to   = ui.actDateTo   ? new Date(ui.actDateTo).getTime() + 86399999 : Infinity;
      return ep >= from && ep <= to;
    })();
    const matchSearch = !q
      || ev.action.toLowerCase().includes(q)
      || (ev.detail||'').toLowerCase().includes(q)
      || (ev.inst ? ev.inst.serial.toLowerCase().includes(q) : false)
      || (ev.inst ? ev.inst.name.toLowerCase().includes(q) : false)
      || (ev.inst ? (ev.inst.site||'').toLowerCase().includes(q) : false);
    return matchFilter && matchDate && matchSearch;
  });

  const displayed = filtered.slice(0, 500); // show up to 500 events

  // Icon + color per action type
  function feedIcon(action) {
    const a = action.toLowerCase();
    if (a.includes('work') || a.includes('wo')) return { cls:'fi-wo',    icon:'▣' };
    if (a.includes('status'))                   return { cls:'fi-status', icon:'◈' };
    if (a.includes('site'))                     return { cls:'fi-site',   icon:'▶' };
    if (a.includes('cert'))                     return { cls:'fi-cert',   icon:'◎' };
    if (a.includes('instrument'))               return { cls:'fi-add',    icon:'⊞' };
    return                                             { cls:'fi-default', icon:'·' };
  }

  const feedItems = displayed.length === 0
    ? `<div class="feed-empty">No activity matches your filter</div>`
    : displayed.map(ev => {
        const { cls, icon } = feedIcon(ev.action);
        const instLabel = ev.inst
          ? `<span class="feed-inst" onclick="openHistory(${ev.instId})">${esc(ev.inst.name)} · ${esc(ev.inst.serial)}</span>`
          : '';
        return `
        <div class="feed-item">
          <div class="feed-icon ${cls}">${icon}</div>
          <div class="feed-body">
            <div class="feed-action">${esc(ev.action)}</div>
            ${ev.detail ? `<div class="feed-detail">${esc(ev.detail)}</div>` : ''}
            <div class="feed-meta">
              ${instLabel}
              <span class="feed-ts">${esc(ev.ts)}</span>
            </div>
          </div>
        </div>`;
      }).join('');

  // Sidebar stats
  const totalEvents  = allEvents.length;
  const instActive   = new Set(allEvents.slice(0, 100).map(e => e.instId)).size;
  const woEvents     = allEvents.filter(ev => ev.action.toLowerCase().includes('work') || ev.action.toLowerCase().includes('wo')).length;
  const certEvents   = allEvents.filter(ev => ev.action.toLowerCase().includes('cert')).length;

  // Most active instruments (top 5)
  const instEventCount = {};
  allEvents.forEach(ev => {
    if (ev.inst) instEventCount[ev.instId] = (instEventCount[ev.instId]||0) + 1;
  });
  const topInst = Object.entries(instEventCount)
    .sort((a,b) => b[1]-a[1])
    .slice(0,10)
    .map(([id,count]) => {
      const inst = db.instruments.find(i => String(i.id) === String(id));
      return inst ? { inst, count } : null;
    }).filter(Boolean);

  return `
  <div class="section-hdr">
    <div class="section-title">Activity Feed</div>
    <div style="font-family:var(--font-mono);font-size:10px;color:var(--subtle)">${totalEvents} total events across ${db.instruments.length} instruments</div>
  </div>

  <div class="activity-grid">

    <!-- MAIN FEED -->
    <div>
      <div class="activity-filter-bar">
        <div class="wo-tabs">${FILTERS.map(f => `<button class="wo-tab ${ui.actFilter===f?'active':''}" onclick="ui.actFilter='${f}';render()">${f.toUpperCase()}</button>`).join('')}</div>
        <div style="display:flex;align-items:center;gap:8px;margin-top:10px;flex-wrap:wrap">
          <label style="font-family:var(--font-mono);font-size:10px;font-weight:600;color:var(--subtle);letter-spacing:.06em">FROM</label>
          <input type="date" id="act-date-from" class="form-input" style="width:140px;padding:4px 8px;font-size:11px" value="${ui.actDateFrom||''}" onchange="ui.actDateFrom=this.value;render()"/>
          <label style="font-family:var(--font-mono);font-size:10px;font-weight:600;color:var(--subtle);letter-spacing:.06em">TO</label>
          <input type="date" id="act-date-to" class="form-input" style="width:140px;padding:4px 8px;font-size:11px" value="${ui.actDateTo||''}" onchange="ui.actDateTo=this.value;render()"/>
          ${(ui.actDateFrom||ui.actDateTo) ? `<button class="btn-clear-sm" onclick="ui.actDateFrom='';ui.actDateTo='';render()" style="font-size:10px;padding:3px 8px">✕ Clear dates</button>` : ''}
        </div>
        <div class="search-box" style="max-width:220px;margin-left:auto">
          <span class="search-icon">⌕</span>
          <input placeholder="Search events..." value="${esc(ui.actSearch||'')}" id="act-search" oninput="ui.actSearch=this.value;filterActivity(this.value)"/>
          ${ui.actSearch ? `<button onclick="ui.actSearch='';document.getElementById('act-search').value='';filterActivity('')" style="background:none;border:none;color:var(--subtle);cursor:pointer;padding:0 6px;font-size:13px" title="Clear">✕</button>` : ''}
        </div>
        <button class="btn-act" onclick="ui.actFilter='All';ui.actSearch='';ui.actDateFrom='';ui.actDateTo='';filterActivity('');render()" style="white-space:nowrap;font-size:10px">✕ Clear</button>
      </div>

      <div class="feed-card" id="act-feed">
        <div class="feed-hdr">
          <span style="font-family:var(--font-mono);font-size:10px;color:var(--subtle);letter-spacing:.06em;text-transform:uppercase">
            ${ui.actFilter === 'All' ? 'All Events' : ui.actFilter} · showing ${Math.min(displayed.length,500)} of ${filtered.length}
          </span>
          ${filtered.length > 500 ? `<span style="font-family:var(--font-mono);font-size:10px;color:var(--amber)">Showing latest 500 — use search to narrow</span>` : ''}
        </div>
        ${feedItems}
      </div>
    </div>

    <!-- SIDEBAR -->
    <div class="stat-sidebar">

      <div class="sidebar-card">
        <div class="sidebar-card-title">Fleet Summary</div>
        <div class="mini-stat-row">
          <span class="mini-stat-label">Total Events</span>
          <span class="mini-stat-val c-blue">${totalEvents}</span>
        </div>
        <div class="mini-stat-row">
          <span class="mini-stat-label">Work Order Events</span>
          <span class="mini-stat-val" style="color:var(--cyan)">${woEvents}</span>
        </div>
        <div class="mini-stat-row">
          <span class="mini-stat-label">Cert Events</span>
          <span class="mini-stat-val" style="color:var(--purple)">${certEvents}</span>
        </div>
        <div class="mini-stat-row">
          <span class="mini-stat-label">Instruments w/ History</span>
          <span class="mini-stat-val">${Object.keys(db.history||{}).length}</span>
        </div>
        <div class="mini-stat-row">
          <span class="mini-stat-label">Active Last 20 Events</span>
          <span class="mini-stat-val c-green">${instActive}</span>
        </div>
      </div>

      ${topInst.length > 0 ? `
      <div class="sidebar-card">
        <div class="sidebar-card-title">Most Active Instruments</div>
        ${topInst.map(({inst, count}) => `
        <div class="mini-stat-row" style="cursor:pointer" onclick="openHistory(${inst.id})">
          <span class="mini-stat-label">
            <div style="font-family:var(--font-mono);font-size:11px;color:var(--text)">${esc(inst.name)}</div>
            <div style="font-family:var(--font-mono);font-size:10px;color:var(--subtle)">${esc(inst.serial)}</div>
          </span>
          <span class="mini-stat-val c-blue">${count}</span>
        </div>`).join('')}
      </div>` : ''}

      <div class="sidebar-card">
        <div class="sidebar-card-title">Event Types</div>
        ${FILTERS.filter(f=>f!=='All').map(f => {
          const cnt = allEvents.filter(ev => filterMap[f] && filterMap[f](ev)).length;
          const pct = totalEvents > 0 ? Math.round((cnt/totalEvents)*100) : 0;
          return `
          <div class="mini-stat-row">
            <span class="mini-stat-label">${f}</span>
            <div style="display:flex;align-items:center;gap:6px">
              <div style="width:60px;height:4px;background:var(--surface3);border-radius:2px;overflow:hidden">
                <div style="width:${pct}%;height:100%;background:var(--blue);border-radius:2px"></div>
              </div>
              <span class="mini-stat-val" style="font-size:11px">${cnt}</span>
            </div>
          </div>`;
        }).join('')}
      </div>

    </div>
  </div>`;
}

// ── CERT TRACKER ───────────────────────────────────────────
function renderCertSection() {
  const openCount    = db.workOrders.filter(w => w.status !== 'Closed' && w.status !== 'Pending Closure').length;
  const closedCount  = db.workOrders.filter(w => w.status === 'Closed').length;
  const pendingCount = db.workOrders.filter(w => w.status === 'Pending Closure').length;
  const allCount     = db.workOrders.length;

  const q          = (ui.certSearch   || '').toLowerCase();
  const statusF    =  ui.certStatusF  || 'All Status';
  const dateFrom   =  ui.certDateFrom || '';
  const dateTo     =  ui.certDateTo   || '';

  // Apply filters to instruments
  function instMatches(i) {
    const matchSearch = !q
      || i.name.toLowerCase().includes(q)
      || i.serial.toLowerCase().includes(q)
      || (i.site||'').toLowerCase().includes(q);
    const st = certStatus(i);
    const matchStatus =
      statusF === 'All Status' ? true :
      statusF === 'Overdue'    ? st === 'overdue' :
      statusF === 'Due Soon'   ? st === 'due-soon' :
      statusF === 'OK'         ? st === 'ok' :
      statusF === 'Not Tracked'? !i.certIntervalMonths :
      statusF === 'No Date'    ? (i.certIntervalMonths && st === 'none') : true;
    const lcd = i.lastCertDate || '';
    const matchFrom = !dateFrom || lcd >= dateFrom;
    const matchTo   = !dateTo   || lcd <= dateTo;
    return matchSearch && matchStatus && matchFrom && matchTo;
  }

  // Summary counts across ALL tracked instruments (pre-filter)
  const tracked    = db.instruments.filter(i => !i.archived && i.certIntervalMonths);
  const overdueAll = tracked.filter(i => certStatus(i) === 'overdue').length;
  const dueSoonAll = tracked.filter(i => certStatus(i) === 'due-soon').length;
  const noCertAll  = tracked.filter(i => certStatus(i) === 'none').length;

  // Group by instrument type, applying filters per row
  const allTypes = [...new Set(db.instruments.filter(i => !i.archived).map(i => i.name))].sort();

  const groups = allTypes.map(type => {
    const instruments = db.instruments
      .filter(i => !i.archived && i.name === type && instMatches(i))
      .sort((a, b) => {
        const order = { overdue: 0, 'due-soon': 1, none: 2, ok: 3 };
        return (order[certStatus(a)] ?? 4) - (order[certStatus(b)] ?? 4);
      });

    if (instruments.length === 0) return '';

    const typeTracked = instruments.filter(i => i.certIntervalMonths);
    const typeOverdue = typeTracked.filter(i => certStatus(i) === 'overdue').length;
    const typeDueSoon = typeTracked.filter(i => certStatus(i) === 'due-soon').length;

    const statusDot = typeOverdue > 0
      ? `<span class="cert-overdue" style="padding:2px 7px">⚠ ${typeOverdue} OVERDUE</span>`
      : typeDueSoon > 0
        ? `<span class="cert-due-soon" style="padding:2px 7px">◉ ${typeDueSoon} DUE SOON</span>`
        : typeTracked.length > 0
          ? `<span class="cert-ok" style="padding:2px 7px">✓ ALL OK</span>`
          : `<span class="cert-none" style="padding:2px 7px">NOT CONFIGURED</span>`;

    const rows = instruments.map(i => {
      const due      = certDueDate(i.lastCertDate, i.certIntervalMonths);
      const intLabel = i.certIntervalMonths
        ? (i.certIntervalMonths % 12 === 0 ? `${i.certIntervalMonths/12} yr` : `${i.certIntervalMonths} mo`)
        : '—';
      return `<tr>
        <td>
          <div class="inst-name">${esc(i.name)}</div>
          <div class="inst-sn">${esc(i.serial)}</div>
        </td>
        <td style="font-family:var(--font-mono);font-size:11px;color:var(--muted)">
          ${i.lastCertDate ? esc(String(i.lastCertDate).slice(0,10)) : '<span style="color:var(--subtle)">—</span>'}
        </td>
        <td style="font-family:var(--font-mono);font-size:11px;color:var(--muted)">
          ${due ? esc(String(due).slice(0,10)) : '<span style="color:var(--subtle)">—</span>'}
        </td>
        <td style="font-family:var(--font-mono);font-size:11px;color:var(--subtle);text-align:center">${intLabel}</td>
        <td>${certBadge(i)}</td>
        <td>
          <div class="actions">
            <button class="btn-cert" onclick="openLogCert(${i.id})">◈ LOG CERT</button>
            <button class="btn-act btn-history" onclick="openHistory(${i.id})">▤ HISTORY</button>
          </div>
        </td>
      </tr>`;
    }).join('');

    return `
    <div class="group" style="margin-bottom:16px">
      <div class="group-hdr" onclick="toggleGroup('cert-${type}')" style="cursor:pointer">
        <div class="group-title">◈ ${esc(type)} <span class="group-count" style="margin-left:8px">${plural(instruments.length,'instrument')}</span></div>
        <div style="display:flex;align-items:center;gap:10px">${statusDot}<span class="group-chevron">▾</span></div>
      </div>
      <div class="group-body" id="cert-group-${type.replace(/\s/g,'_')}">
        <div class="inst-table">
          <table>
            <thead><tr>
              <th>INSTRUMENT / SERIAL</th>
              <th>LAST CERT DATE</th>
              <th>NEXT DUE</th>
              <th style="text-align:center">INTERVAL</th>
              <th>STATUS</th>
              <th>ACTIONS</th>
            </tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>
    </div>`;
  }).join('');

  const hasFilters = q || (statusF && statusF !== 'All Status') || dateFrom || dateTo;

  return `
  <div class="section-hdr print-hide">
    <div class="section-title">Instrument Certification Tracker</div>
  </div>
  <div style="display:flex;gap:12px;align-items:center;margin-bottom:18px;flex-wrap:wrap" class="print-hide">
    <div class="wo-tabs">
      <button class="wo-tab ${ui.woFilter==='Open'?'active':''}"    onclick="ui.woFilter='Open';render()">OPEN (${openCount})</button>
      <button class="wo-tab ${ui.woFilter==='Pending'?'active':''}" onclick="ui.woFilter='Pending';render()" style="${pendingCount>0?'color:var(--amber)':''}">⏳ PENDING${pendingCount>0?` (${pendingCount})`:''}</button>
      <button class="wo-tab ${ui.woFilter==='Closed'?'active':''}"  onclick="ui.woFilter='Closed';render()">CLOSED (${closedCount})</button>
      <button class="wo-tab ${ui.woFilter==='All'?'active':''}"     onclick="ui.woFilter='All';render()">ALL (${allCount})</button>
      <button class="wo-tab cert-tab ${ui.woFilter==='cert'?'active':''}" onclick="ui.woFilter='cert';render()">◈ CERT TRACKER</button>
    </div>
  </div>

  <div style="display:flex;gap:8px;align-items:center;margin-bottom:16px;flex-wrap:wrap" class="print-hide">
    <div class="search-box" style="min-width:220px;flex:1;max-width:320px">
      <span class="search-icon">⌕</span>
      <input placeholder="Search name / serial / site..." value="${esc(ui.certSearch||'')}" id="cert-search"
        oninput="ui.certSearch=this.value;filterCertTracker(this.value)"/>
      ${ui.certSearch ? `<button onclick="ui.certSearch='';document.getElementById('cert-search').value='';filterCertTracker('')" style="background:none;border:none;color:var(--subtle);cursor:pointer;padding:0 6px;font-size:13px" title="Clear">✕</button>` : ''}
    </div>
    <select class="filter-sel" onchange="ui.certStatusF=this.value;render()">
      <option value="All Status"   ${statusF==='All Status'  ?'selected':''}>All Status</option>
      <option value="Overdue"      ${statusF==='Overdue'     ?'selected':''}>Overdue</option>
      <option value="Due Soon"     ${statusF==='Due Soon'    ?'selected':''}>Due Soon</option>
      <option value="OK"           ${statusF==='OK'          ?'selected':''}>OK</option>
      <option value="No Date"      ${statusF==='No Date'     ?'selected':''}>No Date on File</option>
      <option value="Not Tracked"  ${statusF==='Not Tracked' ?'selected':''}>Not Tracked</option>
    </select>
    <input type="date" class="filter-sel" style="font-family:var(--font-mono);font-size:11px;cursor:pointer"
      value="${esc(dateFrom)}" title="Last cert from"
      onchange="ui.certDateFrom=this.value;render()"/>
    <input type="date" class="filter-sel" style="font-family:var(--font-mono);font-size:11px;cursor:pointer"
      value="${esc(dateTo)}" title="Last cert to"
      onchange="ui.certDateTo=this.value;render()"/>
    <button class="btn-act" onclick="ui.certSearch='';ui.certStatusF='All Status';ui.certDateFrom='';ui.certDateTo='';filterCertTracker('');render()" style="white-space:nowrap">✕ Clear</button>
  </div>

  ${overdueAll > 0 || dueSoonAll > 0 ? `
  <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center">
    <span style="font-family:var(--font-mono);font-size:11px;color:var(--subtle)">SUMMARY:</span>
    ${overdueAll > 0 ? `<span class="cert-overdue">⚠ ${overdueAll} OVERDUE</span>` : ''}
    ${dueSoonAll > 0 ? `<span class="cert-due-soon">◉ ${dueSoonAll} DUE WITHIN 90 DAYS</span>` : ''}
    ${noCertAll  > 0 ? `<span class="cert-none">${noCertAll} NO DATE ON FILE</span>` : ''}
  </div>` : ''}

  ${groups.replace(/^\s*$/, '') === '' ? `<div style="text-align:center;padding:40px;color:var(--subtle);font-family:var(--font-mono)">No instruments match your filters</div>` : groups}

  <div class="cert-table-footer" style="margin-top:8px">
    ◈ Instruments flagged amber are due within ${CERT_WARN_DAYS} days. Click ⚙ SET INTERVAL on any instrument to enable cert tracking. Intervals are set per instrument.
  </div>`;
}

// ── ADMIN TABLE HELPER ─────────────────────────────────────
function adminTable(cols, rows, addRow, tableId) {
  return `
    <div class="inst-table">
      <table${tableId ? ` id="${tableId}"` : ''}>
        <thead><tr>${cols.map(c => `<th>${c}</th>`).join('')}</tr></thead>
        <tbody>${rows.length === 0
          ? `<tr class="empty-row"><td colspan="${cols.length}">Nothing configured yet</td></tr>`
          : rows.join('')}
        </tbody>
      </table>
    </div>
    ${addRow ? `<div class="admin-add-row" style="border:1px solid var(--border);border-top:none;border-radius:0 0 6px 6px;background:var(--surface2)">${addRow}</div>` : ''}`;
}

// ── ADMIN ───────────────────────────────────────────────────
function renderAdmin() {
  const instCount = {};
  const siteCount = {};
  db.instruments.forEach(i => {
    instCount[i.name] = (instCount[i.name]||0) + 1;
    if (i.site) siteCount[i.site] = (siteCount[i.site]||0) + 1;
  });

  const siteRows = db.sites.map((s, idx) => `<tr>
    <td><span class="inst-name" style="font-size:13px">${esc(s)}</span></td>
    <td style="color:var(--muted)">${plural(siteCount[s]||0,'instrument')} assigned</td>
    <td>${PROTECTED_SITES.includes(s)
      ? '<span style="font-family:var(--font-mono);font-size:10px;color:var(--muted)">protected</span>'
      : `<div style="display:flex;gap:6px">
           <button class="btn-edit-sm" onclick="openEditSite('${esc(s)}')">EDIT</button>
           <button class="btn-del-sm"  onclick="archiveSite(${idx})">ARCHIVE</button>
         </div>`}

  </tr>`);
  const archivedSiteRows = (db.archivedSites||[]).map(s => `<tr class="row-archived">
    <td><span class="inst-name" style="font-size:13px">${esc(s)}</span></td>
    <td><span class="badge-archived">ARCHIVED</span></td>
    <td>
      <div style="display:flex;gap:6px">
        <button class="btn-restore" onclick="restoreSite('${esc(s)}')">RESTORE</button>

  const typeRows = db.instTypes.map((t, idx) => `<tr>
    <td><span class="inst-name" style="font-size:13px">${esc(t)}</span></td>
    <td style="color:var(--muted)">${plural(instCount[t]||0,'instrument')}</td>
    <td>
      <div style="display:flex;gap:6px">
        <button class="btn-edit-sm" onclick="openEditType(${idx})">EDIT</button>
        <button class="btn-del-sm"  onclick="archiveInstType(${idx})">ARCHIVE</button>
      </div>

  // ── USER CREDENTIALS TABLE ──────────────────────────────
  const ROLES        = ['Operator','Supervisor','Chief','Admin'];
  const PERMISSIONS  = ['View','Edit','Full Control'];
  const permColor    = p => p==='Full Control' ? 'var(--purple)' : p==='Edit' ? 'var(--blue)' : 'var(--slate)';
  const permBg       = p => p==='Full Control' ? 'rgba(167,139,250,.12)' : p==='Edit' ? 'rgba(34,211,238,.09)' : 'rgba(148,163,184,.09)';
  const permBorder   = p => p==='Full Control' ? 'rgba(167,139,250,.3)' : p==='Edit' ? 'rgba(34,211,238,.22)' : 'rgba(148,163,184,.2)';
  const roleColor    = r => r==='Admin' ? 'var(--red)' : r==='Chief'||r==='Supervisor' ? 'var(--amber)' : 'var(--green)';
  const roleBg       = r => r==='Admin' ? 'rgba(248,113,113,.1)' : r==='Chief'||r==='Supervisor' ? 'rgba(251,191,36,.09)' : 'rgba(52,211,153,.09)';
  const roleBorder   = r => r==='Admin' ? 'rgba(248,113,113,.25)' : r==='Chief'||r==='Supervisor' ? 'rgba(251,191,36,.25)' : 'rgba(52,211,153,.22)';

  function userBadge(val, color, bg, border) {
    return `<span style="font-family:var(--font-mono);font-size:10px;font-weight:600;letter-spacing:.05em;padding:2px 9px;border-radius:var(--radius);background:${bg};color:${color};border:1px solid ${border}">${esc(val)}</span>`;
  }

  const techRows = db.techs.map((t, idx) => {
    const uname   = t.username || generateUsername(t.name);
    const isAdmin = uname === 'admin';
    const tempPw  = t.tempPassword || '';
    const status  = t.archived ? 'Archived' : 'Active';
    const perm    = t.permission || 'Edit';
    const role    = t.role || 'Operator';
    return `<tr>
      <td style="font-family:var(--font-mono);font-size:12px;font-weight:600;color:var(--blue)">${esc(uname)}</td>
      <td><div class="inst-name" style="font-size:13px">${esc(t.name)}</div></td>
      <td>${userBadge(role, roleColor(role), roleBg(role), roleBorder(role))}</td>
      <td><span style="font-family:var(--font-mono);font-size:10px;font-weight:600;padding:2px 9px;border-radius:var(--radius);background:rgba(52,211,153,.09);color:var(--green);border:1px solid rgba(52,211,153,.22)">${status}</span></td>
      <td>${userBadge(perm, permColor(perm), permBg(perm), permBorder(perm))}</td>
      <td style="font-family:var(--font-mono);font-size:11px;color:var(--muted)">${tempPw ? esc(tempPw) : '<span style="color:var(--subtle)">—</span>'}</td>
      <td>
        <div style="display:flex;gap:6px;align-items:center">
          ${isAdmin
            ? `<button class="btn-edit-sm" onclick="openEditTech(${idx})">Edit</button>
               <span style="font-family:var(--font-mono);font-size:10px;color:var(--subtle)">protected</span>`
            : `<button class="btn-edit-sm" onclick="openEditTech(${idx})">Edit</button>
               <button class="btn-del-sm"  onclick="archiveTech(${idx})">Archive</button>`}

  const archivedTypeRows = (db.archivedTypes||[]).map(t => `<tr class="row-archived">
    <td><span class="inst-name" style="font-size:13px">${esc(t)}</span></td>

    <td>
      <div style="display:flex;gap:6px">
        <button class="btn-restore" onclick="restoreInstType('${esc(t)}')">RESTORE</button>
        <button class="btn-del-sm"  onclick="permanentlyDeleteType('${esc(t)}')">DELETE</button>

  const archivedTechRows = (db.archivedTechs||[]).map((t, idx) => `<tr class="row-archived">
    <td><div class="inst-name" style="font-size:13px">${esc(t.name)}</div><div class="inst-sn">${esc(t.role||'Technician')}</div></td>
    <td style="color:var(--muted);font-family:var(--font-mono);font-size:11px">${esc(t.email||'—')}</td>
    <td>
      <div style="display:flex;gap:6px">
        <button class="btn-restore" onclick="restoreTech(${idx})">RESTORE</button>
        <button class="btn-del-sm"  onclick="permanentlyDeleteTech(${idx})">DELETE</button>
      </div>
    </td>
  </tr>`);

  const instrSearch = (ui.adminInstrSearch||'').toLowerCase();
  const activeInstr  = db.instruments.filter(i => !i.archived);
  const archivedInstr = db.instruments.filter(i => i.archived);
  const instrList   = instrSearch
    ? activeInstr.filter(i => i.name.toLowerCase().includes(instrSearch) || i.serial.toLowerCase().includes(instrSearch) || (i.site||'').toLowerCase().includes(instrSearch))
    : activeInstr;
  const instrRows = instrList.map(i => `<tr>
    <td>
      <div class="inst-name" style="font-size:13px">${esc(i.name)}</div>
      <div class="inst-sn">${esc(i.serial)}</div>
    </td>
    <td style="color:var(--muted)">${esc(i.site||'—')}</td>
    <td><span class="${statusClass(i.status)}" style="padding:3px 8px;border-radius:var(--radius);font-size:11px;font-weight:500">${esc(i.status)}</span></td>
    <td>
      <div style="display:flex;gap:6px">
        <button class="btn-edit-sm" onclick="openEditInstrument(${i.id})">EDIT</button>
        <button class="btn-del-sm"  onclick="archiveInstrument(${i.id})">ARCHIVE</button>
      </div>
    </td>
  </tr>`);
  const archivedInstrRows = archivedInstr.map(i => `<tr class="row-archived">
    <td>
      <div class="inst-name" style="font-size:13px">${esc(i.name)}</div>
      <div class="inst-sn">${esc(i.serial)}</div>
    </td>
    <td style="color:var(--muted)">${esc(i.archivedDate||'—')}</td>
    <td><span class="badge-archived">ARCHIVED</span></td>
    <td>
      <div style="display:flex;gap:6px">
        <button class="btn-restore" onclick="restoreInstrument(${i.id})">RESTORE</button>
        <button class="btn-del-sm" onclick="permanentlyDeleteInstrument(${i.id})">DELETE</button>
      </div>
    </td>
  </tr>`);

  return `
  <div class="section-hdr">
    <div class="section-title">Administration</div>
    <div style="display:flex;gap:8px;align-items:center">
      <button class="btn-export" onclick="openChangePassword()">🔑 Change Password</button>
      <button class="btn-export" onclick="exportCSV()">↓ EXPORT CSV</button>
      <button class="btn-del-sm" style="padding:6px 12px" onclick="lockAdmin()">🔒 LOCK</button>
    </div>
  </div>

  <div class="group" style="margin-bottom:18px;border:2px solid rgba(248,81,73,.35);background:rgba(248,81,73,.04)">
    <div class="group-hdr" style="background:rgba(248,81,73,.08)">
      <div class="group-title" style="color:var(--red)">🔌 GAS Connection Tester</div>
      <div style="font-family:var(--font-mono);font-size:10px;color:var(--muted)">Run these tests to diagnose WO sync issues</div>
    </div>
    <div style="padding:14px 18px;display:flex;flex-direction:column;gap:10px">
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn-export" onclick="gasTestRead()">① Test READ (load db)</button>
        <button class="btn-export" onclick="gasTestAppend()">② Test APPEND (write wo_event)</button>
        <button class="btn-export" onclick="gasTestWOUpdate()">③ Test WO UPDATE (close first open WO)</button>

        Click a test button above to see results here.

    </div>
    <div class="toolbar" style="margin-bottom:12px">
      <div class="search-box" style="max-width:100%">

        ${ui.adminInstrSearch ? `<button onclick="ui.adminInstrSearch='';document.getElementById('admin-instr-search').value='';filterTable('admin-instr-table','')" style="background:none;border:none;color:var(--subtle);cursor:pointer;padding:0 6px;font-size:13px">✕</button>` : ''}
      </div>

    ${adminTable(['Type / Serial','Site','Status',''], instrRows,'','admin-instr-table')}
    ${archivedInstr.length > 0 ? `
    <div style="margin-top:16px">
      <div class="archived-section-hdr">

      ${adminTable(['Type / Serial','Archived Date','',''], archivedInstrRows,'')}
    </div>` : ''}
  </div>

  <div class="group">
    <div class="group-hdr" onclick="toggleAdminSection(this)">
      <div class="group-title">◎ Monitoring Sites<span class="group-chevron">▼</span></div>
      <div class="group-count">${plural(db.sites.length,'site')}${(db.archivedSites||[]).length > 0 ? ` · <span style="color:var(--subtle)">${db.archivedSites.length} archived</span>` : ''}</div>
    </div>
    ${adminTable(['Site Code / ID','Instruments Assigned',''], siteRows, '')}
    <div class="admin-add-row" style="border:1px solid var(--border);border-top:none;border-radius:0 0 6px 6px;background:var(--surface2)">
      <button class="btn-add-sm" onclick="openAddSite()">+ Add Site</button>
    </div>
    ${(db.archivedSites||[]).length > 0 ? `
    <div style="margin-top:16px">
      <div class="archived-section-hdr">
        Archived Sites (${(db.archivedSites||[]).length})
      </div>
      ${adminTable(['Site Code / ID','',''], archivedSiteRows,'')}
    </div>` : ''}
  </div>

  <div class="group">
    <div class="group-hdr" onclick="toggleAdminSection(this)">
      <div class="group-title">⊞ Instrument Types<span class="group-chevron">▼</span></div>
      <div class="group-count">${plural(db.instTypes.length,'type')}${(db.archivedTypes||[]).length > 0 ? ` · <span style="color:var(--subtle)">${db.archivedTypes.length} archived</span>` : ''}</div>
    </div>
    ${adminTable(['Type Name','Total Instruments',''], typeRows, '')}
    <div class="admin-add-row" style="border:1px solid var(--border);border-top:none;border-radius:0 0 6px 6px;background:var(--surface2)">
      <input id="new-type" class="admin-input" placeholder="e.g. BC1060"
        value="${esc(ui.newType||'')}"
        oninput="ui.newType=this.value"
        onkeydown="if(event.key==='Enter')addInstType()"/>
      <button class="btn-add-sm" onclick="addInstType()">+ Add Type</button>
    </div>
    ${(db.archivedTypes||[]).length > 0 ? `
    <div style="margin-top:16px">
      <div class="archived-section-hdr">
        Archived Types (${(db.archivedTypes||[]).length})
      </div>
      ${adminTable(['Type Name','',''], archivedTypeRows,'')}
    </div>` : ''}
  </div>

  <div class="group">
    <div class="group-hdr" onclick="toggleAdminSection(this)">
      <div class="group-title">◈ User Credentials<span class="group-chevron">▼</span></div>
      <div class="group-count">${plural(db.techs.length,'user')}${(db.archivedTechs||[]).length > 0 ? ` · <span style="color:var(--subtle)">${db.archivedTechs.length} archived</span>` : ''}</div>
    </div>
    <div class="inst-table">
      <table>
        <thead><tr>
          <th>USERNAME</th>
          <th>DISPLAY NAME</th>
          <th>ROLE</th>
          <th>STATUS</th>
          <th>PERMISSION</th>
          <th>TEMP PASSWORD</th>
          <th>ACTIONS</th>
        </tr></thead>
        <tbody>
          <tr>
            <td style="font-family:var(--font-mono);font-size:12px;font-weight:600;color:var(--blue)">admin</td>
            <td><div class="inst-name" style="font-size:13px">System Administrator</div></td>
            <td><span style="font-family:var(--font-mono);font-size:10px;font-weight:600;padding:2px 9px;border-radius:var(--radius);background:rgba(248,113,113,.1);color:var(--red);border:1px solid rgba(248,113,113,.25)">admin</span></td>
            <td><span style="font-family:var(--font-mono);font-size:10px;font-weight:600;padding:2px 9px;border-radius:var(--radius);background:rgba(52,211,153,.09);color:var(--green);border:1px solid rgba(52,211,153,.22)">Active</span></td>
            <td><span style="font-family:var(--font-mono);font-size:10px;font-weight:600;padding:2px 9px;border-radius:var(--radius);background:rgba(167,139,250,.12);color:var(--purple);border:1px solid rgba(167,139,250,.3)">Full Control</span></td>
            <td style="font-family:var(--font-mono);font-size:11px;color:var(--subtle)">—</td>
            <td><span style="font-family:var(--font-mono);font-size:10px;color:var(--subtle)">protected</span></td>
          </tr>
          ${techRows.join('')}
        </tbody>
      </table>

// ── DEBUG FUNCTIONS ────────────────────────────────────────────
function debugShow(elId, data, isError) {
  const el = document.getElementById(elId);
  if (!el) return;
  el.style.display = 'block';
  const color = isError ? 'var(--red)' : 'var(--green)';
  const json = JSON.stringify(data, null, 2);
  el.innerHTML = `<pre style="font-family:var(--font-mono);font-size:10px;color:${color};background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px;overflow-x:auto;white-space:pre-wrap;word-break:break-all;max-height:200px;overflow-y:auto">${esc(json)}</pre>`;
}

async function debugTest1() {
  const el = document.getElementById('debug-result-1');
  el.style.display = 'block';
  el.innerHTML = '<span style="font-family:var(--font-mono);font-size:10px;color:var(--muted)">⏳ Sending request…</span>';
  const url = new URL(GAS_URL);
  url.searchParams.set('apikey', GAS_KEY);
  url.searchParams.set('path', 'db');
  url.searchParams.set('action', 'get');
  const fullUrl = url.toString();
  try {
    const r = await fetch(fullUrl);
    const text = await r.text();
    let json; try { json = JSON.parse(text); } catch(e) { json = {raw: text}; }
    const preview = { ok: json.ok, hasInstruments: !!(json.data && json.data.instruments), count: json.data && json.data.instruments ? json.data.instruments.length : null, httpStatus: r.status };
    debugShow('debug-result-1', { result: 'SUCCESS', url: fullUrl.slice(0,120)+'...', response: preview }, false);
  } catch(e) {
    debugShow('debug-result-1', { result: 'FAILED', url: fullUrl.slice(0,120)+'...', error: e.message }, true);
  }
}

async function debugTest2(method) {
  const sel = document.getElementById('debug-wo-select');
  const val = sel && sel.value;
  const elId = 'debug-result-2-' + method;
  const el = document.getElementById(elId);
  if (!val || val.includes('No open')) {
    el.style.display = 'block';
    el.innerHTML = '<span style="font-family:var(--font-mono);font-size:10px;color:var(--red)">No open WO selected</span>';
    return;
  }
  const [woId, instId] = val.split('|');
  el.style.display = 'block';
  el.innerHTML = '<span style="font-family:var(--font-mono);font-size:10px;color:var(--muted)">⏳ Sending ' + method.toUpperCase() + ' request…</span>';

  const url = new URL(GAS_URL);
  url.searchParams.set('apikey', GAS_KEY);
  url.searchParams.set('path', 'work-orders');
  url.searchParams.set('action', 'put');
  url.searchParams.set('id', woId);

  const testFields = {
    status:       'DEBUG_TEST',
    instrument_id: instId,
    closed_by:    'DEBUG_USER',
    approved_by:  'DEBUG_USER',
    notes:        'This is a debug test — safe to ignore'
  };

  let response, text, json;
  const sentUrl = url.toString();
  try {
    if (method === 'post') {
      response = await fetch(sentUrl, { method: 'POST', body: JSON.stringify(testFields) });
    } else {
      Object.entries(testFields).forEach(([k,v]) => url.searchParams.set(k, v));
      response = await fetch(url.toString());
    }
    text = await response.text();
    try { json = JSON.parse(text); } catch(e) { json = { parseError: e.message, raw: text.slice(0,300) }; }
    const isOk = json && json.ok;
    debugShow(elId, {
      method: method.toUpperCase(),
      httpStatus: response.status,
      redirected: response.redirected,
      finalUrl: response.url ? response.url.slice(0,100)+'...' : '?',
      sentFields: testFields,
      rawResponse: json
    }, !isOk);

    if (isOk) {
      // Revert the debug change back to original status
      const wo = db.workOrders.find(w => String(w.id) === String(woId));
      if (wo) {
        const revertUrl = new URL(GAS_URL);
        revertUrl.searchParams.set('apikey', GAS_KEY);
        revertUrl.searchParams.set('path', 'work-orders');
        revertUrl.searchParams.set('action', 'put');
        revertUrl.searchParams.set('id', woId);
        revertUrl.searchParams.set('status', wo.status);
        revertUrl.searchParams.set('instrument_id', instId);
        revertUrl.searchParams.set('closed_by', '');
        revertUrl.searchParams.set('approved_by', '');
        revertUrl.searchParams.set('notes', wo.notes||'');
        await fetch(revertUrl.toString()).catch(()=>{});
      }
    }
  } catch(e) {
    debugShow(elId, { method: method.toUpperCase(), error: e.message, sentUrl: sentUrl.slice(0,200) }, true);
  }
}

// ── INSTRUMENT ACTIONS ─────────────────────────────────────
function navigateTo(page) {
  // Close mobile menu if open
  const sb = document.getElementById('sidebar');
  if (sb && sb.classList.contains('mobile-open')) toggleMobileMenu();
  if (ui.page === 'admin' && page !== 'admin') { ui._openAdminSections = new Set(); }
  // Admin page is accessible to Full Control users without extra password
  if (page === 'admin') {
    ui.adminUnlocked = true;
    ui.adminUnlockedAt = Date.now();
  }
  if (ui.modal && ui.dirty) {
    showConfirm({
      title: 'UNSAVED CHANGES',
      icon: '⚠',
      msg: 'You have unsaved changes in an open form. Navigating away will discard them.',
      detail: 'Discard changes and navigate?',
      onConfirm: () => {
        ui.dirty = false;
        if (page === 'workorders') ui.woFilter = 'Open';
        if (page === 'activity')   ui.actFilter = 'All';
        ui.page = page; render();
      }
    });
  } else {
    if (page === 'workorders') ui.woFilter = 'Open';
    if (page === 'activity')   ui.actFilter = 'All';
    ui.page = page; render();
  }
}
// ── ADMIN PASSWORD ─────────────────────────────────────────
function submitAdminPassword() {
  const pw = document.getElementById('admin-pw-input')?.value || '';
  if (!pw) { ui.form = {...ui.form, err: 'Please enter the password.'}; render(); return; }
  const stored = getStoredPassword('admin');
  if (pw !== stored) {
    ui.form = {...ui.form, err: 'Incorrect password. Try again.'};
    render();
    setTimeout(() => {
      const el = document.getElementById('admin-pw-input');
      if (el) { el.value = ''; el.focus(); }
    }, 50);
    return;
  }
  ui.adminUnlocked = true;
  ui.adminUnlockedAt = Date.now();
  ui.modal = null; ui.form = {};
  ui.page = 'admin';
  render();
}

function gasTestLog(msg, ok) {
  const el = document.getElementById('gas-test-result');
  if (!el) return;
  const ts = new Date().toLocaleTimeString();
  const icon = ok === true ? '✅' : ok === false ? '❌' : '⏳';
  el.textContent = icon + ' [' + ts + '] ' + msg;
  el.style.color = ok === true ? 'var(--green)' : ok === false ? 'var(--red)' : 'var(--amber)';
}

  try {
    const url = new URL(GAS_URL);

    url.searchParams.set('path', 'db');

function generateQRDataURL(text, cellSize) {

}

// ── QR / BARCODE SCANNER ──────────────────────────────────
let _html5QrScanner = null;

function openScanner() {
  if (document.getElementById('scanner-overlay')) return;
  const overlay = document.createElement('div');
  overlay.id = 'scanner-overlay';
  overlay.style.cssText = 'position:fixed;inset:0;z-index:10000;background:rgba(0,0,0,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px';
  overlay.innerHTML = `
    <div style="width:100%;max-width:440px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
        <div style="font-family:var(--font-mono);font-size:12px;font-weight:700;letter-spacing:.08em;color:var(--text)">SCAN QR / BARCODE</div>
        <button onclick="event.stopPropagation();closeScanner()" style="position:relative;z-index:10001;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:8px 18px;font-family:var(--font-mono);font-size:12px;font-weight:700;color:var(--text);cursor:pointer">✕ Close</button>
      </div>
      <div id="scanner-reader" style="width:100%;border-radius:var(--radius-lg);overflow:hidden;border:1px solid var(--border)"></div>
      <div id="scanner-status" style="font-family:var(--font-mono);font-size:11px;color:var(--subtle);text-align:center;margin-top:14px;min-height:18px">Initializing camera...</div>
      <div style="font-family:var(--font-mono);font-size:10px;color:var(--subtle);text-align:center;margin-top:10px;opacity:.6">Point camera at an instrument QR code or barcode</div>
    </div>
  `;
  overlay.addEventListener('click', function(e) { if (e.target === overlay) closeScanner(); });
  document.body.appendChild(overlay);

  const config = { fps: 10, qrbox: { width: 250, height: 250 }, aspectRatio: 1.0 };
  _html5QrScanner = new Html5Qrcode('scanner-reader');
  _html5QrScanner.start(
    { facingMode: 'environment' },
    config,
    function onScanSuccess(decodedText) {
      handleScanResult(decodedText);
    },
    function onScanFailure() { /* ignore continuous scan misses */ }
  ).then(function() {
    const statusEl = document.getElementById('scanner-status');
    if (statusEl) statusEl.textContent = 'Scanning... hold steady over the code';
  }).catch(function(err) {
    const statusEl = document.getElementById('scanner-status');
    if (statusEl) statusEl.textContent = 'Camera error: ' + err;
  });
}

function closeScanner() {
  try {
    if (_html5QrScanner) {
      _html5QrScanner.stop().catch(function() {});
      try { _html5QrScanner.clear(); } catch(e) {}
      _html5QrScanner = null;
    }
  } catch(e) { _html5QrScanner = null; }
  const el = document.getElementById('scanner-overlay');
  if (el) el.remove();
}

function handleScanResult(text) {
  // Try to match a QR code URL with #instrument={id}
  const urlMatch = text.match(/#instrument=(\d+)/);
  if (urlMatch) {
    const instId = Number(urlMatch[1]);
    const inst = db.instruments.find(function(i) { return String(i.id) === String(instId); });
    if (inst) {
      closeScanner();
      openHistory(instId);
      toast('Opened: ' + inst.name + ' (S/N ' + inst.serial + ')');
      return;
    }
  }

  // Try to match by serial number (plain barcode)
  const trimmed = text.trim();
  if (trimmed) {
    const inst = db.instruments.find(function(i) {
      return i.serial && i.serial.toLowerCase() === trimmed.toLowerCase();
    });
    if (inst) {
      closeScanner();
      openHistory(inst.id);
      toast('Opened: ' + inst.name + ' (S/N ' + inst.serial + ')');
      return;
    }

    // Try matching by instrument ID number
    const idNum = Number(trimmed);
    if (!isNaN(idNum)) {
      const instById = db.instruments.find(function(i) { return String(i.id) === String(idNum); });
      if (instById) {
        closeScanner();
        openHistory(instById.id);
        toast('Opened: ' + instById.name + ' (S/N ' + instById.serial + ')');
        return;
      }
    }
  }

  // Not found — show feedback but keep scanning
  const statusEl = document.getElementById('scanner-status');
  if (statusEl) {
    statusEl.textContent = 'No matching instrument found — keep scanning...';
    statusEl.style.color = 'var(--amber)';
    setTimeout(function() {
      if (statusEl) { statusEl.textContent = 'Scanning...'; statusEl.style.color = 'var(--subtle)'; }
    }, 2000);
  }
}

// ── DEEP LINK HANDLER — open instrument from QR scan URL ──
function handleDeepLink() {
  const hash = window.location.hash;
  if (!hash) return;
  const match = hash.match(/#instrument=(\d+)/);
  if (match) {
    const instId = Number(match[1]);
    // Clear the hash so it doesn't re-trigger
    history.replaceState(null, '', window.location.pathname + window.location.search);
    // Wait for data to load, then open history
    const tryOpen = () => {
      const inst = db.instruments.find(i => String(i.id) === String(instId));
      if (inst) {
        openHistory(instId);
      } else if (db.instruments.length === 0) {
        // Data not loaded yet — retry in 1 second

function updateSite(id, val) {
  const i = db.instruments.find(x => String(x.id) === String(id));

  showConfirm({
    title: 'CONFIRM SITE CHANGE',
